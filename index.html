<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヨガ体験レッスン予約＆カルテ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md flex flex-col">
        <header class="bg-emerald-600 text-white text-center py-6 px-4 shadow-sm">
            <h1 class="text-xl font-bold tracking-wide">🧘‍♂️ Private Yoga Studio</h1>
            <p class="text-xs opacity-90 mt-1">体験予約 兼 事前カウンセリング</p>
        </header>

        <main class="flex-1 p-6">
            <form id="liffForm" onsubmit="return false;">
                
                <div id="step1" class="step active space-y-5">
                    <div class="border-l-4 border-emerald-500 pl-2">
                        <h2 class="text-lg font-bold">Step 1. ご予約日時とお名前</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">ご希望日</label>
                            <input type="date" id="visit_day" required class="w-full p-3 border border-stone-300 rounded-lg bg-white focus:outline-emerald-500 text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">ご希望時間</label>
                            <select id="visit_time" required class="w-full p-3 border border-stone-300 rounded-lg bg-white focus:outline-emerald-500 text-base">
                                <option value="10:00">10:00</option>
                                <option value="10:30">10:30</option>
                                <option value="11:00">11:00</option>
                                <option value="11:30">11:30</option>
                                <option value="12:00">12:00</option>
                                <option value="12:30">12:30</option>
                                <option value="13:00">13:00</option>
                                <option value="13:30">13:30</option>
                                <option value="14:00">14:00</option>
                                <option value="14:30">14:30</option>
                                <option value="15:00">15:00</option>
                                <option value="15:30">15:30</option>
                                <option value="16:00">16:00</option>
                                <option value="16:30">16:30</option>
                                <option value="17:00">17:00</option>
                                <option value="17:30">17:30</option>
                                <option value="18:00">18:00</option>
                                <option value="18:30">18:30</option>
                                <option value="19:00">19:00</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">お名前（フルネームを漢字で入力）</label>
                        <input type="text" id="name" required placeholder="山田 太郎（姓名の間にスペース）" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-emerald-500">
                        <p class="text-xs text-red-500 mt-1 hidden" id="name_error">※正確なカルテ作成のため、フルネーム（姓名の間にスペース）でご入力ください。</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">お電話番号</label>
                        <input type="tel" id="phone" required placeholder="09012345678" class="w-full p-3 border border-stone-300 rounded-lg focus:outline-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">ヨガのご経験</label>
                        <select id="yoga_experience" class="w-full p-3 border border-stone-300 rounded-lg bg-white focus:outline-emerald-500">
                            <option value="初めて">初めて（完全な未経験）</option>
                            <option value="数回程度">数回程度したことがある</option>
                            <option value="定期的に通っていた">過去に定期的に通っていた</option>
                        </select>
                    </div>
                    <button type="button" onclick="validateAndNext(2)" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-emerald-700 transition">次へ進む</button>
                </div>

                <div id="step2" class="step space-y-5">
                    <div class="border-l-4 border-emerald-500 pl-2">
                        <h2 class="text-lg font-bold">Step 2. お身体のお悩み</h2>
                        <p class="text-xs text-stone-500">当日あなた専用のカルテを準備します（複数選択可）</p>
                    </div>
                    <div class="space-y-3">
                        <label class="flex items-center p-3 border border-stone-200 rounded-lg bg-stone-50 cursor-pointer hover:bg-emerald-50">
                            <input type="checkbox" name="primary_goal" value="肩こり・腰痛を改善したい" class="w-5 h-5 accent-emerald-600 mr-3">
                            <span class="text-sm font-medium">肩こり・腰痛などの身体の不調を改善したい</span>
                        </label>
                        <label class="flex items-center p-3 border border-stone-200 rounded-lg bg-stone-50 cursor-pointer hover:bg-emerald-50">
                            <input type="checkbox" name="primary_goal" value="ボディラインを引き締めたい（ダイエット）" class="w-5 h-5 accent-emerald-600 mr-3">
                            <span class="text-sm font-medium">ボディラインを引き締めたい（ダイエット）</span>
                        </label>
                        <label class="flex items-center p-3 border border-stone-200 rounded-lg bg-stone-50 cursor-pointer hover:bg-emerald-50">
                            <input type="checkbox" name="primary_goal" value="体力をつけたい・運動不足解消" class="w-5 h-5 accent-emerald-600 mr-3">
                            <span class="text-sm font-medium">体力をつけたい・運動不足解消</span>
                        </label>
                        <label class="flex items-center p-3 border border-stone-200 rounded-lg bg-stone-50 cursor-pointer hover:bg-emerald-50">
                            <input type="checkbox" name="primary_goal" value="ストレス解消・リフレッシュしたい" class="w-5 h-5 accent-emerald-600 mr-3">
                            <span class="text-sm font-medium">ストレス解消・リフレッシュしたい</span>
                        </label>
                    </div>
                    <div class="flex space-x-3">
                        <button type="button" onclick="nextStep(1)" class="w-1/3 bg-stone-200 text-stone-700 p-3 rounded-lg font-bold hover:bg-stone-300 transition">戻る</button>
                        <button type="button" onclick="nextStep(3)" class="w-2/3 bg-emerald-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-emerald-700 transition">次へ進む</button>
                    </div>
                </div>

                <div id="step3" class="step space-y-5">
                    <div class="border-l-4 border-emerald-500 pl-2">
                        <h2 class="text-lg font-bold">Step 3. ライフスタイル</h2>
                        <p class="text-xs text-stone-500">🎁 回答特典の限定ストレッチ動画をプレゼント！</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">通いやすい曜日・時間帯</label>
                        <select id="preferred_timezone" class="w-full p-3 border border-stone-300 rounded-lg bg-white focus:outline-emerald-500">
                            <option value="平日（昼）">平日（昼：10:00〜15:00）</option>
                            <option value="平日（夕方）">平日（夕方：15:00〜18:00）</option>
                            <option value="平日（夜）">平日（夜：18:00〜21:00）</option>
                            <option value="土日祝">土日祝（終日）</option>
                            <option value="いつでも可">いつでも可</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">理想の通いたいペース</label>
                        <select id="target_pace" class="w-full p-3 border border-stone-300 rounded-lg bg-white focus:outline-emerald-500">
                            <option value="しっかり週1〜2回">しっかり週1〜2回（本気で変わりたい）</option>
                            <option value="まずは月2回〜">まずは月2回〜（無理なく続けたい）</option>
                            <option value="不定期で都度利用">不定期で都度利用したい</option>
                        </select>
                    </div>
                    <div class="flex space-x-3">
                        <button type="button" onclick="nextStep(2)" class="w-1/3 bg-stone-200 text-stone-700 p-3 rounded-lg font-bold hover:bg-stone-300 transition">戻る</button>
                        <button type="button" onclick="submitForm()" id="submitBtn" class="w-2/3 bg-emerald-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-emerald-700 transition">予約を確定する</button>
                    </div>
                </div>

            </form>
        </main>
    </div>

    <script>
        const LIFF_ID = '2010377734-4tHMhUx6'; 
        const WORKER_URL = 'https://yoga-liff-webhook.dpromstk2000.workers.dev'; 

        let userId = "";

        // カレンダーの初期化（過去日不可 ＆ 3ヶ月先まで制限）
        function initDatePicker() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            const todayString = now.toISOString().slice(0, 10); 
            
            const maxDate = new Date();
            maxDate.setMonth(maxDate.getMonth() + 3);
            maxDate.setMinutes(maxDate.getMinutes() - maxDate.getTimezoneOffset());
            const maxDateString = maxDate.toISOString().slice(0, 10); 
            
            const dayInput = document.getElementById("visit_day");
            dayInput.min = todayString;     
            dayInput.max = maxDateString;   
            dayInput.value = todayString;   
        }

        // LIFFの初期化
        document.addEventListener("DOMContentLoaded", () => {
            initDatePicker();
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        liff.getProfile().then(profile => {
                            userId = profile.userId || "";
                        }).catch(e => console.error(e));
                    }
                })
                .catch((err) => { console.error("LIFF Initialization failed", err); });
        });

        // 画面遷移ロジック
        function nextStep(stepNum) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');
        }

        // Step 1 バリデーション
        function validateAndNext(nextStepNum) {
            const nameInput = document.getElementById("name").value.trim();
            const errorEl = document.getElementById("name_error");
            
            const fullNameRegex = /^[A-Z-a-zぁ-んァ-ヶー一-龠]+[\s ]+[A-Z-a-zぁ-んァ-ヶー一-龠]+$/;
            
            if (!fullNameRegex.test(nameInput)) {
                errorEl.classList.remove("hidden");
                document.getElementById("name").focus();
                return;
            } else {
                errorEl.classList.add("hidden");
            }

            nextStep(nextStepNum);
        }

        // フォーム最終送信処理
        async function submitForm() {
            const btn = document.getElementById("submitBtn");
            const visitDay = document.getElementById("visit_day").value;
            const visitTime = document.getElementById("visit_time").value;
            
            if (!visitDay || !visitTime) {
                alert("希望日と時間を選択してください。");
                return;
            }

            // 日付と時間を結合（例: "2026-06-12 15:30"）
            const combinedVisitDate = `${visitDay} ${visitTime}`;

            btn.disabled = true;
            btn.innerText = "送信中...";

            const goals = [];
            document.querySelectorAll('input[name="primary_goal"]:checked').forEach(cb => goals.push(cb.value));

            const payload = {
                line_user_id: userId || "demo_user_ok",
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                yoga_experience: document.getElementById("yoga_experience").value,
                primary_goal: goals.length > 0 ? goals : ["特になし"],
                preferred_timezone: document.getElementById("preferred_timezone").value,
                target_pace: document.getElementById("target_pace").value,
                visit_date: combinedVisitDate // ここに結合された文字列を格納
            };

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("予約とカルテの送信が完了しました！LINE画面に戻ります。");
                    liff.closeWindow(); 
                } else {
                    const errText = await response.text();
                    alert("システムエラーが発生しました。詳細: " + errText);
                    btn.disabled = false;
                    btn.innerText = "予約を確定する";
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        }
    </script>
</body>
</html>
