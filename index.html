<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>プライベートヨガ 予約・カルテ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-600 mb-4"></div>
        <p class="text-stone-500 text-sm font-medium">お客様の情報を確認中...</p>
    </div>

    <header class="bg-emerald-800 text-white text-center py-4 shadow-md sticky top-0 z-40">
        <h1 class="text-lg font-bold tracking-wider">Private Yoga Studio</h1>
        <p class="text-xs text-emerald-200 mt-1" id="header-subtitle">ご予約・事前カウンセリング</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        <div id="welcome-message" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl p-4 mb-6 shadow-sm">
            <p class="font-bold text-base">おかえりなさい、<span id="customer-name-display"></span>様！</p>
            <p class="text-xs text-emerald-600 mt-1">いつもご利用ありがとうございます。次回のご予約日時をお選びください。</p>
        </div>

        <form id="reservation-form" class="space-y-6">
            <div id="survey-section" class="space-y-6">
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100">
                    <h2 class="text-emerald-800 font-bold border-b pb-2 mb-4 text-sm tracking-wider">Q1. 基本情報</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1">お名前 <span class="text-red-500">*</span></label>
                            <input type="text" id="name" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1">お電話番号 <span class="text-red-500">*</span></label>
                            <input type="tel" id="phone" placeholder="090-0000-0000" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-600 mb-1">ヨガのご経験 <span class="text-red-500">*</span></label>
                            <select id="yoga_experience" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600 bg-white">
                                <option value="">選択してください</option>
                                <option value="初めて">初めて</option>
                                <option value="数回程度">数回程度</option>
                                <option value="定期的に通っていた">定期的に通っていた</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100">
                    <h2 class="text-emerald-800 font-bold border-b pb-2 mb-4 text-sm tracking-wider">Q2. 最も解決したいお悩み <span class="text-red-500">*</span></h2>
                    <select id="primary_goal" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600 bg-white">
                        <option value="">選択してください</option>
                        <option value="肩こり・腰痛などの身体の不調を改善したい">肩こり・腰痛などの身体の不調を改善したい</option>
                        <option value="ダイエット・ボディラインを引き締めたい">ダイエット・ボディラインを引き締めたい</option>
                        <option value="運動不足を解消して体力をつけたい">運動不足を解消して体力をつけたい</option>
                        <option value="ストレスを解消してリラックスしたい">ストレスを解消してリラックスしたい</option>
                        <option value="大人数のスタジオが苦手（マンツーマン希望）">大人数のスタジオが苦手（マンツーマン希望）</option>
                    </select>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100">
                    <h2 class="text-emerald-800 font-bold border-b pb-2 mb-4 text-sm tracking-wider">Q3. 今後の理想の通い方ペース <span class="text-red-500">*</span></h2>
                    <select id="target_pace" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600 bg-white">
                        <option value="">選択してください</option>
                        <option value="週に1回程度">週に1回程度</option>
                        <option value="2週に1回程度">2週に1回程度</option>
                        <option value="月に1回程度">月に1回程度</option>
                        <option value="都度自分のペースで">都度自分のペースで</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-stone-100">
                <h2 class="text-emerald-800 font-bold border-b pb-2 mb-4 text-sm tracking-wider">ご予約日時の選択</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-stone-600 mb-1">ご希望の日付 <span class="text-red-500">*</span></label>
                        <div class="flex items-center space-x-3">
                            <input type="date" id="event_date" class="rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600 bg-white flex-1">
                            <span id="date_display" class="text-sm font-bold text-emerald-700 min-w-[50px] text-center"></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-stone-600 mb-1">ご希望の時間 <span class="text-red-500">*</span></label>
                        <select id="event_time" class="w-full rounded-xl border border-stone-200 p-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600 bg-white">
                            <option value="">選択してください</option>
                            <option value="10:00">10:00</option>
                            <option value="10:30">10:30</option>
                            <option value="11:00">11:00</option>
                            <option value="11:30">11:30</option>
                            <option value="12:00">12:00</option>
                            <option value="12:30">12:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="15:00">15:00</option>
                            <option value="15:30">15:30</option>
                            <option value="16:00">16:00</option>
                            <option value="16:30">16:30</option>
                            <option value="17:00">17:00</option>
                            <option value="17:30">17:30</option>
                            <option value="18:00">18:00</option>
                            <option value="18:30">18:30</option>
                            <option value="19:00">19:00</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="button" id="submit-btn" onclick="submitReservation()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 px-6 rounded-2xl shadow-md transition duration-200 text-sm tracking-wider">
                    予約を確定する
                </button>
            </div>
        </form>
    </main>

    <script>
        const WORKER_URL = "https://yoga-liff-webhook.dpromstk2000.workers.dev"; // ← 自分のWorkerのURL
        const LIFF_ID = "2010377734-4tHMhUx6"; // ← 自分のLIFF ID
        let lineUserId = "";
        let isExisting = false;
        let existingCustomerData = null;

        // 【機能追加】日付変更時に自動で横に（〇曜日）と表示する処理
        document.getElementById("event_date").addEventListener("change", function() {
            const dateVal = this.value;
            const displayEl = document.getElementById("date_display");
            if (!dateVal) {
                displayEl.innerText = "";
                return;
            }
            const days = ["日", "月", "火", "水", "木", "金", "土"];
            const d = new Date(dateVal);
            const dayName = days[d.getDay()];
            displayEl.innerText = `（${dayName}）`;
        });

        // LIFFの初期化
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                
                // 初回かリピート客かの判別
                await checkCustomerStatus(lineUserId);
            } catch (error) {
                console.error("LIFF初期化エラー:", error);
                document.getElementById("loading").innerHTML = `<p class="text-red-500 text-sm font-medium">初期化に失敗しました。LINEから開き直してください。</p>`;
            }
        }

        async function checkCustomerStatus(userId) {
            try {
                const response = await fetch(`${WORKER_URL}?action=get_customer&line_user_id=${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        isExisting = true;
                        existingCustomerData = data[0];
                        
                        // リピート客ならアンケートを隠して歓迎メッセージを表示
                        document.getElementById("survey-section").classList.add("hidden");
                        document.getElementById("customer-name-display").innerText = existingCustomerData.name;
                        document.getElementById("welcome-message").classList.remove("hidden");
                        document.getElementById("header-subtitle").innerText = "次回レッスンのご予約";
                    }
                }
            } catch (err) {
                console.error("ステータス確認エラー:", err);
            } finally {
                document.getElementById("loading").classList.add("hidden");
            }
        }

        // 予約の送信
        async function submitReservation() {
            const date = document.getElementById("event_date").value;
            const time = document.getElementById("event_time").value;
            const btn = document.getElementById("submit-btn");

            if (!date || !time) {
                alert("予約日時を選択してください。");
                return;
            }

            let payload = {
                line_user_id: lineUserId,
                event_date: date,
                event_time: time
            };

            if (!isExisting) {
                const name = document.getElementById("name").value.trim();
                const phone = document.getElementById("phone").value.trim();
                const exp = document.getElementById("yoga_experience").value;
                const goal = document.getElementById("primary_goal").value;
                const pace = document.getElementById("target_pace").value;

                if (!name || !phone || !exp || !goal || !pace) {
                    alert("必須のアンケート項目をすべて入力・選択してください。");
                    return;
                }

                payload.name = name;
                payload.phone = phone;
                payload.yoga_experience = exp;
                payload.primary_goal = goal;
                payload.target_pace = pace;
            } else {
                // リピート客は既存の情報を引き継いで送信
                payload.name = existingCustomerData.name;
                payload.phone = existingCustomerData.phone;
                payload.yoga_experience = existingCustomerData.yoga_experience;
                payload.primary_goal = existingCustomerData.primary_goal;
                payload.target_pace = existingCustomerData.target_pace;
            }

            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert(isExisting ? "次回のご予約を受け付けました！" : "ご予約とアンケートの送信が完了しました！");
                    liff.closeWindow();
                } else {
                    const errJson = await response.json();
                    alert("システムエラーが発生しました。詳細: " + (errJson.error || "不明なエラー"));
                    btn.disabled = false;
                    btn.innerText = "予約を確定する";
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        }

        window.onload = function() {
            initLiff();
        };
    </script>
</body>
</html>
