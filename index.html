<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>プライベートヨガ 予約・事前カウンセリング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased pb-20">

    <div id="loading" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-600 mb-4"></div>
        <p class="text-stone-500 text-sm font-medium">予約フォームを読み込み中...</p>
    </div>

    <header class="bg-emerald-800 text-white text-center py-5 shadow-md sticky top-0 z-40">
        <h1 class="text-lg font-bold tracking-wider">Private Yoga Studio</h1>
        <p class="text-xs text-emerald-200 mt-1">ご予約 ＆ 事前アンケート</p>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        <form id="yoga-form" onsubmit="submitForm(event)" class="space-y-6">

            <script>
                const WORKER_URL = "https://yoga-liff-webhook.dpromstk2000L.workers.dev"; 
                const LIFF_ID = "2010377734-4tHMhUx6"; 
            </script>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-stone-200/80 space-y-4">
                <h2 class="text-emerald-800 font-bold text-base border-b pb-2 flex items-center">
                    <span class="w-1 h-5 bg-emerald-600 rounded mr-2"></span>お客様情報
                </h2>
                
                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-1">お名前 <span class="text-red-500 text-xs">※必須</span></label>
                    <input type="text" id="name" required class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" placeholder="ヨガ 太郎">
                </div>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-1">お電話番号 <span class="text-red-500 text-xs">※必須</span></label>
                    <input type="tel" id="phone" required class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base" placeholder="09012345678">
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-stone-200/80 space-y-5">
                <h2 class="text-emerald-800 font-bold text-base border-b pb-2 flex items-center">
                    <span class="w-1 h-5 bg-emerald-600 rounded mr-2"></span>事前カウンセリング
                </h2>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">Q1. ヨガのご経験について教えてください。</label>
                    <div class="space-y-2">
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="yoga_experience" value="初めて" required class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            ヨガは完全に初めて
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="yoga_experience" value="数回程度" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            数回ほど経験がある
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="yoga_experience" value="定期的に通っていた" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            以前、定期的にスタジオ等に通っていた
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">Q2. 今回最も解決したいお悩みは何ですか？（複数選択可）</label>
                    <div class="grid grid-cols-1 gap-2">
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="checkbox" name="primary_goal" value="肩こり・腰痛改善" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 mr-3">
                            肩こり・腰痛などの身体の不調改善
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="checkbox" name="primary_goal" value="ダイエット・引き締め" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 mr-3">
                            ダイエット・ボディラインの引き締め
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="checkbox" name="primary_goal" value="運動不足・体力向上" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 mr-3">
                            運動不足を解消して体力をつけたい
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="checkbox" name="primary_goal" value="ストレス解消・リラックス" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 mr-3">
                            ストレスを解消してリラックスしたい
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="checkbox" name="primary_goal" value="マンツーマン希望" class="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500 mr-3">
                            大人数が苦手（マンツーマン希望）
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-2">Q3. 今後通われるとしたら、どのペースが理想に近いですか？</label>
                    <div class="space-y-2">
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="target_pace" value="週に1回程度" required class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            週に1回程度
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="target_pace" value="2週に1回程度" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            2週に1回程度
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="target_pace" value="月に1回程度" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            月に1回程度
                        </label>
                        <label class="flex items-center bg-stone-50 p-2.5 rounded-lg border border-stone-200 cursor-pointer text-sm">
                            <input type="radio" name="target_pace" value="都度自分のペースで" class="w-4 h-4 text-emerald-600 focus:ring-emerald-500 mr-3">
                            都度、自分のペースで
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-stone-200/80 space-y-4">
                <h2 class="text-emerald-800 font-bold text-base border-b pb-2 flex items-center">
                    <span class="w-1 h-5 bg-emerald-600 rounded mr-2"></span>ご希望の予約日時
                </h2>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-1">
                        ご希望の日付 <span id="weekday-display" class="text-emerald-600 font-bold ml-1"></span>
                    </label>
                    <input type="date" id="reserve_date" required onchange="updateWeekday()" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base">
                </div>

                <div>
                    <label class="block text-sm font-bold text-stone-700 mb-1">ご希望の時間（30分単位）</label>
                    <select id="reserve_time" required class="w-full px-3 py-2 border border-stone-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base">
                        <option value="">時間を選択してください</option>
                        <option value="10:00">10:00</option>
                        <option value="10:30">10:30</option>
                        <option value="11:00">11:00</option>
                        <option value="11:30">11:30</option>
                        <option value="12:00">12:00</option>
                        <option value="12:30">12:30</option>
                        <option value="13:00">13:00</option>
                        <option value="13:30">13:30</option>
                        <option value="14:00">14:00</option>
                        <option value="14:30">14:30</option>
                        <option value="15:00">15:00</option>
                        <option value="15:30">15:30</option>
                        <option value="16:00">16:00</option>
                        <option value="16:30">16:30</option>
                        <option value="17:00">17:00</option>
                        <option value="17:30">17:30</option>
                        <option value="18:00">18:00</option>
                        <option value="18:30">18:30</option>
                        <option value="19:00">19:00</option>
                    </select>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition duration-200 text-base tracking-wider">
                    予約を確定する
                </button>
            </div>

        </form>
    </div>

    <script>
        let lineUserId = "";

        // 日付が選ばれたら自動で曜日を表示する関数
        function updateWeekday() {
            const dateInput = document.getElementById("reserve_date").value;
            const display = document.getElementById("weekday-display");
            if (!dateInput) {
                display.innerText = "";
                return;
            }
            const days = ["日", "月", "火", "水", "木", "金", "土"];
            const d = new Date(dateInput);
            const dayName = days[d.getDay()];
            display.innerText = `（${dayName}曜日）`;
        }

        // LIFF初期化
        window.onload = function() {
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        liff.getProfile()
                            .then(profile => {
                                lineUserId = profile.userId;
                                // 読み込みが完了したらローディング画面を消す
                                document.getElementById("loading").classList.add("hidden");
                            })
                            .catch(err => {
                                console.error("プロフィール取得失敗:", err);
                                alert("LINE情報の取得に失敗しました。再度お試しください。");
                            });
                    }
                })
                .catch(err => {
                    console.error("LIFF初期化失敗:", err);
                    document.getElementById("loading").innerHTML = `<p class="text-red-500 p-4 text-center font-bold">初期化エラーが発生しました。<br>LINEアプリ内から開いてください。</p>`;
                });
        };

        // フォーム送信処理
        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById("submit-btn");

            if (!lineUserId) {
                alert("LINE IDが取得できていません。お手数ですが再度画面を開き直してください。");
                return;
            }

            // 最も解決したいお悩み（複数チェックボックス）の回収
            const goals = [];
            document.querySelectorAll('input[name="primary_goal"]:checked').forEach(cb => {
                goals.push(cb.value);
            });

            // 送信データの組み立て
            const payload = {
                line_user_id: lineUserId,
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                yoga_experience: document.querySelector('input[name="yoga_experience"]:checked')?.value || "",
                primary_goal: goals.join(", "), // カンマ区切りで1つの文字にする
                target_pace: document.querySelector('input[name="target_pace"]:checked')?.value || "",
                date: document.getElementById("reserve_date").value,
                time: document.getElementById("reserve_time").value
            };

            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("ご予約とアンケートの送信が完了しました！");
                    liff.closeWindow();
                } else {
                    const errText = await response.text();
                    alert("システムエラーが発生しました。詳細: " + errText);
                    btn.disabled = false;
                    btn.innerText = "予約を確定する";
                }
            } catch (error) {
                console.error(error);
                alert("通信エラーが発生しました。電波の良い所で再度お試しください。");
                btn.disabled = false;
                btn.innerText = "予約を確定する";
            }
        }
    </script>
</body>
</html>
