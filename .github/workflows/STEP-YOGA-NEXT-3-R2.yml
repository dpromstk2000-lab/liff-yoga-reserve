      - name: "7. HTML・JavaScript・ID重複・API維持検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import collections
          import datetime as dt
          import hashlib
          import json
          import os
          import re
          import subprocess
          import tempfile

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
                  self.scripts = []
                  self._in_script = False
                  self._parts = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if attrs.get("id"):
                      self.ids.append(attrs["id"])
                  if tag.lower() == "script" and not attrs.get("src"):
                      self._in_script = True
                      self._parts = []

              def handle_data(self, data):
                  if self._in_script:
                      self._parts.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "script" and self._in_script:
                      self.scripts.append("\n".join(self._parts))
                      self._in_script = False
                      self._parts = []

          def inspect_html(file_name):
              path = Path(file_name)
              text = path.read_text(encoding="utf-8")
              inspector = Inspector()
              inspector.feed(text)
              inspector.close()

              duplicates = sorted(k for k, v in collections.Counter(inspector.ids).items() if v > 1)
              if duplicates:
                  raise SystemExit(f"{file_name} HTML ID重複: {duplicates}")

              for i, script in enumerate(inspector.scripts, 1):
                  if not script.strip():
                      continue
                  with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
                      tmp.write(script)
                      temp_name = tmp.name
                  try:
                      check = subprocess.run(["node", "--check", temp_name], text=True, capture_output=True)
                      if check.returncode != 0:
                          raise SystemExit(f"{file_name} JavaScript構文NG inline-{i}: {check.stderr}")
                  finally:
                      Path(temp_name).unlink(missing_ok=True)

              return {"text": text, "bytes": path.stat().st_size}

          owner = inspect_html("owner.html")
          index = inspect_html("index.html")

          if owner["bytes"] > 140000:
              raise SystemExit(f"owner.html容量超過: {owner['bytes']} bytes")
          if index["bytes"] > 100000:
              raise SystemExit(f"index.html容量超過: {index['bytes']} bytes")

          owner_required = {
              "version": "YOGA-NEXT-3-RECEPTION-UNIFIED-20260723",
              "channel_filter": 'id="channel-filter"',
              "manual_channel": 'id="manual-intake-channel"',
              "normalize_channel": "function normalizeIntakeChannel(row={})",
              "channel_badge": "function intakeChannelBadge(row={})",
              "merge_key": "function reservationMergeKey(row, index=0)",
              "duplicate_guard": "function findManualDuplicate",
              "manual_alias": "intake_channel: intakeChannel",
              "phone_source": '"owner_phone"',
              "store_source": '"owner_store"',
              "source_preserved": 'source: "owner_manual"',
              "manual_api": '"/api/admin/reservations/manual-create"',
              "phone_normalization": "normalizePhone",
              "past_date": 'id="manual-date"',
          }
          index_required = {
              "version": "YOGA-NEXT-3-LINE-RECEPTION-20260723",
              "source_preserved": 'source: "liff"',
              "line_intake": 'intake_channel: "line"',
              "line_source": 'reception_source: "line_liff"',
              "line_origin": 'reservation_origin: "customer_line"',
              "reception_type": "function lineReceptionType()",
              "create_api": '"/api/reservations/create"',
              "change_api": '"/api/reservations/change"',
              "cancel_api": '"/api/reservations/cancel"',
              "phone_normalization": "normalizePhone",
              "embed_guard": "IS_EMBED_DEMO",
          }

          missing_owner = [name for name, marker in owner_required.items() if marker not in owner["text"]]
          missing_index = [name for name, marker in index_required.items() if marker not in index["text"]]
          if missing_owner:
              raise SystemExit(f"owner.html必要機能不足: {missing_owner}")
          if missing_index:
              raise SystemExit(f"index.html必要機能不足: {missing_index}")

          if "/api/admin/" in index["text"]:
              raise SystemExit("お客様画面index.htmlに管理APIが混入しています。")
          if "admin-code" in index["text"] or "管理コード" in index["text"]:
              raise SystemExit("お客様画面index.htmlに管理コード情報が混入しています。")

          api_pattern = re.compile(r'''["'](/api/[A-Za-z0-9_./-]+)["']''')
          api_checks = {}
          for file_name in ["owner.html", "index.html"]:
              before = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  text=True,
                  capture_output=True,
                  check=True,
              ).stdout
              after = Path(file_name).read_text(encoding="utf-8")
              before_paths = sorted(set(api_pattern.findall(before)))
              after_paths = sorted(set(api_pattern.findall(after)))
              api_checks[file_name] = {"unchanged": before_paths == after_paths, "paths": after_paths}
              if before_paths != after_paths:
                  raise SystemExit(f"{file_name} APIパスが変更されています。before={before_paths} after={after_paths}")

          unchanged = {}
          for file_name in ["owner-ipad.html", "member.html"]:
              current = Path(file_name).read_bytes()
              before = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  capture_output=True,
                  check=True,
              ).stdout
              unchanged[file_name] = hashlib.sha256(current).hexdigest() == hashlib.sha256(before).hexdigest()
              if not unchanged[file_name]:
                  raise SystemExit(f"{file_name}が変更されています。")

          changed = subprocess.run(
              ["git", "diff", "--name-only", os.environ["BEFORE_SHA"]],
              text=True,
              capture_output=True,
              check=True,
          ).stdout.splitlines()

          forbidden_patterns = [
              re.compile(r"(^|/)worker\.js$", re.I),
              re.compile(r"\.sql$", re.I),
              re.compile(r"supabase", re.I),
              re.compile(r"wrangler", re.I),
          ]
          forbidden = [p for p in changed if any(rx.search(p) for rx in forbidden_patterns)]
          if forbidden:
              raise SystemExit(f"WorkerまたはSupabase変更を検出: {forbidden}")

          result = {
              "ok": True,
              "overall": "OK",
              "step": "YOGA-NEXT-3-R2",
              "completed_step": "YOGA-NEXT-3",
              "r1_failure_effect": "NO_PRODUCT_FILE_CHANGE",
              "checked_at_jst": dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "branch": os.environ.get("GITHUB_REF_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "before_sha": os.environ["BEFORE_SHA"],
              "before_tag": os.environ["BEFORE_TAG"],
              "target_files": ["index.html", "owner.html"],
              "html_syntax": "OK",
              "javascript_syntax": "OK",
              "html_id_duplicates": "OK",
              "existing_function_preservation": "OK",
              "api_path_preservation": api_checks,
              "public_admin_information": "OK",
              "reception_channels": ["line", "phone", "store", "unknown"],
              "line_payload_aliases": "ADDED",
              "manual_channel_select": "ADDED",
              "channel_filter": "ADDED",
              "new_legacy_display_merge": "ADDED",
              "manual_duplicate_warning": "ADDED",
              "unchanged_other_screens": unchanged,
              "owner_bytes": owner["bytes"],
              "index_bytes": index["bytes"],
              "worker_changed": False,
              "supabase_changed": False,
              "api_changed": False,
              "new_api_paths": [],
              "changed_files_before_ledger": changed,
          }

          Path(os.environ["RESULT_FILE"]).write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY

      - name: "8. 受付経路・予約統合業務ロジック検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import subprocess
          import tempfile

          class ScriptParser(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.scripts = []
                  self.in_script = False
                  self.parts = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "script" and not dict(attrs).get("src"):
                      self.in_script = True
                      self.parts = []

              def handle_data(self, data):
                  if self.in_script:
                      self.parts.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "script" and self.in_script:
                      self.scripts.append("\n".join(self.parts))
                      self.in_script = False
                      self.parts = []

          def largest_script(file_name):
              parser = ScriptParser()
              parser.feed(Path(file_name).read_text(encoding="utf-8"))
              scripts = [s for s in parser.scripts if s.strip()]
              if not scripts:
                  raise SystemExit(f"{file_name}のインラインJavaScriptがありません。")
              return max(scripts, key=len)

          owner_script = largest_script("owner.html")
          owner_test = r'''
          if(normalizeIntakeChannel({source:"liff"}) !== "line") throw new Error("liff must be line");
          if(normalizeIntakeChannel({source:"owner_manual", status:"電話予約"}) !== "phone") throw new Error("manual phone");
          if(normalizeIntakeChannel({source:"owner_manual", status:"店頭予約"}) !== "store") throw new Error("manual store");
          if(normalizeIntakeChannel({reception_source:"owner_phone"}) !== "phone") throw new Error("owner_phone");
          if(normalizeIntakeChannel({reception_source:"owner_store"}) !== "store") throw new Error("owner_store");
          if(normalizeIntakeChannel({line_user_id:"U0123456789"}) !== "line") throw new Error("real line id");
          if(normalizeIntakeChannel({source:"legacy_unknown"}) !== "unknown") throw new Error("unknown");

          const mergeA = reservationMergeKey({
            id:"new-api-id", line_user_id:"U100",
            reservation_date:"2026-07-24", reservation_time:"10:00",
            service_code:"trial_60", status:"新規予約"
          });
          const mergeB = reservationMergeKey({
            id:"legacy-id", line_id:"U100",
            booking_date:"2026-07-24", booking_time:"10:00",
            service_code:"trial_60", status:"予約"
          });
          if(mergeA !== mergeB) throw new Error(`merge key mismatch ${mergeA} ${mergeB}`);
          if(intakeChannelMeta("phone").label !== "電話受付") throw new Error("phone label");
          if(intakeChannelMeta("store").label !== "店頭受付") throw new Error("store label");
          console.log("OWNER_RECEPTION_LOGIC_OK");
          '''

          prelude = r'''
          globalThis.window = { location:{search:"",hostname:"example.com"}, setTimeout:()=>0 };
          globalThis.document = {
            getElementById:()=>null, addEventListener:()=>{},
            createElement:()=>({className:"",innerHTML:"",style:{},appendChild:()=>{},remove:()=>{},querySelector:()=>({addEventListener:()=>{}})}),
            body:{appendChild:()=>{}}, querySelectorAll:()=>[]
          };
          globalThis.localStorage = {getItem:()=>null,setItem:()=>{},removeItem:()=>{}};
          globalThis.navigator = {clipboard:{writeText:async()=>{}}};
          globalThis.fetch = async()=>{throw new Error("fetch disabled");};
          globalThis.confirm = ()=>false;
          globalThis.alert = ()=>{};
          globalThis.prompt = ()=>"";
          globalThis.lucide = {createIcons:()=>{}};
          '''

          with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
              tmp.write(prelude + "\n" + owner_script + "\n" + owner_test)
              temp_name = tmp.name
          try:
              run = subprocess.run(["node", temp_name], text=True, capture_output=True)
              print(run.stdout)
              if run.returncode != 0:
                  print(run.stderr)
                  raise SystemExit("受付経路統合ロジック検査NG")
              if "OWNER_RECEPTION_LOGIC_OK" not in run.stdout:
                  raise SystemExit("受付経路統合ロジックPASSを確認できません。")
          finally:
              Path(temp_name).unlink(missing_ok=True)

          index_script = largest_script("index.html")
          index_test = r'''
          isChangeMode = false; isExisting = false;
          if(lineReceptionType() !== "new") throw new Error("new reception");
          isExisting = true;
          if(lineReceptionType() !== "additional") throw new Error("additional reception");
          isChangeMode = true;
          if(lineReceptionType() !== "change") throw new Error("change reception");
          console.log("INDEX_LINE_RECEPTION_LOGIC_OK");
          '''
          index_prelude = r'''
          globalThis.window = {location:{search:""},onload:null};
          globalThis.document = {getElementById:()=>null,querySelectorAll:()=>[]};
          globalThis.navigator = {};
          globalThis.fetch = async()=>{throw new Error("fetch disabled");};
          globalThis.alert = ()=>{};
          globalThis.confirm = ()=>false;
          globalThis.prompt = ()=>"";
          globalThis.liff = {};
          '''

          with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
              tmp.write(index_prelude + "\n" + index_script + "\n" + index_test)
              temp_name = tmp.name
          try:
              run = subprocess.run(["node", temp_name], text=True, capture_output=True)
              print(run.stdout)
              if run.returncode != 0:
                  print(run.stderr)
                  raise SystemExit("LINE受付種別ロジック検査NG")
              if "INDEX_LINE_RECEPTION_LOGIC_OK" not in run.stdout:
                  raise SystemExit("LINE受付種別ロジックPASSを確認できません。")
          finally:
              Path(temp_name).unlink(missing_ok=True)
          PY

