name: "STEP YOGA-NEXT-3-R2 | LINE・電話・店頭予約データ統合 修正版"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-3-R2.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-3-reception-unified
  cancel-in-progress: false

jobs:
  reception-unified:
    name: "YOGA-NEXT-3-R2 reception and reservation unified"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      STEP_NAME: "YOGA-NEXT-3-R2"
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-3-R2.yml"
      FAILED_WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-3.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-3-result.json"
      BEFORE_TAG: "dpro-yoga-next-3-before-20260723"
      EXPECTED_OWNER_BLOB_SHA: "ec8ebcaad11ebc3ed00e000244ad720f58403660"
      EXPECTED_INDEX_BLOB_SHA: "1134cb8e862547698a13c8a36666479eb8956343"
      EXPECTED_LEDGER_BLOB_SHA: "524c03cb0ebb5fa2b36facef2a8c7b0978cf8b27"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・R1未反映確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in \
            index.html \
            owner.html \
            owner-ipad.html \
            member.html \
            dpro-next-ledger.yml \
            dpro-next-yoga-next-2-result.json \
            "$WORKFLOW_PATH"
          do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::YOGA-NEXT-3-R2の必須ファイルがありません。"
              exit 1
            fi
          done

          grep -q 'current_step: "YOGA-NEXT-2-COMPLETE"' "$LEDGER_FILE" || {
            echo "::error file=$LEDGER_FILE::前STEP YOGA-NEXT-2-COMPLETEを確認できません。"
            exit 1
          }

          owner_blob="$(git hash-object owner.html)"
          index_blob="$(git hash-object index.html)"
          ledger_blob="$(git hash-object "$LEDGER_FILE")"

          [[ "$owner_blob" == "$EXPECTED_OWNER_BLOB_SHA" ]] || { echo "::error file=owner.html::R1実行後にowner.htmlが変更されています。"; exit 1; }
          [[ "$index_blob" == "$EXPECTED_INDEX_BLOB_SHA" ]] || { echo "::error file=index.html::R1実行後にindex.htmlが変更されています。"; exit 1; }
          [[ "$ledger_blob" == "$EXPECTED_LEDGER_BLOB_SHA" ]] || { echo "::error file=$LEDGER_FILE::完成台帳が変更されています。"; exit 1; }

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            before_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            before_reason="existing_r1_backup_tag"
          else
            before_sha="$(git rev-parse HEAD^)"
            before_reason="workflow_upload_parent"
          fi

          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "BEFORE_REASON=$before_reason" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-3-R2"
            echo ""
            echo "- R1原因: channel filter UI 完全一致置換 0件"
            echo "- R2修正: IDと要素構造を基準にした正規表現置換"
            echo "- R1による公開ファイル変更: なし"
            echo "- Worker / Supabase / API URL変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            if [[ "$tag_sha" != "$BEFORE_SHA" ]]; then
              echo "::error::既存タグと変更前SHAが一致しません。タグ=$tag_sha / 変更前=$BEFORE_SHA"
              exit 1
            fi
            tag_status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-3"
            git push origin "$BEFORE_TAG"
            tag_status="created"
          fi

          echo "BEFORE_TAG_STATUS=$tag_status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. index.html LINE受付メタデータ標準化"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が1件ではありません。count={count}")
              text = text.replace(old, new, 1)

          replace_once(
              "<title>DPRO YOGA LINE 予約フォーム</title>",
              "<title>DPRO YOGA LINE 予約フォーム | YOGA-NEXT-3</title>",
              "index title"
          )

          replace_once(
              '''  const LIFF_ID = "2010377734-4tHMhUx6";
            const SHOP_CODE = "yoga_demo";''',
              '''  const LIFF_ID = "2010377734-4tHMhUx6";
            const SHOP_CODE = "yoga_demo";
            const STEP_VERSION = "YOGA-NEXT-3-LINE-RECEPTION-20260723";''',
              "index version"
          )

          replace_once(
              '''  function buildPayload() {''',
              '''  function lineReceptionType() {
              if (isChangeMode) return "change";
              if (isExisting) return "additional";
              return "new";
            }

            function buildPayload() {''',
              "line reception helper"
          )

          replace_once(
              '''      request_note: document.getElementById("request_note").value.trim(),
                source: "liff",
                is_existing: isExisting,''',
              '''      request_note: document.getElementById("request_note").value.trim(),
                source: "liff",
                intake_channel: "line",
                booking_channel: "line",
                reception_channel: "line",
                reception_source: "line_liff",
                reservation_origin: "customer_line",
                contact_channel: "line",
                reception_type: lineReceptionType(),
                client_step_version: STEP_VERSION,
                is_existing: isExisting,''',
              "line reception payload"
          )

          replace_once(
              '''        service_name: payload.service_name,
                  service_minutes: selectedService?.base_minutes || 60,''',
              '''        service_name: payload.service_name,
                  source: "liff",
                  intake_channel: "line",
                  reception_source: "line_liff",
                  reception_type: payload.reception_type,
                  service_minutes: selectedService?.base_minutes || 60,''',
              "last submitted metadata"
          )

          replace_once(
              '''        customer_name: existingCustomerData?.name || lineDisplayName || "",
                  reservation_id: target.id || "",''',
              '''        customer_name: existingCustomerData?.name || lineDisplayName || "",
                  source: "liff",
                  intake_channel: "line",
                  booking_channel: "line",
                  reception_channel: "line",
                  reception_source: "line_liff",
                  reservation_origin: "customer_line",
                  contact_channel: "line",
                  reception_type: "cancel",
                  client_step_version: STEP_VERSION,
                  reservation_id: target.id || "",''',
              "cancel reception payload"
          )

          path.write_text(text, encoding="utf-8")
          print("index.html YOGA-NEXT-3 patch applied")
          PY

      - name: "6. owner.html 受付経路統合・重複表示整理 R2"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("owner.html")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が1件ではありません。count={count}")
              text = text.replace(old, new, 1)

          def replace_regex(pattern: str, replacement: str, label: str, flags=0) -> None:
              global text
              updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 正規表現置換対象が1件ではありません。count={count}")
              text = updated

          replace_once(
              "<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-2</title>",
              "<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-3</title>",
              "owner title"
          )
          replace_once(
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-2</p>',
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-3</p>',
              "owner step label"
          )
          replace_once(
              '<p class="text-sm text-slate-500 mt-2">最初に今日やることだけを表示し、顧客・全履歴は必要な時だけ読み込みます。</p>',
              '<p class="text-sm text-slate-500 mt-2">LINE・電話・店頭の予約を同じ一覧で管理し、受付経路を一目で確認できます。</p>',
              "owner header help"
          )
          replace_once(
              'const STEP_VERSION = "YOGA-NEXT-2-OWNER-TODAY-LAZY-LOAD-20260723";',
              'const STEP_VERSION = "YOGA-NEXT-3-RECEPTION-UNIFIED-20260723";',
              "owner version"
          )

          replace_regex(
              r'''(?P<indent>^[ \t]*)<div class="grid grid-cols-2 gap-3">\s*<select\b(?=[^>]*\bid="status-filter")[^>]*>.*?</select>\s*<select\b(?=[^>]*\bid="sort-filter")[^>]*>.*?</select>\s*</div>''',
              '''          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                      <select id="status-filter" onchange="applyFilters()" class="select-ui">
                        <option value="all">状態すべて</option>
                        <option value="新規予約">新規予約</option>
                        <option value="次回予約">次回予約</option>
                        <option value="予約変更">予約変更</option>
                        <option value="電話予約">電話予約</option>
                        <option value="店頭予約">店頭予約</option>
                        <option value="電話・店頭予約">旧・電話店頭</option>
                        <option value="キャンセル">キャンセル</option>
                      </select>
                      <select id="channel-filter" onchange="applyFilters()" class="select-ui">
                        <option value="all">受付経路すべて</option>
                        <option value="line">LINE受付</option>
                        <option value="phone">電話受付</option>
                        <option value="store">店頭受付</option>
                        <option value="unknown">その他・旧データ</option>
                      </select>
                      <select id="sort-filter" onchange="applyFilters()" class="select-ui">
                        <option value="time_asc">日時が早い順</option>
                        <option value="time_desc">日時が遅い順</option>
                        <option value="created_desc">新しい順</option>
                      </select>
                    </div>''',
              "channel filter UI",
              flags=re.M | re.S
          )

          replace_once(
              '<div><p class="section-label">Manual Booking</p><h2 class="text-2xl font-black text-slate-800 mt-1">電話・店頭予約を追加</h2><p class="text-sm text-slate-500 mt-2">既存顧客を選ぶと入力を省略できます。LINE未連携のお客様は、電話番号で顧客管理し、画面上も「LINE未連携」として表示します。</p></div>',
              '<div><p class="section-label">Manual Booking</p><h2 class="text-2xl font-black text-slate-800 mt-1">電話・店頭予約を追加</h2><p class="text-sm text-slate-500 mt-2">受付経路を選ぶだけで、LINE予約と同じ予約一覧へ統合されます。既存顧客を選ぶと入力を省略できます。</p></div>',
              "manual modal help"
          )

          replace_regex(
              r'''<label\b[^>]*>メニュー\s*<select\b(?=[^>]*\bid="manual-service")[^>]*>.*?</select>\s*</label>\s*<label\b[^>]*>状態\s*<select\b(?=[^>]*\bid="manual-status")[^>]*>.*?</select>\s*</label>''',
              '''            <label class="text-sm font-bold text-slate-700">メニュー<select id="manual-service" class="select-ui mt-1"></select></label>
                      <label class="text-sm font-bold text-slate-700">受付経路<select id="manual-intake-channel" class="select-ui mt-1"><option value="phone">電話</option><option value="store">店頭</option></select></label>
                      <label class="text-sm font-bold text-slate-700">状態<select id="manual-status" class="select-ui mt-1"><option>電話・店頭予約</option><option>新規予約</option><option>次回予約</option></select></label>''',
              "manual channel select",
              flags=re.S
          )

          helper_functions = 'function stableManualLineId(phone, name){\n  const digits = normalizePhone(phone);\n  if(digits) return `PHONE_MANUAL_${digits}`;\n  const safeName = compact(name).replace(/[^A-Za-z0-9一-龥ぁ-んァ-ヶー]/g, "").slice(0, 24);\n  return `OWNER_MANUAL_${safeName || Date.now()}`;\n}\n\nfunction normalizeIntakeChannel(row={}){\n  const explicit = compact(row.intake_channel || row.booking_channel || row.reception_channel || row.reception_source || row.source).toLowerCase();\n  const status = compact(row.status || row.customer_status || "");\n  const combined = `${explicit} ${status}`.toLowerCase();\n\n  if(explicit.includes("owner_manual")){\n    if(status.includes("店頭") && !status.includes("電話")) return "store";\n    if(status.includes("電話") && !status.includes("店頭")) return "phone";\n    return "phone";\n  }\n  if(combined.includes("店頭") || /(^|[_\\s-])(store|counter|in[_-]?person)([_\\s-]|$)/.test(combined)) return "store";\n  if(combined.includes("電話") || /(^|[_\\s-])(phone|tel|telephone)([_\\s-]|$)/.test(combined)) return "phone";\n  if(combined.includes("line") || combined.includes("liff")) return "line";\n\n  const rawLine = row.raw_line_id || row.line_user_id || row.line_id || "";\n  if(realLineId(rawLine)) return "line";\n  return "unknown";\n}\n\nfunction intakeChannelMeta(row={}){\n  const channel = typeof row === "string" ? row : normalizeIntakeChannel(row);\n  const map = {\n    line: { code:"line", label:"LINE受付", short:"LINE", badge:"bg-emerald-50 text-emerald-700" },\n    phone: { code:"phone", label:"電話受付", short:"電話", badge:"bg-sky-50 text-sky-700" },\n    store: { code:"store", label:"店頭受付", short:"店頭", badge:"bg-amber-50 text-amber-800" },\n    unknown: { code:"unknown", label:"その他・旧データ", short:"その他", badge:"bg-slate-100 text-slate-600" },\n  };\n  return map[channel] || map.unknown;\n}\n\nfunction intakeChannelBadge(row={}){\n  const meta = intakeChannelMeta(row);\n  return `<span class="badge ${meta.badge}">${meta.label}</span>`;\n}\n\nfunction reservationMergeKey(row, index=0){\n  const rawLine = realLineId(row?.raw_line_id || row?.line_user_id || row?.line_id || "");\n  const phone = normalizePhone(row?.phone || row?.customer_phone || row?.tel || "");\n  const name = compact(row?.name || row?.customer_name || "");\n  const customer = rawLine || phone || name || `unknown-${index}`;\n  const date = row?.reservation_date || row?.booking_date || "";\n  const time = normalizeTime(row?.reservation_time || row?.booking_time || "", "");\n  const service = compact(row?.service_code || row?.service_name || row?.service || "");\n  const status = compact(row?.status || "");\n  const statusGroup = status.includes("キャンセル") ? "cancel" : status.includes("変更") ? "change" : "active";\n  return `${customer}|${date}|${time}|${service}|${statusGroup}`;\n}\n\nfunction loadedReservationRows(){\n  return [\n    ...(state.day?.today_reservations || []),\n    ...(state.day?.next_business_reservations || []),\n    ...(state.day?.cancelled_or_changed_today || []),\n    ...state.legacyEvents,\n  ].map(normalizeEvent);\n}\n\nfunction findManualDuplicate({ lineId, phone, name, date, time, serviceCode }){\n  const realLine = realLineId(lineId || "");\n  const normalizedPhone = normalizePhone(phone || "");\n  const normalizedName = compact(name);\n  const normalizedTime = normalizeTime(time || "", "");\n\n  return loadedReservationRows().find(row => {\n    const status = compact(row.status);\n    if(status.includes("キャンセル")) return false;\n    if(row.reservation_date !== date || normalizeTime(row.reservation_time || "", "") !== normalizedTime) return false;\n    if(serviceCode && row.service_code && String(row.service_code) !== String(serviceCode)) return false;\n\n    const rowLine = realLineId(row.raw_line_id || row.line_user_id || row.line_id || "");\n    const rowPhone = normalizePhone(row.phone || row.customer_phone || "");\n    const rowName = compact(row.name || row.customer_name || "");\n    return Boolean(\n      (realLine && rowLine && realLine === rowLine) ||\n      (normalizedPhone && rowPhone && normalizedPhone === rowPhone) ||\n      (normalizedName && rowName && normalizedName === rowName)\n    );\n  }) || null;\n}'

          replace_regex(
              r'''function stableManualLineId\(phone, name\)\{.*?\n\}''',
              helper_functions,
              "reception helper functions",
              flags=re.S
          )

          replace_regex(
              r'''function normalizeEvent\(row, index=0\)\{\n.*?\n\}\n\nfunction customerKey''',
              '''function normalizeEvent(row, index=0){
            const channel = normalizeIntakeChannel(row || {});
            return {
              ...row,
              _type: "event",
              _key: eventKey(row, index),
              raw_line_id: row.line_user_id || row.line_id || "",
              line_id: realLineId(row.line_user_id || row.line_id || ""),
              line_user_id: realLineId(row.line_user_id || row.line_id || ""),
              name: row.customer_name || row.name || "",
              phone: normalizePhone(row.phone || row.customer_phone || row.tel || "") || row.phone || row.customer_phone || "",
              reservation_time: normalizeTime(row.reservation_time || row.booking_time || "", ""),
              reservation_date: row.reservation_date || row.booking_date || "",
              status: row.status || "",
              service_code: row.service_code || "",
              service_name: row.service_name || row.service || "",
              request_note: row.request_note || row.memo || "",
              intake_channel: channel,
              intake_channel_label: intakeChannelMeta(channel).label,
              reception_source: row.reception_source || row.source || "",
            };
          }

          function customerKey''',
              "normalize event",
              flags=re.S
          )

          replace_regex(
              r'''function lineConnectionBadge\(value, source=""\)\{\n.*?\n\}\nfunction lineDisplayText\(value, source=""\)\{\n.*?\n\}''',
              '''function lineConnectionBadge(value, source=""){
            const real = realLineId(value);
            if(real) return `<span class="badge bg-emerald-50 text-emerald-700">LINE連携</span>`;
            const meta = intakeChannelMeta({ raw_line_id:value, source, status:source });
            const label = meta.code === "store" ? "LINE未連携・店頭受付" : meta.code === "phone" ? "LINE未連携・電話受付" : "LINE未連携";
            return `<span class="badge bg-slate-100 text-slate-600">${label}</span>`;
          }
          function lineDisplayText(value, source=""){
            const real = realLineId(value);
            if(real) return real;
            const meta = intakeChannelMeta({ raw_line_id:value, source, status:source });
            if(meta.code === "store") return "未連携（店頭受付）";
            if(meta.code === "phone") return "未連携（電話受付）";
            return "未連携";
          }''',
              "line connection labels",
              flags=re.S
          )

          replace_regex(
              r'''function filterRows\(rows, type\)\{\n.*?\n\}\n\nfunction sortRows''',
              '''function filterRows(rows, type){
            const rawQ = compact($("search-input")?.value);
            const q = normalizeSearchText(rawQ);
            const status = $("status-filter")?.value || "all";
            const channel = $("channel-filter")?.value || "all";
            return (rows || []).filter(row => {
              const relatedCustomer = type === "event" ? findCustomerForRow(row) : null;
              const channelMeta = type === "event" ? intakeChannelMeta(row) : intakeChannelMeta("unknown");
              const text = normalizeSearchText(`${JSON.stringify(row || {})} ${JSON.stringify(relatedCustomer || {})} ${channelMeta.label} ${channelMeta.short}`);
              const qOk = !rawQ || text.includes(q) || phoneMatches(rawQ, row.phone, row.customer_phone, row.tel, relatedCustomer?.phone, relatedCustomer?.tel);
              const statusValue = row.status || row.customer_status || "";
              const statusOk = status === "all" || String(statusValue).includes(status);
              const channelOk = type !== "event" || channel === "all" || normalizeIntakeChannel(row) === channel;
              return qOk && statusOk && channelOk;
            });
          }

          function sortRows''',
              "channel filter logic",
              flags=re.S
          )

          replace_regex(
              r'''function renderReservationRow\(row\)\{\n.*?\n\}\n\nfunction renderFollowupRow''',
              '''function renderReservationRow(row){
            const customer = findCustomerForRow(row);
            const name = row.name || row.customer_name || customer?.name || "お客様";
            const phone = customer?.phone || row.phone || "";
            const status = row.status || "予約";
            const rawLine = row.raw_line_id || row.line_user_id || row.line_id || customer?.raw_line_id || customer?.line_id || "";
            const sourceText = row.reception_source || row.source || status || "";
            const messageLabel = realLineId(rawLine) ? "LINE文面" : "LINE登録案内";
            return `<article class="rounded-[24px] bg-white/82 border border-slate-100 p-5 hover:bg-white transition">
              <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div class="min-w-0">
                  <div class="flex flex-wrap items-center gap-2"><span class="badge bg-slate-50 text-slate-600">レッスン予定</span>${intakeChannelBadge(row)}<span class="badge ${statusBadgeClass(status)}">${escapeHtml(status)}</span>${lineConnectionBadge(rawLine, sourceText)}</div>
                  <h3 class="text-lg font-black text-slate-800 mt-2">${escapeHtml(name)}</h3>
                  <p class="text-sm text-slate-500 mt-1">${escapeHtml(formatDate(row.reservation_date))} ${escapeHtml(normalizeTime(row.reservation_time || "", ""))} / ${escapeHtml(row.service_name || "レッスン")}</p>
                  <p class="text-sm text-slate-600 mt-2 leading-7 whitespace-pre-wrap">${escapeHtml(row.request_note || row.memo || customer?.owner_memo || "")}</p>
                </div>
                <div class="flex flex-wrap lg:justify-end gap-2">
                  <button onclick="selectReservation('${escapeHtml(row._key || eventKey(row))}')" class="rounded-full bg-white border border-slate-200 px-4 py-2 text-xs font-black text-slate-700">詳細</button>
