          workflow_self_delete_after_success: true
          failed_workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "10. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "YOGA-NEXT-3-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-4"' "$LEDGER_FILE"
          grep -q 'applied_revision: "R2"' "$LEDGER_FILE"
          grep -q '"overall": "OK"' "$RESULT_FILE"
          grep -q 'YOGA-NEXT-3-RECEPTION-UNIFIED-20260723' owner.html
          grep -q 'YOGA-NEXT-3-LINE-RECEPTION-20260723' index.html
          grep -q 'id="manual-intake-channel"' owner.html
          grep -q 'id="channel-filter"' owner.html
          grep -q 'source: "owner_manual"' owner.html
          grep -q 'source: "liff"' index.html

          allowed_regex='^(index\.html|owner\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-3-result\.json|\.github/workflows/STEP-YOGA-NEXT-3\.yml|\.github/workflows/STEP-YOGA-NEXT-3-R2\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed_regex" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "::error::想定外の変更ファイルがあります:"
            echo "$unexpected"
            exit 1
          fi

          {
            echo ""
            echo "### YOGA-NEXT-3-R2 検査結果"
            echo "- LINE・電話・店頭受付の正規化: OK"
            echo "- 受付経路表示・検索: OK"
            echo "- 新旧API表示重複統合: OK"
            echo "- 電話・店頭予約重複警告: OK"
            echo "- 既存API URL維持: OK"
            echo "- お客様画面への管理情報混入: なし"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "11. 成功後R1・R2 YMLを削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$FAILED_WORKFLOW_PATH" "$WORKFLOW_PATH"
          test ! -f "$FAILED_WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "12. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html owner.html "$LEDGER_FILE" "$RESULT_FILE"
          git add -A .github/workflows

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "fix(yoga-next): complete YOGA-NEXT-3 R2 reception data unification [skip ci]"
          git push origin HEAD:main

          {
            echo ""
            echo "### 完了"
            echo "- current_step: \`YOGA-NEXT-3-COMPLETE\`"
            echo "- next_step: \`YOGA-NEXT-4\`"
            echo "- 適用版: \`R2\`"
            echo "- Worker / Supabase / API変更: なし"
            echo "- R1・R2 YML: 削除済み"
            echo "- 自動Commit・Push: 完了"
          } >> "$GITHUB_STEP_SUMMARY"
