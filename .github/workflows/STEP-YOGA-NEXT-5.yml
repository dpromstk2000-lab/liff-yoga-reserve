      - name: "8. HTML・JavaScript・ID重複・既存機能検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import collections
          import datetime as dt
          import hashlib
          import json
          import os
          import re
          import subprocess
          import tempfile

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
                  self.scripts = []
                  self._in_script = False
                  self._parts = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if attrs.get("id"):
                      self.ids.append(attrs["id"])
                  if tag.lower() == "script" and not attrs.get("src"):
                      self._in_script = True
                      self._parts = []

              def handle_data(self, data):
                  if self._in_script:
                      self._parts.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "script" and self._in_script:
                      self.scripts.append("\n".join(self._parts))
                      self._in_script = False
                      self._parts = []

          def inspect_html(file_name):
              path = Path(file_name)
              text = path.read_text(encoding="utf-8")
              parser = Inspector()
              parser.feed(text)
              parser.close()

              duplicates = sorted(k for k, v in collections.Counter(parser.ids).items() if v > 1)
              if duplicates:
                  raise SystemExit(f"{file_name} HTML ID重複: {duplicates}")

              for index, script in enumerate(parser.scripts, 1):
                  if not script.strip():
                      continue
                  with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
                      tmp.write(script)
                      temp_name = tmp.name
                  try:
                      check = subprocess.run(["node", "--check", temp_name], text=True, capture_output=True)
                      if check.returncode != 0:
                          raise SystemExit(f"{file_name} JavaScript構文NG inline-{index}: {check.stderr}")
                  finally:
                      Path(temp_name).unlink(missing_ok=True)

              return {"text": text, "bytes": path.stat().st_size}

          owner = inspect_html("owner.html")
          ipad = inspect_html("owner-ipad.html")

          if owner["bytes"] > 155000:
              raise SystemExit(f"owner.html容量超過: {owner['bytes']} bytes")
          if ipad["bytes"] > 85000:
              raise SystemExit(f"owner-ipad.html容量超過: {ipad['bytes']} bytes")

          owner_required = {
              "version": "YOGA-NEXT-5-LESSON-RECORD-20260723",
              "modal": 'id="lesson-record-modal"',
              "condition": 'id="lesson-condition"',
              "content": 'id="lesson-content"',
              "attention": 'id="lesson-attention"',
              "handoff": 'id="lesson-handoff"',
              "next_date": 'id="lesson-next-date"',
              "detail_preview": 'id="detail-lesson-record"',
              "save_function": "async function saveLessonRecord()",
              "open_function": "function openLessonRecord(row)",
              "api": '"/api/admin/reservations/save-lesson-record"',
              "record_guard": 'meta.status === "completed"',
              "existing_workflow_api": '"/api/admin/reservations/update-workflow"',
              "phone_normalization": "normalizePhone",
              "past_guard": 'id="manual-date"',
          }
          ipad_required = {
              "version": "YOGA-NEXT-5-IPAD-LESSON-RECORD-20260723",
              "modal": 'id="lesson-record-modal"',
              "condition": 'id="lesson-condition"',
              "content": 'id="lesson-content"',
              "attention": 'id="lesson-attention"',
              "handoff": 'id="lesson-handoff"',
              "next_date": 'id="lesson-next-date"',
              "save_function": "async function saveLessonRecord()",
              "api": '"/api/admin/reservations/save-lesson-record"',
              "record_guard": 'meta.status === "completed"',
              "existing_workflow_api": '"/api/admin/reservations/update-workflow"',
              "phone_normalization": "normalizePhone",
              "past_guard": 'id="manual-date"',
          }

          missing_owner = [name for name, marker in owner_required.items() if marker not in owner["text"]]
          missing_ipad = [name for name, marker in ipad_required.items() if marker not in ipad["text"]]
          if missing_owner:
              raise SystemExit(f"owner.html必須機能不足: {missing_owner}")
          if missing_ipad:
              raise SystemExit(f"owner-ipad.html必須機能不足: {missing_ipad}")

          if 'source_screen: "owner.html"' not in owner["text"]:
              raise SystemExit("PC記録保存元の識別がありません。")
          if 'source_screen: "owner-ipad.html"' not in ipad["text"]:
              raise SystemExit("iPad記録保存元の識別がありません。")

          api_pattern = re.compile(r'["\'](/api/[A-Za-z0-9_./-]+)["\']')
          api_checks = {}
          for file_name in ["owner.html", "owner-ipad.html"]:
              before = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  text=True,
                  capture_output=True,
                  check=True,
              ).stdout
              after = Path(file_name).read_text(encoding="utf-8")
              before_paths = set(api_pattern.findall(before))
              after_paths = set(api_pattern.findall(after))
              missing_paths = sorted(before_paths - after_paths)
              if missing_paths:
                  raise SystemExit(f"{file_name} 既存APIパス消失: {missing_paths}")
              added_paths = sorted(after_paths - before_paths)
              if added_paths != ["/api/admin/reservations/save-lesson-record"]:
                  raise SystemExit(f"{file_name} 想定外のAPI追加: {added_paths}")
              api_checks[file_name] = {"existing_paths_preserved": True, "added_paths": added_paths}

          unchanged = {}
          for file_name in ["index.html", "member.html"]:
              current = Path(file_name).read_bytes()
              before = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  capture_output=True,
                  check=True,
              ).stdout
              unchanged[file_name] = hashlib.sha256(current).hexdigest() == hashlib.sha256(before).hexdigest()
              if not unchanged[file_name]:
                  raise SystemExit(f"{file_name}が変更されています。")

          index_text = Path("index.html").read_text(encoding="utf-8")
          if "/api/admin/" in index_text or "lesson-record-modal" in index_text or "管理コード" in index_text:
              raise SystemExit("お客様画面に管理用レッスン記録情報が混入しています。")

          changed = subprocess.run(
              ["git", "diff", "--name-only", os.environ["BEFORE_SHA"]],
              text=True,
              capture_output=True,
              check=True,
          ).stdout.splitlines()

          forbidden_patterns = [
              re.compile(r"(^|/)worker\.js$", re.I),
              re.compile(r"\.sql$", re.I),
              re.compile(r"supabase", re.I),
              re.compile(r"wrangler", re.I),
          ]
          forbidden = [p for p in changed if any(rx.search(p) for rx in forbidden_patterns)]
          if forbidden:
              raise SystemExit(f"GitHubリポジトリ内にWorker・SQL変更を検出: {forbidden}")

          result = {
              "ok": True,
              "overall": "OK",
              "step": "YOGA-NEXT-5",
              "checked_at_jst": dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "branch": os.environ.get("GITHUB_REF_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "before_sha": os.environ["BEFORE_SHA"],
              "before_tag": os.environ["BEFORE_TAG"],
              "target_files": ["owner.html", "owner-ipad.html"],
              "html_syntax": "OK",
              "javascript_syntax": "OK",
              "html_id_duplicates": "OK",
              "existing_function_preservation": "OK",
              "api_checks": api_checks,
              "lesson_record_fields": [
                  "lesson_condition",
                  "lesson_content",
                  "lesson_attention",
                  "lesson_handoff",
                  "next_recommended_date",
              ],
              "customer_screens_unchanged": unchanged,
              "public_admin_information": "OK",
              "owner_bytes": owner["bytes"],
              "ipad_bytes": ipad["bytes"],
              "worker_version": os.environ["EXPECTED_WORKER_VERSION"],
              "worker_source_sha256": os.environ["EXPECTED_WORKER_SHA256"],
              "worker_changed": True,
              "supabase_changed": True,
              "api_changed": True,
              "new_api_paths": [
                  "GET /api/admin/lesson-record/check",
                  "POST /api/admin/reservations/save-lesson-record",
              ],
              "changed_files_before_ledger": changed,
          }

          Path(os.environ["RESULT_FILE"]).write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY

