name: "STEP YOGA-NEXT-5 | レッスン記録・引継ぎ・次回おすすめ"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-5.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-5-lesson-record
  cancel-in-progress: false

jobs:
  lesson-record:
    name: "YOGA-NEXT-5 lesson record"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      STEP_NAME: "YOGA-NEXT-5"
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-5.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-5-result.json"
      BEFORE_TAG: "dpro-yoga-next-5-before-20260723"
      EXPECTED_OWNER_BLOB_SHA: "095136473e929be3d3ee37e21f014dc69a501a9a"
      EXPECTED_IPAD_BLOB_SHA: "470754f86081cd6c99eed24f41f7ac41c9cc8ce9"
      EXPECTED_INDEX_BLOB_SHA: "df33c788e773bd1417d5e75cd9d4a15a90595573"
      EXPECTED_MEMBER_BLOB_SHA: "caceca635815dcc21699b2bedb88e3f948ceeba4"
      EXPECTED_LEDGER_BLOB_SHA: "0fe392e85d409fa2f314c8abcfc18c14327c5e81"
      EXPECTED_WORKER_VERSION: "YOGA-NEXT-5-LESSON-RECORD-20260723"
      EXPECTED_WORKER_SHA256: "0d06037bd9956e97efc60c97639ab65ac231e354821f1c4bd5c7788054e56658"
      WORKER_URL: "https://yoga-liff-webhook.dpromstk2000.workers.dev"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・基準状態確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in \
            owner.html \
            owner-ipad.html \
            index.html \
            member.html \
            dpro-next-ledger.yml \
            dpro-next-yoga-next-4-result.json \
            "$WORKFLOW_PATH"
          do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::YOGA-NEXT-5の必須ファイルがありません。"
              exit 1
            fi
          done

          grep -q 'current_step: "YOGA-NEXT-4-COMPLETE"' "$LEDGER_FILE" || {
            echo "::error file=$LEDGER_FILE::前STEP YOGA-NEXT-4-COMPLETEを確認できません。"
            exit 1
          }

          declare -A expected=(
            ["owner.html"]="$EXPECTED_OWNER_BLOB_SHA"
            ["owner-ipad.html"]="$EXPECTED_IPAD_BLOB_SHA"
            ["index.html"]="$EXPECTED_INDEX_BLOB_SHA"
            ["member.html"]="$EXPECTED_MEMBER_BLOB_SHA"
            ["$LEDGER_FILE"]="$EXPECTED_LEDGER_BLOB_SHA"
          )

          for file in "${!expected[@]}"; do
            actual="$(git hash-object "$file")"
            if [[ "$actual" != "${expected[$file]}" ]]; then
              echo "::error file=$file::確認済みNEXT-4完成版と一致しません。期待=${expected[$file]} / 現在=$actual"
              exit 1
            fi
          done

          mapfile -t head_changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"
          before_reason="current_head"

          if [[ "${#head_changed[@]}" -eq 1 && "${head_changed[0]}" == "$WORKFLOW_PATH" ]]; then
            before_sha="$(git rev-parse HEAD^)"
            before_reason="workflow_upload_parent"
          fi

          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "BEFORE_REASON=$before_reason" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-5"
            echo ""
            echo "- STEP名: レッスン記録・引継ぎ・次回おすすめ"
            echo "- 前STEP: YOGA-NEXT-4-COMPLETE"
            echo "- 対象画面: owner.html / owner-ipad.html"
            echo "- Worker変更: あり"
            echo "- Supabase変更: あり・非破壊"
            echo "- 既存予約status: 変更しない"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ作成"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            if [[ "$tag_sha" != "$BEFORE_SHA" ]]; then
              echo "::error::既存タグ $BEFORE_TAG が別SHAを指しています。既存=$tag_sha / 今回=$BEFORE_SHA"
              exit 1
            fi
            tag_status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-5"
            git push origin "$BEFORE_TAG"
            tag_status="created"
          fi

          echo "BEFORE_TAG_STATUS=$tag_status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. Worker・Supabaseレッスン記録機能の稼働確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          base = os.environ["WORKER_URL"].rstrip("/")
          expected = os.environ["EXPECTED_WORKER_VERSION"]
          nonce = str(int(time.time()))

          def get_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "Cache-Control": "no-cache",
                      "User-Agent": "DPRO-YOGA-NEXT-5-ACTIONS",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  body = response.read().decode("utf-8")
                  return json.loads(body)

          health = get_json(f"{base}/api/health?t={nonce}")
          if health.get("worker_version") != expected:
              raise SystemExit(
                  f"Worker版がNEXT-5ではありません。期待={expected} / 現在={health.get('worker_version')}"
              )
          features = health.get("features") or {}
          if features.get("lesson_record") is not True or features.get("lesson_record_api") is not True:
              raise SystemExit(f"Worker healthにレッスン記録機能がありません: {features}")

          query = urllib.parse.urlencode({
              "shop_code": "yoga_demo",
              "admin_code": "1234",
              "t": nonce,
          })
          check = get_json(f"{base}/api/admin/lesson-record/check?{query}")
          if check.get("schema_ok") is not True:
              raise SystemExit(f"Supabaseレッスン記録列を確認できません: {check}")
          if check.get("worker_version") != expected:
              raise SystemExit(f"レッスン記録確認APIのWorker版が不一致です: {check}")

          required = {
              "lesson_condition",
              "lesson_content",
              "lesson_attention",
              "lesson_handoff",
              "next_recommended_date",
              "lesson_recorded_at",
              "lesson_recorded_by",
          }
          actual = set(check.get("required_columns") or [])
          missing = sorted(required - actual)
          if missing:
              raise SystemExit(f"確認APIの必須列不足: {missing}")

          print(json.dumps({
              "health": "OK",
              "worker_version": health.get("worker_version"),
              "lesson_record_schema": "OK",
              "required_columns": sorted(actual),
          }, ensure_ascii=False, indent=2))
          PY

      - name: "6. PCオーナー画面へレッスン記録を追加"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("owner.html")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が1件ではありません。count={count}")
              text = text.replace(old, new, 1)

          def replace_regex(pattern: str, replacement: str, label: str, flags=0) -> None:
              global text
              updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 正規表現置換対象が1件ではありません。count={count}")
              text = updated

          replace_once(
              "<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-4</title>",
              "<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-5</title>",
              "owner title"
          )
          replace_once(
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-4</p>',
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-5</p>',
              "owner step label"
          )
          replace_once(
              '<p class="text-sm text-slate-500 mt-2">受付待ちから次回案内済みまで、今日のレッスン進捗を1操作ずつ安全に進めます。</p>',
              '<p class="text-sm text-slate-500 mt-2">レッスン完了後に、体調・実施内容・注意事項・引継ぎ・次回おすすめを1回の記録として保存します。</p>',
              "owner header help"
          )
          replace_once(
              'const STEP_VERSION = "YOGA-NEXT-4-WORKFLOW-VISIBLE-20260723";',
              'const STEP_VERSION = "YOGA-NEXT-5-LESSON-RECORD-20260723";',
              "owner version"
          )

          modal_html = r'''  <!-- Lesson Record Modal -->
            <div id="lesson-record-modal" class="hidden fixed inset-0 z-[70] bg-slate-900/45 backdrop-blur-sm p-4 overflow-y-auto">
              <div class="modal-shell max-w-4xl mx-auto my-6 glass rounded-[30px] p-5 lg:p-7">
                <div class="flex items-start justify-between gap-4">
                  <div>
                    <p class="section-label">Lesson Record</p>
                    <h2 class="text-2xl font-black text-slate-800 mt-1">レッスン記録</h2>
                    <p id="lesson-record-target" class="text-sm text-slate-500 mt-2">対象の予約を確認しています。</p>
                  </div>
                  <button type="button" onclick="closeLessonRecordModal()" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>

                <div id="lesson-record-existing" class="mt-5 rounded-[22px] bg-[var(--sage-50)] border border-[var(--sage-100)] p-4 text-sm leading-7 text-[var(--sage-800)]">
                  保存すると、この予約の進捗が「レッスン完了」から「記録済み」へ自動で進みます。
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5">
                  <label class="text-sm font-bold text-slate-700">
                    当日の体調
                    <select id="lesson-condition" class="select-ui mt-1">
                      <option>良好</option>
                      <option selected>普通</option>
                      <option>疲れあり</option>
                      <option>痛み・違和感あり</option>
                      <option>要注意</option>
                    </select>
                  </label>
                  <label class="text-sm font-bold text-slate-700">
                    次回おすすめ日
                    <input id="lesson-next-date" type="date" class="input-ui mt-1" />
                  </label>
                  <label class="text-sm font-bold text-slate-700 md:col-span-2">
                    実施内容<span class="text-rose-600 ml-1">必須</span>
                    <textarea id="lesson-content" class="textarea-ui mt-1 min-h-[150px]" placeholder="呼吸、ポーズ、重点部位、強度、できたことなど"></textarea>
                  </label>
                  <label class="text-sm font-bold text-slate-700 md:col-span-2">
                    注意事項・痛み・制限
                    <textarea id="lesson-attention" class="textarea-ui mt-1" placeholder="無理をしない動き、痛みが出た部位、次回も確認すること"></textarea>
                  </label>
                  <label class="text-sm font-bold text-slate-700 md:col-span-2">
                    次回への引継ぎ
                    <textarea id="lesson-handoff" class="textarea-ui mt-1" placeholder="次回の重点、確認事項、提案したい内容"></textarea>
                  </label>
                </div>

                <div class="mt-5 rounded-[22px] bg-white/75 border border-slate-100 p-4 text-sm text-slate-600 leading-7">
                  次回おすすめ日を設定すると、自動配信は行わず、オーナー画面のフォロー対象に「次回レッスン案内」を作成します。
                </div>

                <div class="flex flex-wrap justify-end gap-2 mt-5">
                  <button type="button" onclick="closeLessonRecordModal()" class="rounded-full bg-white border border-slate-200 px-5 py-3 text-sm font-bold text-slate-700">閉じる</button>
                  <button id="lesson-record-save-btn" type="button" onclick="saveLessonRecord()" class="rounded-full yoga-gradient px-5 py-3 text-sm font-black text-white">記録を保存</button>
                </div>
              </div>
            </div>

          '''

          replace_once("  <!-- Message Modal -->", modal_html + "  <!-- Message Modal -->", "lesson modal")

          replace_once(
          '''  selected: null,
            manualSelectedCustomer: null,
            messageTarget: null,''',
          '''  selected: null,
            manualSelectedCustomer: null,
            messageTarget: null,
            lessonRecordTarget: null,''',
          "owner state"
          )

          replace_once(
          '''              <div id="detail-reservations" class="mt-3 space-y-2 text-sm"></div>
                        <textarea id="detail-note" class="textarea-ui mt-4" placeholder="カルテメモ・前回内容・次回提案など"></textarea>''',
          '''              <div id="detail-reservations" class="mt-3 space-y-2 text-sm"></div>
                        <div id="detail-lesson-record" class="mt-4 rounded-2xl bg-[var(--sage-50)] border border-[var(--sage-100)] p-4 text-sm text-[var(--sage-800)]">予約を選ぶとレッスン記録を確認できます。</div>
                        <textarea id="detail-note" class="textarea-ui mt-4" placeholder="カルテメモ・前回内容・次回提案など"></textarea>''',
          "detail lesson preview"
          )

          replace_regex(
              r'''function workflowActionButton\(row\)\{\n.*?\n\}\n\nasync function advanceReservationWorkflow''',
              '''function workflowActionButton(row){
            const meta = workflowMeta(row.workflow_status);
            const id = compact(row.id || row.event_id || "");
            const key = compact(row._key || eventKey(row));
            if(!id) return `<button type="button" disabled class="rounded-full bg-slate-100 text-slate-400 px-4 py-2 text-xs font-black">予約ID確認中</button>`;
            if(meta.status === "completed"){
              return `<button type="button" onclick="openLessonRecordByKey('${escapeHtml(key)}')" class="rounded-full yoga-gradient px-4 py-2 text-xs font-black text-white">記録を入力</button>`;
            }
            if(!meta.next) return `<button type="button" disabled class="rounded-full bg-[var(--sage-100)] text-[var(--sage-800)] px-4 py-2 text-xs font-black">進捗完了</button>`;
            if(row.reservation_date && row.reservation_date > todayJst()) return `<button type="button" disabled class="rounded-full bg-slate-100 text-slate-400 px-4 py-2 text-xs font-black">当日から操作</button>`;
            return `<button type="button" onclick="advanceReservationWorkflow('${escapeHtml(id)}','${escapeHtml(meta.status)}','${escapeHtml(row.customer_name || row.name || "お客様")}')" class="rounded-full yoga-gradient px-4 py-2 text-xs font-black text-white">${meta.nextLabel}</button>`;
          }

          async function advanceReservationWorkflow''',
              "workflow record guard",
              flags=re.S
          )

          lesson_functions = r'''
          function lessonRecordExists(row){
            return Boolean(compact(row?.lesson_content || "") || row?.lesson_recorded_at);
          }

          function lessonRecordBrief(row){
            if(!lessonRecordExists(row)) return "";
            const nextDate = row.next_recommended_date ? ` / 次回目安 ${formatDate(row.next_recommended_date)}` : "";
            return `<div class="mt-3 rounded-2xl bg-[var(--sage-50)] border border-[var(--sage-100)] px-4 py-3 text-sm text-[var(--sage-800)]">
              <p class="font-black">レッスン記録あり${escapeHtml(nextDate)}</p>
              <p class="mt-1 line-clamp-2">${escapeHtml(row.lesson_content || "")}</p>
            </div>`;
          }

          function lessonRecordPreviewHtml(row){
            if(!row) return `予約を選ぶとレッスン記録を確認できます。`;
            if(!lessonRecordExists(row)){
              const meta = workflowMeta(row.workflow_status);
              const guide = meta.index < WORKFLOW_STEPS.indexOf("completed")
                ? "レッスン完了後に記録できます。"
                : "記録はまだありません。";
              return `<div class="flex flex-col gap-3"><p>${escapeHtml(guide)}</p>${meta.index >= WORKFLOW_STEPS.indexOf("completed") ? `<button type="button" onclick="openLessonRecordForSelected()" class="rounded-2xl yoga-gradient text-white px-4 py-3 text-sm font-black">レッスン記録を入力</button>` : ""}</div>`;
            }
            return `<div class="space-y-2">
              <div class="flex flex-wrap gap-2"><span class="badge bg-white text-slate-700 border border-slate-200">体調：${escapeHtml(row.lesson_condition || "普通")}</span>${row.next_recommended_date ? `<span class="badge bg-white text-slate-700 border border-slate-200">次回：${escapeHtml(formatDate(row.next_recommended_date))}</span>` : ""}</div>
              <p><span class="font-black">実施：</span>${escapeHtml(row.lesson_content || "-")}</p>
              ${row.lesson_attention ? `<p><span class="font-black">注意：</span>${escapeHtml(row.lesson_attention)}</p>` : ""}
              ${row.lesson_handoff ? `<p><span class="font-black">引継ぎ：</span>${escapeHtml(row.lesson_handoff)}</p>` : ""}
              <button type="button" onclick="openLessonRecordForSelected()" class="mt-2 rounded-2xl bg-white border border-[var(--sage-200)] px-4 py-3 text-sm font-black text-[var(--sage-800)]">記録を確認・編集</button>
            </div>`;
          }

          function lessonRecordSecondaryButton(row){
            if(!lessonRecordExists(row)) return "";
            const key = compact(row._key || eventKey(row));
            return `<button type="button" onclick="openLessonRecordByKey('${escapeHtml(key)}')" class="rounded-full bg-purple-50 text-purple-700 px-4 py-2 text-xs font-black">記録を見る</button>`;
          }

          function openLessonRecordByKey(key){
            const row = findEventByKey(key);
            if(!row) return toast("予約データを更新して再度お試しください。");
            openLessonRecord(row);
          }

          function openLessonRecordForSelected(){
            const row = state.selected?.row || null;
            if(!row) return toast("レッスン記録を開く予約を選択してください。");
            openLessonRecord(row);
          }

          function openLessonRecord(row){
            const meta = workflowMeta(row.workflow_status);
            if(meta.index < WORKFLOW_STEPS.indexOf("completed")){
              return toast("レッスン完了後に記録を入力できます。");
            }
            state.lessonRecordTarget = row;
            $("lesson-record-target").textContent = `${row.customer_name || row.name || "お客様"} / ${formatDate(row.reservation_date)} ${normalizeTime(row.reservation_time || "", "")} / ${row.service_name || "レッスン"}`;
            $("lesson-condition").value = row.lesson_condition || "普通";
            $("lesson-content").value = row.lesson_content || "";
            $("lesson-attention").value = row.lesson_attention || "";
            $("lesson-handoff").value = row.lesson_handoff || "";
            $("lesson-next-date").min = row.reservation_date || todayJst();
            $("lesson-next-date").value = row.next_recommended_date || "";
            $("lesson-record-existing").innerHTML = lessonRecordExists(row)
              ? `保存済みの記録を表示しています。更新すると保存日時と操作履歴が更新されます。`
              : `保存すると進捗が「レッスン完了」から「記録済み」へ自動で進みます。`;
            $("lesson-record-modal").classList.remove("hidden");
            safeIcons();
            window.setTimeout(() => $("lesson-content")?.focus(), 80);
          }

          function closeLessonRecordModal(){
            $("lesson-record-modal").classList.add("hidden");
            state.lessonRecordTarget = null;
          }

          async function saveLessonRecord(){
            const row = state.lessonRecordTarget;
            if(!row) return toast("対象の予約が見つかりません。");
            const content = compact($("lesson-content").value);
            const nextDate = compact($("lesson-next-date").value);
            if(!content) return toast("実施内容を入力してください。");
            if(nextDate && row.reservation_date && nextDate < row.reservation_date) return toast("次回おすすめ日は今回のレッスン日以降を選択してください。");

            const btn = $("lesson-record-save-btn");
            const old = btn.textContent;
            btn.disabled = true;
            btn.textContent = "保存中...";

            try{
              const ok = window.confirm(`${row.customer_name || row.name || "お客様"}のレッスン記録を保存しますか？`);
              if(!ok) return;
              const result = await apiPost("/api/admin/reservations/save-lesson-record", {
                reservation_id: row.id || row.event_id,
                lesson_condition: $("lesson-condition").value,
                lesson_content: content,
                lesson_attention: compact($("lesson-attention").value),
                lesson_handoff: compact($("lesson-handoff").value),
                next_recommended_date: nextDate || null,
                lesson_recorded_by: "owner_pc",
                source_screen: "owner.html",
              });
              closeLessonRecordModal();
              toast(result.workflow_advanced_to_recorded ? "レッスン記録を保存し、進捗を「記録済み」へ更新しました。" : "レッスン記録を更新しました。");
              await loadAll();
            }catch(err){
              toast(`レッスン記録の保存に失敗しました。\n${err.message}`);
            }finally{
              btn.disabled = false;
              btn.textContent = old;
            }
          }

          '''

          replace_once("\nfunction renderAll(){", "\n" + lesson_functions + "function renderAll(){", "lesson functions")

          replace_once(
          '''        ${workflowActionButton(row)}
                  <button onclick="selectReservation''',
          '''        ${workflowActionButton(row)}
                  ${lessonRecordSecondaryButton(row)}
                  <button onclick="selectReservation''',
          "reservation record button"
          )

          replace_once(
          '''        ${workflowProgressHtml(progress.status)}
                  <p class="text-sm text-slate-600 mt-2 leading-7 whitespace-pre-wrap">''',
          '''        ${workflowProgressHtml(progress.status)}
                  ${lessonRecordBrief(row)}
                  <p class="text-sm text-slate-600 mt-2 leading-7 whitespace-pre-wrap">''',
          "reservation record brief"
          )

          replace_once(
              '''  $("detail-note").value = base.owner_memo || base.memo || row?.request_note || row?.memo || "";''',
              '''  $("detail-lesson-record").innerHTML = lessonRecordPreviewHtml(row);
            $("detail-note").value = base.owner_memo || base.memo || row?.request_note || row?.memo || "";''',
