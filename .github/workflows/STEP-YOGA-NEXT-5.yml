          globalThis.alert = ()=>{};
          globalThis.prompt = ()=>"";
          globalThis.lucide = {createIcons:()=>{}};
          '''

          owner_test = r'''
          const completedRow = {
            id:"r1", _key:"r1", customer_name:"山田花子",
            reservation_date:todayJst(), reservation_time:"10:00",
            service_name:"パーソナルヨガ", workflow_status:"completed"
          };
          const recordedRow = {
            ...completedRow, workflow_status:"recorded",
            lesson_condition:"普通",
            lesson_content:"呼吸と肩甲骨を中心に実施",
            lesson_recorded_at:"2026-07-23T10:00:00Z"
          };
          if(lessonRecordExists(completedRow) !== false) throw new Error("empty record");
          if(lessonRecordExists(recordedRow) !== true) throw new Error("saved record");
          if(!workflowActionButton(completedRow).includes("記録を入力")) throw new Error("completed must open record");
          if(workflowActionButton(completedRow).includes("advanceReservationWorkflow")) throw new Error("completed must not skip record");
          if(!lessonRecordSecondaryButton(recordedRow).includes("記録を見る")) throw new Error("record view button");
          if(!lessonRecordBrief(recordedRow).includes("レッスン記録あり")) throw new Error("record brief");
          console.log("OWNER_LESSON_RECORD_LOGIC_OK");
          '''

          ipad_test = r'''
          const completedRow = {
            id:"r2", customer_name:"佐藤美香",
            reservation_date:todayIso(), reservation_time:"14:00",
            service_name:"パーソナルヨガ", workflow_status:"completed"
          };
          const recordedRow = {
            ...completedRow, workflow_status:"recorded",
            lesson_content:"体幹を中心に実施",
            lesson_recorded_at:"2026-07-23T14:00:00Z"
          };
          if(lessonRecordExists(completedRow) !== false) throw new Error("ipad empty record");
          if(lessonRecordExists(recordedRow) !== true) throw new Error("ipad saved record");
          if(!workflowButton(completedRow, "today_0").includes("記録入力")) throw new Error("ipad completed record button");
          if(!lessonRecordSecondaryButton(recordedRow, "today_0").includes("記録を見る")) throw new Error("ipad view record");
          if(!lessonRecordBrief(recordedRow).includes("記録あり")) throw new Error("ipad record brief");
          console.log("IPAD_LESSON_RECORD_LOGIC_OK");
          '''

          for file_name, test_code, pass_text in [
              ("owner.html", owner_test, "OWNER_LESSON_RECORD_LOGIC_OK"),
              ("owner-ipad.html", ipad_test, "IPAD_LESSON_RECORD_LOGIC_OK"),
          ]:
              script = largest_script(file_name)
              with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
                  tmp.write(browser_mock + "\n" + script + "\n" + test_code)
                  temp_name = tmp.name
              try:
                  run = subprocess.run(["node", temp_name], text=True, capture_output=True)
                  print(run.stdout)
                  if run.returncode != 0:
                      print(run.stderr)
                      raise SystemExit(f"{file_name} レッスン記録ロジック検査NG")
                  if pass_text not in run.stdout:
                      raise SystemExit(f"{file_name} PASS文字を確認できません。")
              finally:
                  Path(temp_name).unlink(missing_ok=True)

          print("LESSON_RECORD_BUSINESS_LOGIC_OK")
          PY

      - name: "10. NEXT-5完成台帳更新"
        shell: bash
        run: |
          set -Eeuo pipefail

          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %z')"
          owner_blob="$(git hash-object owner.html)"
          ipad_blob="$(git hash-object owner-ipad.html)"
          owner_bytes="$(wc -c < owner.html | tr -d ' ')"
          ipad_bytes="$(wc -c < owner-ipad.html | tr -d ' ')"

          cat > "$LEDGER_FILE" <<EOF
          system_name: "DPRO ヨガ LINE"
          standard: "DPRO NEXT"
          step_name: "レッスン記録・引継ぎ・次回おすすめ"
          current_step: "YOGA-NEXT-5-COMPLETE"
          previous_step: "YOGA-NEXT-4-COMPLETE"
          next_step: "YOGA-NEXT-6"
          completed_at_jst: "$completed_at"
          before_sha: "$BEFORE_SHA"
          before_tag: "$BEFORE_TAG"
          before_tag_status: "$BEFORE_TAG_STATUS"
          target_files:
            - "owner.html"
            - "owner-ipad.html"
          external_deployment:
            sql:
              executed: true
              file: "YOGA-NEXT-5.sql"
              migration_type: "non_destructive"
              columns:
                - "lesson_condition"
                - "lesson_content"
                - "lesson_attention"
                - "lesson_handoff"
                - "next_recommended_date"
                - "lesson_recorded_at"
                - "lesson_recorded_by"
            worker:
              deployed: true
              version: "$EXPECTED_WORKER_VERSION"
              source_sha256: "$EXPECTED_WORKER_SHA256"
          implementation:
            one_reservation_one_lesson_record: true
            lesson_condition: true
            lesson_content_required: true
            lesson_attention: true
            lesson_handoff: true
            next_recommended_date: true
            owner_record_modal: true
            ipad_record_modal: true
            record_edit_supported: true
            workflow_completed_to_recorded_on_save: true
            workflow_skip_record_guard: true
            next_recommendation_followup_task: true
            automatic_line_delivery: false
            existing_reservation_status_separated: true
          checks:
            required_files: "OK"
            previous_step: "OK"
            yml_syntax: "OK"
            worker_live_version: "OK"
            supabase_lesson_record_schema: "OK"
            html_syntax: "OK"
            javascript_syntax: "OK"
            html_id_duplicates: "OK"
            existing_function_preservation: "OK"
            lesson_record_business_logic: "OK"
            reservation_status_separation: "OK"
            public_admin_information: "OK"
            customer_screen_hash_preservation: "OK"
            overall: "OK"
          change_record:
            worker_changed: true
            supabase_changed: true
            api_changed: true
            api_path_changed: true
            screen_function_changed: true
            owner_html_changed: true
            owner_ipad_html_changed: true
            index_html_changed: false
            member_html_changed: false
            existing_reservation_data_deleted: false
          new_api_paths:
            - "GET /api/admin/lesson-record/check"
            - "POST /api/admin/reservations/save-lesson-record"
          file_result:
            owner:
              path: "owner.html"
              blob_sha: "$owner_blob"
              bytes: $owner_bytes
              version: "YOGA-NEXT-5-LESSON-RECORD-20260723"
            owner_ipad:
              path: "owner-ipad.html"
              blob_sha: "$ipad_blob"
              bytes: $ipad_bytes
              version: "YOGA-NEXT-5-IPAD-LESSON-RECORD-20260723"
          generated_files:
            - "dpro-next-ledger.yml"
            - "dpro-next-yoga-next-5-result.json"
          known_attention:
            - "LINE会員ページへの履歴公開範囲はYOGA-NEXT-7で決定する"
            - "次回おすすめ日はフォロータスクを作るが、自動LINE配信は行わない"
            - "写真・動画は重さと運用負担を避けるためNEXT-5では追加しない"
            - "WorkerソースはCloudflareへDeployし、GitHubリポジトリには配置しない"
          rollback:
            github_tag: "$BEFORE_TAG"
            worker: "YOGA-NEXT-4-WORKFLOW-STATUS-20260723のWorkerを再Deploy"
            sql: "YOGA-NEXT-5-ROLLBACK.sql"
          workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "11. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "YOGA-NEXT-5-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-6"' "$LEDGER_FILE"
          grep -q '"overall": "OK"' "$RESULT_FILE"
          grep -q 'YOGA-NEXT-5-LESSON-RECORD-20260723' owner.html
          grep -q 'YOGA-NEXT-5-IPAD-LESSON-RECORD-20260723' owner-ipad.html
          grep -q 'id="lesson-record-modal"' owner.html
          grep -q 'id="lesson-record-modal"' owner-ipad.html
          grep -q '/api/admin/reservations/save-lesson-record' owner.html
          grep -q '/api/admin/reservations/save-lesson-record' owner-ipad.html

          allowed_regex='^(owner\.html|owner-ipad\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-5-result\.json|\.github/workflows/STEP-YOGA-NEXT-5\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed_regex" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "::error::想定外の変更ファイルがあります:"
            echo "$unexpected"
            exit 1
          fi

          {
            echo ""
            echo "### YOGA-NEXT-5 検査結果"
            echo "- レッスン記録保存API: OK"
            echo "- 体調・実施内容・注意・引継ぎ・次回日: OK"
            echo "- 保存時の記録済み進捗: OK"
            echo "- 記録を飛ばす進捗更新防止: OK"
            echo "- 次回おすすめフォロータスク: OK"
            echo "- 自動LINE配信: なし"
            echo "- index.html / member.html変更: なし"
            echo "- Worker / Supabase / API変更: あり・稼働確認済み"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "12. 成功後YML自身を削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "13. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add owner.html owner-ipad.html "$LEDGER_FILE" "$RESULT_FILE"
          git add -u "$WORKFLOW_PATH"

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "feat(yoga-next): complete YOGA-NEXT-5 lesson record [skip ci]"
          git push origin HEAD:main

          {
            echo ""
            echo "### 完了"
            echo "- current_step: `YOGA-NEXT-5-COMPLETE`"
            echo "- next_step: `YOGA-NEXT-6`"
            echo "- Worker / Supabase / API変更: あり・稼働確認済み"
            echo "- 実行YML: 削除済み"
            echo "- 自動Commit・Push: 完了"
          } >> "$GITHUB_STEP_SUMMARY"
