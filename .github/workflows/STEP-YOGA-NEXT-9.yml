name: "STEP YOGA-NEXT-9 | 性能・セキュリティ・system-check強化"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-9.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-9-system-check
  cancel-in-progress: false

jobs:
  system-check:
    name: "YOGA-NEXT-9 performance security system check"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-9.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-9-result.json"
      STATIC_REPORT_FILE: "dpro-next-yoga-next-9-static.json"
      BEFORE_TAG: "dpro-yoga-next-9-before-20260724"
      WORKER_URL: "https://yoga-liff-webhook.dpromstk2000.workers.dev"
      PAGES_URL: "https://dpromstk2000-lab.github.io/liff-yoga-reserve"
      SHOP_CODE: "yoga_demo"
      ADMIN_CODE: "1234"
      EXPECTED_WORKER_VERSION: "YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723"
      EXPECTED_MEMBER_CONTRACT: "YOGA-NEXT-7-SAFE-MEMBER-CONTRACT-20260723"
      EXPECTED_OWNER_BLOB_SHA: "57eb91e95abaa129df64210b41cb61af123e4f04"
      EXPECTED_IPAD_BLOB_SHA: "14da19cf1979d47e4d4b23fa7f28930e273fda31"
      EXPECTED_MEMBER_BLOB_SHA: "de427a20414ce8c8697cfbaafd004cc0bde48c3f"
      EXPECTED_INDEX_BLOB_SHA: "6c3b2e4abcce8dc78f0a658b56580a983f4935b4"
      EXPECTED_LEDGER_BLOB_SHA: "0160470b1005ff0c1959679f9feca3a804c06693"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・基準状態確認"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in owner.html owner-ipad.html member.html index.html "$LEDGER_FILE" dpro-next-yoga-next-8-result.json "$WORKFLOW_PATH"; do
            [[ -f "$file" ]] || { echo "::error file=$file::必須ファイルがありません。"; exit 1; }
          done
          [[ ! -f system-check.html ]] || { echo "::error file=system-check.html::基準版には存在しない想定です。"; exit 1; }
          grep -q 'current_step: "YOGA-NEXT-8-COMPLETE"' "$LEDGER_FILE" || { echo "::error file=$LEDGER_FILE::YOGA-NEXT-8-COMPLETEを確認できません。"; exit 1; }

          declare -A expected=(
            ["owner.html"]="$EXPECTED_OWNER_BLOB_SHA"
            ["owner-ipad.html"]="$EXPECTED_IPAD_BLOB_SHA"
            ["member.html"]="$EXPECTED_MEMBER_BLOB_SHA"
            ["index.html"]="$EXPECTED_INDEX_BLOB_SHA"
            ["$LEDGER_FILE"]="$EXPECTED_LEDGER_BLOB_SHA"
          )
          for file in "${!expected[@]}"; do
            current="$(git hash-object "$file")"
            [[ "$current" == "${expected[$file]}" ]] || { echo "::error file=$file::基準版不一致。期待=${expected[$file]} / 現在=$current"; exit 1; }
          done

          mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"
          if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then before_sha="$(git rev-parse HEAD^)"; fi
          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-9"
            echo "- system-check.html新規作成"
            echo "- owner.html / owner-ipad.htmlへ導線追加"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ作成"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            [[ "$tag_sha" == "$BEFORE_SHA" ]] || { echo "::error::既存タグが別SHAです。"; exit 1; }
            status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-9"
            git push origin "$BEFORE_TAG"
            status="created"
          fi
          echo "BEFORE_TAG_STATUS=$status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. system-check.html作成・管理画面導線追加"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64

          Path("system-check.html").write_text(base64.b64decode("").decode("utf-8"), encoding="utf-8")

          owner = Path("owner.html").read_text(encoding="utf-8")
          target = '<button onclick="prepareDemoData()" class="pill inline-flex items-center gap-2 rounded-full bg-amber-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg"><i data-lucide="sparkles" class="w-4 h-4"></i>営業前DEMO準備</button>'
          if owner.count(target) != 1: raise SystemExit(f"owner導線対象 count={owner.count(target)}")
          owner = owner.replace(target, target + '\n          <button onclick="window.location.href=\'system-check.html?demo=1\'" class="pill inline-flex items-center gap-2 rounded-full bg-slate-800 px-4 py-2.5 text-sm font-bold text-white shadow-lg"><i data-lucide="shield-check" class="w-4 h-4"></i>system-check</button>', 1)
          Path("owner.html").write_text(owner, encoding="utf-8")

          ipad = Path("owner-ipad.html").read_text(encoding="utf-8")
          grid = '<div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2">'
          if ipad.count(grid) != 1: raise SystemExit(f"iPadグリッド count={ipad.count(grid)}")
          ipad = ipad.replace(grid, '<div class="mt-3 grid grid-cols-1 md:grid-cols-4 gap-2">', 1)
          demo = '<button onclick="prepareDemoData()" class="touch rounded-2xl bg-amber-600 px-4 py-3 text-sm font-black text-white flex items-center justify-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i>DEMO準備</button>'
          if ipad.count(demo) != 1: raise SystemExit(f"iPad導線対象 count={ipad.count(demo)}")
          ipad = ipad.replace(demo, demo + '\n<button onclick="window.location.href=\'system-check.html?demo=1\'" class="touch rounded-2xl bg-slate-800 px-4 py-3 text-sm font-black text-white flex items-center justify-center gap-2"><i data-lucide="shield-check" class="w-4 h-4"></i>system-check</button>', 1)
          Path("owner-ipad.html").write_text(ipad, encoding="utf-8")
          PY

      - name: "6. HTML・JavaScript・ID重複・容量・公開情報検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import collections, datetime as dt, json, os, re, subprocess, tempfile

          limits={"index.html":120000,"member.html":120000,"owner.html":165000,"owner-ipad.html":95000,"system-check.html":100000}
          checks=[]; file_meta={}
          def record(group,label,status,detail=""): checks.append({"group":group,"label":label,"status":status,"detail":detail})

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True); self.ids=[]; self.scripts=[]; self.inside=False; self.parts=[]
              def handle_starttag(self,tag,attrs):
                  attrs=dict(attrs)
                  if attrs.get("id"): self.ids.append(attrs["id"])
                  if tag.lower()=="script" and not attrs.get("src"): self.inside=True; self.parts=[]
              def handle_data(self,data):
                  if self.inside: self.parts.append(data)
              def handle_endtag(self,tag):
                  if tag.lower()=="script" and self.inside:
                      self.scripts.append("\n".join(self.parts)); self.inside=False; self.parts=[]

          def inspect(name):
              path=Path(name); text=path.read_text(encoding="utf-8"); parser=Inspector(); parser.feed(text); parser.close()
              dup=sorted(k for k,v in collections.Counter(parser.ids).items() if v>1)
              if dup: raise SystemExit(f"{name} ID重複: {dup}")
              record("静的検査",f"{name} HTML ID重複","OK","重複なし")
              for index,script in enumerate(parser.scripts,1):
                  if not script.strip(): continue
                  with tempfile.NamedTemporaryFile("w",suffix=".js",encoding="utf-8",delete=False) as tmp:
                      tmp.write(script); temp=tmp.name
                  try:
                      result=subprocess.run(["node","--check",temp],text=True,capture_output=True)
                      if result.returncode: raise SystemExit(f"{name} JavaScript構文NG: {result.stderr}")
                  finally: Path(temp).unlink(missing_ok=True)
              record("静的検査",f"{name} JavaScript構文","OK",f"inline {len(parser.scripts)}件")
              size=path.stat().st_size
              if size>limits[name]: raise SystemExit(f"{name}容量超過: {size}")
              record("性能",f"{name} ファイル容量","OK",f"{size:,} / 上限 {limits[name]:,} bytes")
              file_meta[name]={"bytes":size,"blob_sha":subprocess.run(["git","hash-object",name],text=True,capture_output=True,check=True).stdout.strip(),"ids":len(parser.ids),"inline_scripts":len(parser.scripts)}
              return text

          texts={name:inspect(name) for name in limits}
          basic=[re.compile(r"/api/admin/",re.I),re.compile(r"\badmin_code\b",re.I),re.compile(r"管理コード")]
          internal=[
              re.compile(r"\bcustomer\s*(?:\.\s*memo\b|\[\s*[\"']memo[\"']\s*\])"),
              re.compile(r"\brow\s*(?:\.\s*memo\b|\[\s*[\"']memo[\"']\s*\])"),
              re.compile(r"(?:\.\s*lesson_content\b|\[\s*[\"']lesson_content[\"']\s*\]|[\"']lesson_content[\"']\s*:)"),
              re.compile(r"(?:\.\s*lesson_attention\b|\[\s*[\"']lesson_attention[\"']\s*\]|[\"']lesson_attention[\"']\s*:)"),
              re.compile(r"(?:\.\s*lesson_handoff\b|\[\s*[\"']lesson_handoff[\"']\s*\]|[\"']lesson_handoff[\"']\s*:)"),
              re.compile(r"(?:\.\s*owner_memo\b|\[\s*[\"']owner_memo[\"']\s*\]|[\"']owner_memo[\"']\s*:)"),
              re.compile(r"(?:\.\s*workflow_note\b|\[\s*[\"']workflow_note[\"']\s*\]|[\"']workflow_note[\"']\s*:)")
          ]
          for name in ["index.html","member.html"]:
              findings=[p.pattern for p in basic+internal if p.search(texts[name])]
              if findings: raise SystemExit(f"{name} 管理情報混入: {findings}")
              record("セキュリティ",f"{name} 管理情報混入","OK","管理API・管理コード・内部記録参照なし")

          required={
              "index.html":["normalizePhone","isPastDate","reservation_origin","validateSelectedSlot","activeReservations.length >= maxActive"],
              "owner.html":["normalizePhone","findManualDuplicate","WORKFLOW_STEPS","followupAddDays","admin-code-clear-btn"],
              "owner-ipad.html":["normalizePhone","WORKFLOW_STEPS","followupAddDays","admin-code-clear-btn"],
              "member.html":["privacy.owner_memo_returned","privacy.internal_lesson_notes_returned","repeat_booking"],
              "system-check.html":["runAllChecks","checkAdminCodeRejection","publicLeakPatterns","runDemoPrepare","copyResults"]
          }
          for name,markers in required.items():
              missing=[m for m in markers if m not in texts[name]]
              if missing: raise SystemExit(f"{name} 必須機能不足: {missing}")
              record("業務ロジック",f"{name} 必須安全機能","OK",", ".join(markers))

          owner=texts["owner.html"]
          match=re.search(r"(function toHalfWidthForPhone\(value\)\{.*?\n\}\nfunction normalizePhone\(value\)\{.*?\n\})",owner,re.S)
          if not match: raise SystemExit("電話正規化関数抽出失敗")
          js=match.group(1)+'''
          const cases=[["090-1111-2222","09011112222"],["０９０－１１１１－２２２２","09011112222"],["+81 90 1111 2222","09011112222"],["0081-90-1111-2222","09011112222"]];
          for(const [input,expected] of cases){ if(normalizePhone(input)!==expected) throw new Error(input); }
          console.log("PHONE_NORMALIZE_OK");
          '''
          with tempfile.NamedTemporaryFile("w",suffix=".js",encoding="utf-8",delete=False) as tmp:
              tmp.write(js); temp=tmp.name
          try:
              run=subprocess.run(["node",temp],text=True,capture_output=True)
              if run.returncode or "PHONE_NORMALIZE_OK" not in run.stdout: raise SystemExit(f"電話正規化NG: {run.stderr}")
          finally: Path(temp).unlink(missing_ok=True)
          record("業務ロジック","電話番号正規化実装","OK","owner.html実関数で全角・+81・0081を検査")

          send_markers=["pushMessage(","multicast(","broadcast(","/v2/bot/message/push","/v2/bot/message/multicast"]
          found=[m for m in send_markers if any(m in text for text in texts.values())]
          if found: raise SystemExit(f"自動LINE送信コード: {found}")
          record("セキュリティ","自動・一括LINE送信","OK","実装なし")

          report={"ok":True,"version":"YOGA-NEXT-9-STATIC-REPORT-20260724","checked_at_jst":dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),"checks":checks,"files":file_meta,"change_record":{"worker_changed":False,"supabase_changed":False,"api_changed":False,"system_check_created":True}}
          Path(os.environ["STATIC_REPORT_FILE"]).write_text(json.dumps(report,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY

      - name: "7. Worker・主要API・公開画面・性能実接続検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import datetime as dt, json, os, time, urllib.error, urllib.parse, urllib.request

          path=Path(os.environ["STATIC_REPORT_FILE"]); report=json.loads(path.read_text(encoding="utf-8")); checks=report["checks"]
          def record(group,label,status,detail="",ms=None):
              row={"group":group,"label":label,"status":status,"detail":detail}
              if ms is not None: row["ms"]=round(ms,2)
              checks.append(row)
          def get_json(endpoint,params=None,timeout=12):
              url=endpoint if endpoint.startswith("http") else f"{os.environ['WORKER_URL']}{endpoint}"
              if params: url+=("?" if "?" not in url else "&")+urllib.parse.urlencode(params)
              start=time.perf_counter()
              try:
                  with urllib.request.urlopen(url,timeout=timeout) as res:
                      raw=res.read().decode("utf-8","replace"); return res.status,json.loads(raw or "{}"),(time.perf_counter()-start)*1000
              except urllib.error.HTTPError as err:
                  raw=err.read().decode("utf-8","replace")
                  try: data=json.loads(raw or "{}")
                  except: data={"raw":raw}
                  return err.code,data,(time.perf_counter()-start)*1000
          def perf(ms,ok=2500,attention=5500): return "OK" if ms<=ok else "注意" if ms<=attention else "NG"

          today=dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).date().isoformat()
          endpoints=[
              ("Worker","/api/health",{},lambda d:d.get("worker_version")==os.environ["EXPECTED_WORKER_VERSION"]),
              ("公開店舗設定","/api/public/status",{"shop_code":os.environ["SHOP_CODE"]},lambda d:bool(d.get("settings") or d.get("shop_name") or d.get("shop_code"))),
              ("公開メニュー","/api/public/services",{"shop_code":os.environ["SHOP_CODE"]},lambda d:isinstance(d.get("services"),list) and len(d["services"])>0),
              ("会員安全契約","/api/public/member/check",{"shop_code":os.environ["SHOP_CODE"]},lambda d:d.get("privacy_ok") is True and d.get("member_contract_version")==os.environ["EXPECTED_MEMBER_CONTRACT"]),
              ("管理設定","/api/admin/settings",{"shop_code":os.environ["SHOP_CODE"],"admin_code":os.environ["ADMIN_CODE"]},lambda d:d.get("ok") is not False and not d.get("error")),
              ("管理サマリー","/api/admin/summary",{"shop_code":os.environ["SHOP_CODE"],"admin_code":os.environ["ADMIN_CODE"]},lambda d:d.get("ok") is not False and not d.get("error")),
              ("本日業務","/api/admin/day",{"shop_code":os.environ["SHOP_CODE"],"admin_code":os.environ["ADMIN_CODE"],"date":today},lambda d:isinstance(d.get("today_reservations",[]),list)),
              ("顧客検索","/api/admin/customers/search",{"shop_code":os.environ["SHOP_CODE"],"admin_code":os.environ["ADMIN_CODE"],"q":""},lambda d:isinstance(d.get("customers",[]),list))
          ]
          for label,endpoint,params,validator in endpoints:
              code,data,ms=get_json(endpoint,params); valid=200<=code<300 and data.get("ok") is not False and not data.get("error") and validator(data); status=perf(ms) if valid else "NG"; record("接続・API",label,status,f"HTTP {code}",ms)
              if status=="NG": raise SystemExit(f"{label} NG: {code} {data}")

          code,data,ms=get_json("/api/admin/summary",{"shop_code":os.environ["SHOP_CODE"],"admin_code":f"NEXT9_INVALID_{int(time.time())}"})
          rejected=code>=400 or data.get("ok") is False or bool(data.get("error")); record("セキュリティ","不正な管理コード拒否","OK" if rejected else "NG",f"HTTP {code}",ms)
          if not rejected: raise SystemExit("不正管理コードが拒否されません。")

          for page in ["","member.html","owner.html","owner-ipad.html"]:
              url=f"{os.environ['PAGES_URL']}/{page}"; start=time.perf_counter()
              with urllib.request.urlopen(url,timeout=15) as res:
                  raw=res.read(); ms=(time.perf_counter()-start)*1000; valid=res.status==200 and b"DOCTYPE" in raw[:300].upper(); status=perf(ms,3000,6000) if valid else "NG"; label=page or "index.html"; record("画面・性能",f"{label} 公開応答",status,f"HTTP {res.status} / {len(raw):,} bytes",ms)
                  if status=="NG": raise SystemExit(f"{label} 公開応答NG")

          report["checked_at_jst"]=dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(); report["live_checks_ok"]=True
          path.write_text(json.dumps(report,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY

      - name: "8. system-check画面・変更範囲・未変更検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'YOGA-NEXT-9-SYSTEM-CHECK-20260724' system-check.html
          grep -q 'id="admin-code-clear"' system-check.html
          grep -q 'function runAllChecks()' system-check.html
          grep -q 'function checkAdminCodeRejection()' system-check.html
          grep -q 'function runDemoPrepare()' system-check.html
          grep -q 'system-check.html?demo=1' owner.html
          grep -q 'system-check.html?demo=1' owner-ipad.html
          grep -q '"live_checks_ok": true' "$STATIC_REPORT_FILE"

          allowed='^(system-check\.html|owner\.html|owner-ipad\.html|dpro-next-yoga-next-9-static\.json|\.github/workflows/STEP-YOGA-NEXT-9\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed" || true)"
          [[ -z "$unexpected" ]] || { echo "::error::想定外の変更: $unexpected"; exit 1; }
          forbidden="$(git diff --name-only "$BEFORE_SHA" | grep -Ei '(^|/)worker\.js$|\.sql$|supabase|wrangler' || true)"
          [[ -z "$forbidden" ]] || { echo "::error::Worker/Supabase変更: $forbidden"; exit 1; }

      - name: "9. NEXT-9完成台帳・最終結果更新"
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %z')"
          system_blob="$(git hash-object system-check.html)"
          system_bytes="$(wc -c < system-check.html | tr -d ' ')"

          python3 - <<'PY'
          from pathlib import Path
          import datetime as dt, json, os
          static=json.loads(Path(os.environ["STATIC_REPORT_FILE"]).read_text(encoding="utf-8"))
          statuses=[row.get("status") for row in static.get("checks",[])]
          overall="NG" if "NG" in statuses else "注意" if "注意" in statuses else "OK"
          result={"ok":overall!="NG","overall":overall,"step":"YOGA-NEXT-9","checked_at_jst":dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),"before_sha":os.environ["BEFORE_SHA"],"before_tag":os.environ["BEFORE_TAG"],"checks":static.get("checks",[]),"file_meta":static.get("files",{}),"worker_changed":False,"supabase_changed":False,"api_changed":False,"system_check_created":True,"demo_prepare_runtime_optional":True,"automatic_line_send":False}
          Path(os.environ["RESULT_FILE"]).write_text(json.dumps(result,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          if overall=="NG": raise SystemExit("NEXT-9最終結果NG")
          PY

          cat > "$LEDGER_FILE" <<EOF
          system_name: "DPRO ヨガ LINE"
          standard: "DPRO NEXT"
          step_name: "性能・セキュリティ・system-check強化"
          current_step: "YOGA-NEXT-9-COMPLETE"
          previous_step: "YOGA-NEXT-8-COMPLETE"
          next_step: "YOGA-NEXT-10"
          completed_at_jst: "$completed_at"
          before_sha: "$BEFORE_SHA"
          before_tag: "$BEFORE_TAG"
          before_tag_status: "$BEFORE_TAG_STATUS"
          target_files:
            - "system-check.html"
            - "owner.html"
            - "owner-ipad.html"
            - "dpro-next-yoga-next-9-static.json"
          implementation:
            system_check_created: true
            result_levels: ["OK","注意","NG"]
            result_copy: true
            worker_check: true
            supabase_connection_inferred_from_api: true
            store_settings_check: true
            major_api_check: true
            pc_page_check: true
            ipad_page_check: true
            member_page_check: true
            customer_page_check: true
            html_syntax_check: true
            javascript_syntax_check: true
            html_id_duplicate_check: true
            file_size_check: true
            page_response_time_check: true
            invalid_admin_code_rejection_check: true
            public_admin_information_leak_check: true
            phone_normalization_check: true
            past_date_guard_check: true
            duplicate_guard_check: true
            workflow_logic_check: true
            demo_prepare_optional_runtime_check: true
            automatic_line_send: false
          checks:
            static_report: "OK"
            live_worker_api: "OK"
            live_admin_api: "OK"
            public_pages: "OK"
            invalid_admin_code_rejection: "OK"
            html_javascript_ids: "OK"
            performance: "OK_OR_ATTENTION"
            security: "OK"
            business_logic: "OK"
            overall: "OK_OR_ATTENTION"
          change_record:
            worker_changed: false
            supabase_changed: false
            api_changed: false
            system_check_html_created: true
            owner_html_navigation_changed: true
            owner_ipad_html_navigation_changed: true
            member_html_changed: false
            index_html_changed: false
            existing_data_changed: false
          file_result:
            system_check:
              path: "system-check.html"
              blob_sha: "$system_blob"
              bytes: $system_bytes
              version: "YOGA-NEXT-9-SYSTEM-CHECK-20260724"
            static_report:
              path: "dpro-next-yoga-next-9-static.json"
          known_attention:
            - "DEMO準備は明示的にチェックした場合だけ実行する"
            - "ブラウザの読込時間は通信状況で変動する"
            - "製品サイト・操作体験シート・完成判定はYOGA-NEXT-10で実施する"
          rollback:
            method: "backup_tag"
            tag: "$BEFORE_TAG"
            command_reference: "git checkout $BEFORE_TAG -- owner.html owner-ipad.html dpro-next-ledger.yml && git rm system-check.html dpro-next-yoga-next-9-static.json dpro-next-yoga-next-9-result.json"
          workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "10. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "YOGA-NEXT-9-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-10"' "$LEDGER_FILE"
          grep -q '"step": "YOGA-NEXT-9"' "$RESULT_FILE"
          grep -Eq '"overall": "(OK|注意)"' "$RESULT_FILE"
          allowed='^(system-check\.html|owner\.html|owner-ipad\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-9-static\.json|dpro-next-yoga-next-9-result\.json|\.github/workflows/STEP-YOGA-NEXT-9\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed" || true)"
          [[ -z "$unexpected" ]] || { echo "::error::想定外の変更: $unexpected"; exit 1; }

          {
            echo "### YOGA-NEXT-9 検査結果"
            echo "- system-check新規作成: OK"
            echo "- Worker・主要API実接続: OK"
            echo "- 不正管理コード拒否: OK"
            echo "- 公開画面管理情報混入: OK"
            echo "- HTML・JavaScript・ID重複: OK"
            echo "- 電話正規化・過去日時・重複・進捗: OK"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "11. 成功後YML自身を削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "12. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add system-check.html owner.html owner-ipad.html "$LEDGER_FILE" "$STATIC_REPORT_FILE" "$RESULT_FILE"
          git add -u "$WORKFLOW_PATH"
          git diff --cached --quiet && { echo "::error::Commit対象がありません。"; exit 1; }
          git commit -m "feat(yoga-next): complete YOGA-NEXT-9 system check [skip ci]"
          git push origin HEAD:main

          {
            echo "### 完了"
            echo "- current_step: YOGA-NEXT-9-COMPLETE"
            echo "- next_step: YOGA-NEXT-10"
            echo "- system-check.html: 作成済み"
            echo "- Worker / Supabase / API変更: なし"
            echo "- 実行YML: 削除済み"
          } >> "$GITHUB_STEP_SUMMARY"
