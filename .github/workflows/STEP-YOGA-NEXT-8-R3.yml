name: "STEP YOGA-NEXT-8-R3 | 次回案内・再来店・フォロー最適化 日付判定修正版"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-8-R3.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-8-r3-followup-retention
  cancel-in-progress: false

jobs:
  followup-retention:
    name: "YOGA-NEXT-8-R3 followup and retention optimization"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-8-R3.yml"
      FAILED_WORKFLOW_R1_PATH: ".github/workflows/STEP-YOGA-NEXT-8.yml"
      FAILED_WORKFLOW_R2_PATH: ".github/workflows/STEP-YOGA-NEXT-8-R2.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-8-result.json"
      BEFORE_TAG: "dpro-yoga-next-8-before-20260724"
      EXPECTED_OWNER_BLOB_SHA: "fc0df37d9d782dcab18ef35fa7a808f6f500f354"
      EXPECTED_IPAD_BLOB_SHA: "dc50811237ef63325543da029d97cd90052ef796"
      EXPECTED_MEMBER_BLOB_SHA: "de427a20414ce8c8697cfbaafd004cc0bde48c3f"
      EXPECTED_INDEX_BLOB_SHA: "6c3b2e4abcce8dc78f0a658b56580a983f4935b4"
      EXPECTED_LEDGER_BLOB_SHA: "fc39f1325fc46d4c653782f25df446e1e1962592"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・R1・R2未反映・基準状態確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in             owner.html             owner-ipad.html             member.html             index.html             "$LEDGER_FILE"             dpro-next-yoga-next-7-result.json             "$WORKFLOW_PATH"             "$FAILED_WORKFLOW_R1_PATH"             "$FAILED_WORKFLOW_R2_PATH"
          do
            [[ -f "$file" ]] || {
              echo "::error file=$file::YOGA-NEXT-8-R3の必須ファイルがありません。"
              exit 1
            }
          done

          grep -q 'current_step: "YOGA-NEXT-7-COMPLETE"' "$LEDGER_FILE" || {
            echo "::error file=$LEDGER_FILE::前STEP YOGA-NEXT-7-COMPLETEを確認できません。"
            exit 1
          }

          declare -A expected=(
            ["owner.html"]="$EXPECTED_OWNER_BLOB_SHA"
            ["owner-ipad.html"]="$EXPECTED_IPAD_BLOB_SHA"
            ["member.html"]="$EXPECTED_MEMBER_BLOB_SHA"
            ["index.html"]="$EXPECTED_INDEX_BLOB_SHA"
            ["$LEDGER_FILE"]="$EXPECTED_LEDGER_BLOB_SHA"
          )

          for file in "${!expected[@]}"; do
            current="$(git hash-object "$file")"
            [[ "$current" == "${expected[$file]}" ]] || {
              echo "::error file=$file::R1またはR2停止後に基準ファイルが変更されています。期待=${expected[$file]} / 現在=$current"
              exit 1
            }
          done

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            before_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            before_reason="existing_r1_backup_tag"
          else
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
            before_sha="$(git rev-parse HEAD)"
            before_reason="current_head"
            if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then
              before_sha="$(git rev-parse HEAD^)"
              before_reason="workflow_upload_parent"
            fi
          fi

          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "BEFORE_REASON=$before_reason" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-8-R3"
            echo ""
            echo "- R1停止: owner.html tasks置換対象2件"
            echo "- R2停止: STEP 8 期限分類ロジック検査"
            echo "- R2原因: 既存addDays関数の引数仕様へ依存"
            echo "- R3修正: NEXT-8専用followupAddDaysをPC・iPadへ追加"
            echo "- 境界検査: 前日・当日・翌日・7日後・8日後"
            echo "- R1・R2による公開ファイル変更: なし"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ確認"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            [[ "$tag_sha" == "$BEFORE_SHA" ]] || {
              echo "::error::既存タグと変更前SHAが一致しません。タグ=$tag_sha / 変更前=$BEFORE_SHA"
              exit 1
            }
            status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-8"
            git push origin "$BEFORE_TAG"
            status="created"
          fi

          echo "BEFORE_TAG_STATUS=$status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. owner.html 次回案内・再来店導線を追加"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("owner.html")
          text = path.read_text(encoding="utf-8")

          def once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: count={count}")
              text = text.replace(old, new, 1)

          def sub(pattern, replacement, label, flags=0):
              global text
              updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: count={count}")
              text = updated

          once("<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-5</title>", "<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-8</title>", "title")
          once('<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-5</p>', '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-8</p>', "label")
          once('<p class="text-sm text-slate-500 mt-2">レッスン完了後に、体調・実施内容・注意事項・引継ぎ・次回おすすめを1回の記録として保存します。</p>', '<p class="text-sm text-slate-500 mt-2">期限超過・今日・7日以内の次回案内を優先し、内容を個別確認してからLINE文面をコピーします。</p>', "help")
          once('const STEP_VERSION = "YOGA-NEXT-5-LESSON-RECORD-20260723";', 'const STEP_VERSION = "YOGA-NEXT-8-FOLLOWUP-RETENTION-20260724";', "version")
          once('      <div id="task-list" class="mt-5 grid grid-cols-1 xl:grid-cols-3 gap-4">', '      <div id="followup-summary" class="mt-5 grid grid-cols-2 md:grid-cols-4 gap-3"><div class="rounded-2xl bg-white/70 p-4 text-sm text-slate-500 md:col-span-4">次回案内を集計しています...</div></div>\n      <div id="task-list" class="mt-5 grid grid-cols-1 xl:grid-cols-3 gap-4">', "summary")
          once('  lessonRecordTarget: null,\n};', '  lessonRecordTarget: null,\n  followupFilter: "today",\n};', "state")
          once('function renderAll(){\n  renderKpis();\n  renderWorkflowSummary();\n  renderTasks();', 'function renderAll(){\n  renderKpis();\n  renderWorkflowSummary();\n  renderFollowupSummary();\n  renderTasks();', "renderAll")

          helpers = r'''
          function openFollowupRows(){
            return (state.day?.followups || []).filter(row => ["","open","pending"].includes(compact(row?.status || "open").toLowerCase()));
          }
          function followupAddDays(iso,days){
            const parts=String(iso || "").split("-").map(Number);
            if(parts.length !== 3 || parts.some(value => !Number.isFinite(value))) return "";
            const date=new Date(Date.UTC(parts[0],parts[1]-1,parts[2]));
            date.setUTCDate(date.getUTCDate()+Number(days || 0));
            return date.toISOString().slice(0,10);
          }
          function followupDueState(row){
            const due = compact(row?.due_date || row?.date || "");
            if(!/^\d{4}-\d{2}-\d{2}$/.test(due)) return "undated";
            const today = todayJst();
            if(due < today) return "overdue";
            if(due === today) return "today";
            if(due <= followupAddDays(today,7)) return "soon";
            return "future";
          }
          function followupDueMeta(row){
            const map = {
              overdue:{label:"期限超過",order:0,badge:"bg-rose-50 text-rose-700",card:"border-rose-200 bg-rose-50/35"},
              today:{label:"今日送る",order:1,badge:"bg-amber-50 text-amber-800",card:"border-amber-200 bg-amber-50/35"},
              soon:{label:"7日以内",order:2,badge:"bg-sky-50 text-sky-700",card:"border-sky-200 bg-sky-50/30"},
              future:{label:"今後",order:3,badge:"bg-[var(--sage-50)] text-[var(--sage-800)]",card:"border-[var(--sage-100)] bg-white/82"},
              undated:{label:"期限未設定",order:4,badge:"bg-slate-100 text-slate-600",card:"border-slate-100 bg-white/82"},
            };
            return map[followupDueState(row)] || map.undated;
          }
          function followupTypeKey(row){
            const value = `${compact(row?.followup_type)} ${compact(row?.title)}`.toLowerCase();
            if(value.includes("次回レッスン") || value.includes("next_lesson") || value.includes("recommend")) return "next_lesson";
            if(value.includes("体験") || value.includes("trial")) return "after_trial";
            if(value.includes("回数券") || value.includes("ticket")) return "ticket";
            if(value.includes("再来") || value.includes("休眠") || value.includes("return")) return "return";
            return "general";
          }
          function followupTypeLabel(row){ return {next_lesson:"次回レッスン",after_trial:"体験後",ticket:"回数券",return:"再来店",general:"個別フォロー"}[followupTypeKey(row)] || "個別フォロー"; }
          function compareFollowupPriority(a,b){ return followupDueMeta(a).order - followupDueMeta(b).order || compact(a?.due_date || "9999-12-31").localeCompare(compact(b?.due_date || "9999-12-31")); }
          function followupRowsForFilter(){
            const rows = openFollowupRows().slice().sort(compareFollowupPriority);
            if(state.followupFilter === "all") return rows;
            if(state.followupFilter === "today") return rows.filter(row => ["overdue","today"].includes(followupDueState(row)));
            return rows.filter(row => followupDueState(row) === state.followupFilter);
          }
          function setFollowupFilter(filter){ state.followupFilter=filter; state.currentFilter="followups"; renderFollowupSummary(); renderMainList(); }
          function renderFollowupSummary(){
            const wrap=$("followup-summary"); if(!wrap) return;
            const rows=openFollowupRows();
            const cards=[
              {key:"today",label:"今日送る案内",count:rows.filter(r=>["overdue","today"].includes(followupDueState(r))).length,cls:"bg-amber-50 border-amber-100 text-amber-800"},
              {key:"overdue",label:"期限超過",count:rows.filter(r=>followupDueState(r)==="overdue").length,cls:"bg-rose-50 border-rose-100 text-rose-700"},
              {key:"soon",label:"7日以内",count:rows.filter(r=>followupDueState(r)==="soon").length,cls:"bg-sky-50 border-sky-100 text-sky-700"},
              {key:"all",label:"未対応すべて",count:rows.length,cls:"bg-white border-slate-200 text-slate-700"},
            ];
            wrap.innerHTML=cards.map(c=>`<button type="button" onclick="setFollowupFilter('${c.key}')" class="rounded-[22px] border ${c.cls} p-4 text-left"><p class="text-xs font-black">${c.label}</p><p class="mt-1 text-3xl font-black">${c.count}</p></button>`).join("");
          }
          function followupById(id){ return openFollowupRows().find(row=>String(row?.id || "")===String(id || "")) || null; }
          function todayActionTasks(){
            const rows=[...(state.day?.today_tasks || [])];
            const seen=new Set(rows.filter(t=>t?.type==="followup").map(t=>String(t.followup_id || "")));
            openFollowupRows().filter(r=>["overdue","today"].includes(followupDueState(r))).forEach(r=>{ if(!seen.has(String(r.id || ""))){ rows.push({type:"followup",followup_id:r.id,title:r.title,detail:r.memo,customer_name:r.customer_name,due_date:r.due_date,priority:r.priority || "high"}); seen.add(String(r.id || "")); } });
            return rows.sort(compareTaskPriority);
          }
          '''
          once('function taskDueValue(task){', helpers + '\nfunction taskDueValue(task){', "helpers")
          once('  const followCount = (day.followups || []).filter(f => ["open","pending",""].includes(String(f.status || "open"))).length || summary.open_followups || 0;\n  const tasksCount = (day.today_tasks || []).length;', '  const followCount = openFollowupRows().length || summary.open_followups || 0;\n  const tasksCount = todayActionTasks().length;', "kpi")
          sub(r'(?m)^  const tasks = \(state\.day\?\.today_tasks \|\| \[\]\)\.slice\(\)\.sort\(compareTaskPriority\);$', '  const tasks = todayActionTasks();', "tasks renderTasks exact line")
          sub(r'(?m)^    const tasks = \(state\.day\?\.today_tasks \|\| \[\]\)\.slice\(\)\.sort\(compareTaskPriority\);$', '    const tasks = todayActionTasks();', "tasks renderMainList exact line")
          once('    const rows = filterRows(state.day?.followups || [], "followup");\n    wrap.innerHTML = rows.length ? rows.map(renderFollowupRow).join("") : emptyCard("フォロー対象はありません。");', '    const rows = filterRows(followupRowsForFilter(), "followup");\n    wrap.innerHTML = rows.length ? rows.map(renderFollowupRow).join("") : emptyCard("選択した期限のフォロー対象はありません。");', "follow filter")

          sub(r'function renderFollowupRow\(row\)\{.*?\n\}\n\nfunction renderCustomerRow', '''function renderFollowupRow(row){
            const due=followupDueMeta(row);
            return `<article class="rounded-[24px] ${due.card} border p-5"><div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4"><div><div class="flex flex-wrap items-center gap-2"><span class="badge ${due.badge}">${due.label}</span><span class="badge bg-purple-50 text-purple-700">${escapeHtml(followupTypeLabel(row))}</span><span class="text-xs font-bold text-slate-400">期限：${escapeHtml(formatDate(row.due_date || ""))}</span></div><h3 class="text-lg font-black text-slate-800 mt-2">${escapeHtml(row.title || "フォロー対応")}</h3><p class="text-sm text-slate-500 mt-1">${escapeHtml(row.customer_name || "お客様")}</p><p class="text-sm text-slate-600 mt-2 leading-7 whitespace-pre-wrap">${escapeHtml(row.memo || "")}</p></div><div class="flex flex-wrap lg:justify-end gap-2"><button onclick="openFollowupMessageById('${escapeHtml(row.id || "")}')" class="rounded-full yoga-gradient px-4 py-2 text-xs font-black text-white">案内文を確認</button><button onclick="markFollowupHandled('${escapeHtml(row.id || "")}')" class="rounded-full bg-white border border-slate-200 px-4 py-2 text-xs font-black text-slate-700">送信後に対応済み</button></div></div></article>`;
          }

          function renderCustomerRow''', "follow row", re.S)

          once('if(help) help.textContent = "フォロー用の文面です。内容を確認し、必要なら編集してからコピーできます。コピー後にフォローを対応済みにするか確認できます。";', 'if(help) help.textContent = "個別フォロー文面です。確認してコピーし、LINEで実際に送信した後、一覧の『送信後に対応済み』を押してください。";', "help text")
          sub(r'function openMessageFromFollowup\(id, title, memo, customerName=""\)\{.*?\n\}\nfunction setMessageTemplate', '''function openFollowupMessageById(id){
            const f=followupById(id); if(!f) return toast("フォロー情報が見つかりません。画面を更新してください。");
            const c=state.customers.find(x=>x.raw_line_id===f.line_user_id || x.line_id===f.line_user_id || x.name===f.customer_name) || {name:f.customer_name || "お客様"};
            state.messageTarget={customer:c,row:null,followup:f,type:"followup"}; resetMessageModalButtons("followup");
            $("message-subtitle").textContent=`${c.name || "お客様"} 様 / ${followupTypeLabel(f)} / ${followupDueMeta(f).label}`;
            $("message-textarea").value=buildFollowupMessage(f,c); $("message-modal").classList.remove("hidden"); safeIcons();
          }
          function openMessageFromFollowup(id){ openFollowupMessageById(id); }
          function setMessageTemplate''', "open followup", re.S)

          builder = r'''
          function buildFollowupMessage(followup,customer={}){
            const name=customer?.name || followup?.customer_name || "お客様";
            const shop=state.settings?.shop_name || "DPRO YOGA";
            const due=followup?.due_date ? formatDate(followup.due_date) : "";
            const type=followupTypeKey(followup);
            if(type==="next_lesson") return `${name}様\n\n先日はレッスンにお越しいただき、ありがとうございました。\nその後のお身体の調子はいかがでしょうか？\n\n${due ? `次回の目安としてご案内していた時期は ${due} 頃です。\n` : ""}ご都合の良い日時がありましたら、このLINEからお気軽にご連絡ください。\n\n${shop}`;
            if(type==="after_trial") return `${name}様\n\n先日は体験レッスンにお越しいただき、ありがとうございました。\nその後のお身体の調子はいかがでしょうか？\n次回をご希望の際はご都合の良い日時をお知らせください。\n\n${shop}`;
            if(type==="ticket") return `${name}様\n\nいつもありがとうございます。\n継続レッスン・回数券について、通いやすいペースに合わせてご案内できます。\nお気軽にご返信ください。\n\n${shop}`;
            return `${name}様\n\nこんにちは。\nその後のお身体の調子はいかがでしょうか？\n次回のレッスンやご相談について、ご都合の良いタイミングでお気軽にご返信ください。\n\n${shop}`;
          }
          '''
          once('function buildMessage(type, target){', builder + '\nfunction buildMessage(type, target){', "builder")
          once('  if(target.followup?.id){\n    if(confirm("このフォローを対応済みにしますか？")) await markFollowupHandled(target.followup.id, false);\n  }', '  if(target.followup?.id){ toast("文面をコピーしました。LINEで実際に送信した後、一覧の『送信後に対応済み』を押してください。"); }', "no auto handled")
          once('    await apiPost("/api/admin/followups/update-status", { followup_id: id, status: "handled", handled_note: "owner.htmlで対応済み" });', '    await apiPost("/api/admin/followups/update-status", { followup_id: id, status: "handled", handled_note: "YOGA-NEXT-8：個別LINE送信確認後にowner.htmlで対応済み" });', "handled note")
          path.write_text(text,encoding="utf-8")
          PY

      - name: "6. owner-ipad.html 今日送る案内を最適化"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path=Path("owner-ipad.html")
          text=path.read_text(encoding="utf-8")
          def once(old,new,label):
              global text
              count=text.count(old)
              if count!=1: raise SystemExit(f"{label}: count={count}")
              text=text.replace(old,new,1)
          def sub(pattern,replacement,label,flags=0):
              global text
              updated,count=re.subn(pattern,lambda _:replacement,text,count=1,flags=flags)
              if count!=1: raise SystemExit(f"{label}: count={count}")
              text=updated

          once("<title>DPRO YOGA LINE | Staff iPad STEP YOGA-NEXT-6</title>","<title>DPRO YOGA LINE | Staff iPad STEP YOGA-NEXT-8</title>","title")
          once('<p class="text-xs tracking-[.24em] text-slate-500 font-black uppercase">STEP YOGA-NEXT-6</p>','<p class="text-xs tracking-[.24em] text-slate-500 font-black uppercase">STEP YOGA-NEXT-8</p>',"label")
          once('<p class="text-sm text-slate-500 mt-2">最初に「次に対応」を確認し、受付・進捗・記録を現場3操作以内で行います。</p>','<p class="text-sm text-slate-500 mt-2">受付・進捗・記録に加え、期限順の次回案内を個別確認してからLINEへコピーします。</p>',"help")
          once('const STEP_VERSION = "YOGA-NEXT-6-IPAD-STAFF-FOCUS-20260723";','const STEP_VERSION = "YOGA-NEXT-8-IPAD-FOLLOWUP-20260724";',"version")
          once('            <div id="follow-list" class="mt-4 space-y-3"></div>','            <div id="followup-summary-ipad" class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-2"><div class="rounded-2xl bg-white/70 p-3 text-sm text-slate-500 md:col-span-4">次回案内を集計しています...</div></div>\n            <div id="follow-list" class="mt-4 space-y-3"></div>',"summary")
          once('  followups: [],\n  customers: [],','  followups: [],\n  followupFilter: "today",\n  customers: [],',"state")
          once('  renderKpis();\n  renderServices();','  renderKpis();\n  renderFollowupSummary();\n  renderServices();',"render summary")

          helpers=r'''
          function openFollowupRows(){ return (state.followups || state.day?.followups || []).filter(row=>["","open","pending"].includes(clean(row?.status || "open").toLowerCase())); }
          function followupAddDays(iso,days){
            const parts=String(iso || "").split("-").map(Number);
            if(parts.length !== 3 || parts.some(value => !Number.isFinite(value))) return "";
            const date=new Date(Date.UTC(parts[0],parts[1]-1,parts[2]));
            date.setUTCDate(date.getUTCDate()+Number(days || 0));
            return date.toISOString().slice(0,10);
          }
          function followupDueState(row){ const due=clean(row?.due_date || row?.date || ""); if(!/^\d{4}-\d{2}-\d{2}$/.test(due)) return "undated"; const today=todayIso(); if(due<today) return "overdue"; if(due===today) return "today"; if(due<=followupAddDays(today,7)) return "soon"; return "future"; }
          function followupDueMeta(row){ const map={overdue:{label:"期限超過",order:0,badge:"bg-rose-50 text-rose-700",card:"border-rose-200 bg-rose-50/35"},today:{label:"今日送る",order:1,badge:"bg-amber-50 text-amber-800",card:"border-amber-200 bg-amber-50/35"},soon:{label:"7日以内",order:2,badge:"bg-sky-50 text-sky-700",card:"border-sky-200 bg-sky-50/30"},future:{label:"今後",order:3,badge:"bg-[var(--sage-50)] text-[var(--sage-800)]",card:"border-[var(--sage-100)] bg-white/82"},undated:{label:"期限未設定",order:4,badge:"bg-slate-100 text-slate-600",card:"border-slate-100 bg-white/82"}}; return map[followupDueState(row)] || map.undated; }
          function followupTypeKey(row){ const value=`${clean(row?.followup_type)} ${clean(row?.title)}`.toLowerCase(); if(value.includes("次回レッスン")||value.includes("next_lesson")||value.includes("recommend")) return "next_lesson"; if(value.includes("体験")||value.includes("trial")) return "after_trial"; if(value.includes("回数券")||value.includes("ticket")) return "ticket"; if(value.includes("再来")||value.includes("return")) return "return"; return "general"; }
          function followupTypeLabel(row){ return {next_lesson:"次回レッスン",after_trial:"体験後",ticket:"回数券",return:"再来店",general:"個別フォロー"}[followupTypeKey(row)] || "個別フォロー"; }
          function filteredFollowupRows(){ const rows=openFollowupRows().slice().sort((a,b)=>followupDueMeta(a).order-followupDueMeta(b).order || clean(a?.due_date || "9999-12-31").localeCompare(clean(b?.due_date || "9999-12-31"))); if(state.followupFilter==="all") return rows; if(state.followupFilter==="today") return rows.filter(r=>["overdue","today"].includes(followupDueState(r))); return rows.filter(r=>followupDueState(r)===state.followupFilter); }
          function setIpadFollowupFilter(filter){ state.followupFilter=filter; renderFollowupSummary(); renderFollowups(); }
          function renderFollowupSummary(){ const wrap=$("followup-summary-ipad"); if(!wrap) return; const rows=openFollowupRows(); const items=[{key:"today",label:"今日送る",count:rows.filter(r=>["overdue","today"].includes(followupDueState(r))).length,cls:"bg-amber-50 border-amber-100 text-amber-800"},{key:"overdue",label:"期限超過",count:rows.filter(r=>followupDueState(r)==="overdue").length,cls:"bg-rose-50 border-rose-100 text-rose-700"},{key:"soon",label:"7日以内",count:rows.filter(r=>followupDueState(r)==="soon").length,cls:"bg-sky-50 border-sky-100 text-sky-700"},{key:"all",label:"未対応すべて",count:rows.length,cls:"bg-white border-slate-200 text-slate-700"}]; wrap.innerHTML=items.map(i=>`<button type="button" onclick="setIpadFollowupFilter('${i.key}')" class="touch rounded-2xl border ${i.cls} p-3 text-left"><p class="text-xs font-black">${i.label}</p><p class="mt-1 text-2xl font-black">${i.count}</p></button>`).join(""); }
          function buildFollowupMessage(f){ const name=f?.customer_name || selectedName() || "お客様"; const shop=state.status?.shop_name || "DPRO YOGA"; const due=f?.due_date ? fmtDate(f.due_date) : ""; const type=followupTypeKey(f); if(type==="next_lesson") return `${name}さま\n\n先日はレッスンにお越しいただき、ありがとうございました。\nその後のお身体の調子はいかがでしょうか？\n\n${due ? `次回の目安としてご案内していた時期は ${due} 頃です。\n` : ""}ご都合の良い日時がありましたら、このLINEからお気軽にご連絡ください。\n\n${shop}`; if(type==="after_trial") return `${name}さま\n\n先日は体験レッスンにお越しいただき、ありがとうございました。\nその後のお身体の調子はいかがでしょうか？\n次回をご希望の際はご都合の良い日時をお知らせください。\n\n${shop}`; return `${name}さま\n\nこんにちは。\nその後のお身体の調子はいかがでしょうか？\n次回のレッスンやご相談についてお気軽にご返信ください。\n\n${shop}`; }
          '''
          once('function renderFollowups(){',helpers+'\nfunction renderFollowups(){',"helpers")
          sub(r'function renderFollowups\(\)\{.*?\n\}\nfunction selectFollowup\(key\)\{.*?\n\}\nasync function markFollowupHandled', '''function renderFollowups(){
            const el=$("follow-list"); const rows=filteredFollowupRows();
            if(!rows.length){ el.innerHTML=emptyCard("選択した期限のフォロー対象はありません。"); return; }
            window.__followupRows={};
            el.innerHTML=rows.map((f,idx)=>{ const key=`f_${idx}`; window.__followupRows[key]=f; const due=followupDueMeta(f); return `<article class="rounded-[26px] ${due.card} border p-4 shadow-sm"><div class="flex flex-wrap gap-2"><span class="badge ${due.badge}">${due.label}</span><span class="badge bg-purple-50 text-purple-700">${esc(followupTypeLabel(f))}</span><span class="badge bg-white text-slate-600 border border-slate-200">${esc(fmtDate(f.due_date))}</span></div><h3 class="mt-2 text-lg font-black text-slate-800">${esc(f.customer_name || "お客様")}</h3><p class="mt-1 text-sm font-bold text-slate-700">${esc(f.title || "フォロー対応")}</p>${f.memo ? `<p class="mt-3 rounded-2xl bg-white/65 px-3 py-2 text-sm text-slate-600">${esc(f.memo)}</p>` : ""}<div class="mt-3 grid grid-cols-2 gap-2"><button onclick="selectFollowup('${key}')" class="touch rounded-2xl yoga-gradient text-white px-3 py-2 text-sm font-black">案内文を確認</button><button onclick="markFollowupHandled('${esc(f.id)}')" class="touch rounded-2xl bg-white border border-slate-200 px-3 py-2 text-sm font-black text-slate-700">送信後に対応済み</button></div></article>`; }).join("");
          }
          function selectFollowup(key){ const f=window.__followupRows?.[key]; if(!f) return; state.selectedCustomer={name:f.customer_name,line_id:f.line_user_id,id:f.customer_id}; state.selectedReservation=null; $("line-message").value=buildFollowupMessage(f); toast("文面を確認してコピーし、LINE送信後に対応済みを押してください。",3600); }
          async function markFollowupHandled''',"render followups",re.S)
          sub(r'async function markFollowupHandled\(id\)\{.*?\n\}', '''async function markFollowupHandled(id){
            if(!id) return;
            if(!window.confirm("LINEで個別に送信済みであることを確認し、このフォローを対応済みにしますか？")) return;
            try{ await apiPost("/api/admin/followups/update-status",{followup_id:id,status:"handled",handled_note:`YOGA-NEXT-8：${staffName()}が個別LINE送信確認後にiPadで対応済み`}); toast("フォローを対応済みにしました"); await loadAll(); }
            catch(err){ toast(`対応済みエラー：${err.message}`,3500); }
          }''',"handled",re.S)
          once('  const followCount = state.followups.length || (state.day?.followups || []).length || c.open_followups || 0;','  const followCount = openFollowupRows().length || c.open_followups || 0;',"kpi")
          path.write_text(text,encoding="utf-8")
          PY

      - name: "7. HTML・JavaScript・ID重複・既存API維持検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import collections, datetime as dt, hashlib, json, os, re, subprocess, tempfile

          class P(HTMLParser):
              def __init__(self): super().__init__(convert_charrefs=True); self.ids=[]; self.scripts=[]; self.inside=False; self.parts=[]
              def handle_starttag(self,tag,attrs):
                  attrs=dict(attrs)
                  if attrs.get("id"): self.ids.append(attrs["id"])
                  if tag.lower()=="script" and not attrs.get("src"): self.inside=True; self.parts=[]
              def handle_data(self,data):
                  if self.inside: self.parts.append(data)
              def handle_endtag(self,tag):
                  if tag.lower()=="script" and self.inside: self.scripts.append("\n".join(self.parts)); self.inside=False

          def inspect(name):
              path=Path(name); text=path.read_text(encoding="utf-8"); p=P(); p.feed(text); p.close()
              dup=sorted(k for k,v in collections.Counter(p.ids).items() if v>1)
              if dup: raise SystemExit(f"{name} ID重複: {dup}")
              for i,script in enumerate(p.scripts,1):
                  if not script.strip(): continue
                  with tempfile.NamedTemporaryFile("w",suffix=".js",encoding="utf-8",delete=False) as tmp: tmp.write(script); temp=tmp.name
                  try:
                      check=subprocess.run(["node","--check",temp],text=True,capture_output=True)
                      if check.returncode: raise SystemExit(f"{name} JS構文NG {i}: {check.stderr}")
                  finally: Path(temp).unlink(missing_ok=True)
              return text,path.stat().st_size

          owner,owner_size=inspect("owner.html"); ipad,ipad_size=inspect("owner-ipad.html")
          for marker in ["YOGA-NEXT-8-FOLLOWUP-RETENTION-20260724","function followupAddDays(iso,days)",'id="followup-summary"',"function todayActionTasks()","function buildFollowupMessage"]:
              if marker not in owner: raise SystemExit(f"owner不足: {marker}")
          for marker in ["YOGA-NEXT-8-IPAD-FOLLOWUP-20260724","function followupAddDays(iso,days)",'id="followup-summary-ipad"',"function buildFollowupMessage","LINEで個別に送信済み"]:
              if marker not in ipad: raise SystemExit(f"ipad不足: {marker}")

          api=re.compile(r'''["'](/api/[A-Za-z0-9_./-]+)["']'''); api_checks={}
          for name,after in [("owner.html",owner),("owner-ipad.html",ipad)]:
              before=subprocess.run(["git","show",f"{os.environ['BEFORE_TAG']}:{name}"],text=True,capture_output=True,check=True).stdout
              a=sorted(set(api.findall(after))); b=sorted(set(api.findall(before)))
              if a!=b: raise SystemExit(f"{name} API変化 before={b} after={a}")
              api_checks[name]={"unchanged":True,"paths":a}
          for name in ["member.html","index.html"]:
              current=Path(name).read_bytes(); before=subprocess.run(["git","show",f"{os.environ['BEFORE_TAG']}:{name}"],capture_output=True,check=True).stdout
              if hashlib.sha256(current).digest()!=hashlib.sha256(before).digest(): raise SystemExit(f"{name}が変更されています。")
          if owner_size>155000 or ipad_size>90000: raise SystemExit(f"容量超過 owner={owner_size} ipad={ipad_size}")
          for marker in ["pushMessage(","multicast(","broadcast(","/v2/bot/message/push"]:
              if marker in owner or marker in ipad: raise SystemExit(f"自動送信コード: {marker}")
          changed=subprocess.run(["git","diff","--name-only",os.environ["BEFORE_SHA"]],text=True,capture_output=True,check=True).stdout.splitlines()
          forbidden=[p for p in changed if re.search(r"(^|/)worker\.js$|\.sql$|supabase|wrangler",p,re.I)]
          if forbidden: raise SystemExit(f"Worker/Supabase変更: {forbidden}")

          result={"ok":True,"overall":"OK","step":"YOGA-NEXT-8","applied_revision":"R3","r1_result":"FAILED_BEFORE_COMMIT","r1_failure_reason":"tasks_substring_match_count_2","r2_result":"FAILED_BEFORE_COMMIT","r2_failure_reason":"existing_addDays_signature_dependency_in_due_test_and_logic","due_date_helper":"followupAddDays","checked_at_jst":dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),"before_sha":os.environ["BEFORE_SHA"],"before_tag":os.environ["BEFORE_TAG"],"target_files":["owner.html","owner-ipad.html"],"html_syntax":"OK","javascript_syntax":"OK","html_id_duplicates":"OK","api_paths_preserved":api_checks,"due_priority":"ADDED","automatic_line_send":False,"automatic_handled_on_copy":False,"member_index_unchanged":True,"owner_bytes":owner_size,"owner_ipad_bytes":ipad_size,"worker_changed":False,"supabase_changed":False,"api_changed":False,"changed_files_before_ledger":changed}
          Path(os.environ["RESULT_FILE"]).write_text(json.dumps(result,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          PY

      - name: "8. 次回案内・再来店業務ロジック検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import subprocess,tempfile

          class S(HTMLParser):
              def __init__(self): super().__init__(convert_charrefs=True); self.rows=[]; self.inside=False; self.parts=[]
              def handle_starttag(self,tag,attrs):
                  if tag.lower()=="script" and not dict(attrs).get("src"): self.inside=True; self.parts=[]
              def handle_data(self,data):
                  if self.inside: self.parts.append(data)
              def handle_endtag(self,tag):
                  if tag.lower()=="script" and self.inside: self.rows.append("\n".join(self.parts)); self.inside=False
          def largest(name): p=S(); p.feed(Path(name).read_text(encoding="utf-8")); return max((x for x in p.rows if x.strip()),key=len)
          prelude='''const elements={}; globalThis.window={location:{search:"",hostname:"example.com"},matchMedia:()=>({matches:false}),addEventListener:()=>{},removeEventListener:()=>{},setTimeout:()=>0,clearTimeout:()=>{},confirm:()=>false,scrollTo:()=>{}}; globalThis.location={href:"https://example.com/"}; globalThis.document={getElementById:(id)=>elements[id]||null,querySelectorAll:()=>[],addEventListener:()=>{},createElement:()=>({classList:{add:()=>{},remove:()=>{}},style:{},appendChild:()=>{},remove:()=>{}}),body:{appendChild:()=>{}},execCommand:()=>true}; globalThis.localStorage={getItem:()=>null,setItem:()=>{},removeItem:()=>{}}; globalThis.navigator={clipboard:{writeText:async()=>{}}}; globalThis.fetch=async()=>{throw new Error("disabled")}; globalThis.confirm=()=>false; globalThis.lucide={createIcons:()=>{}}; window.document=document; window.localStorage=localStorage; window.navigator=navigator;'''
          owner_test=r'''const t=todayJst(),y=followupAddDays(t,-1),n=followupAddDays(t,1),d7=followupAddDays(t,7),d8=followupAddDays(t,8); const states={y:followupDueState({due_date:y}),t:followupDueState({due_date:t}),n:followupDueState({due_date:n}),d7:followupDueState({due_date:d7}),d8:followupDueState({due_date:d8})}; if(!/^\d{4}-\d{2}-\d{2}$/.test(t)||states.y!=="overdue"||states.t!=="today"||states.n!=="soon"||states.d7!=="soon"||states.d8!=="future") throw new Error(`owner due ${JSON.stringify({t,y,n,d7,d8,states})}`); state.day={followups:[{id:"1",status:"open",due_date:y,title:"次回レッスン",customer_name:"山田",memo:"SECRET"}],today_tasks:[]}; if(!todayActionTasks().length) throw new Error("task"); if(buildFollowupMessage(state.day.followups[0],{name:"山田"}).includes("SECRET")) throw new Error("leak"); console.log("OWNER_NEXT8_OK");'''
          ipad_test=r'''const t=todayIso(),y=followupAddDays(t,-1),n=followupAddDays(t,1),d7=followupAddDays(t,7),d8=followupAddDays(t,8); const states={y:followupDueState({due_date:y}),t:followupDueState({due_date:t}),n:followupDueState({due_date:n}),d7:followupDueState({due_date:d7}),d8:followupDueState({due_date:d8})}; if(!/^\d{4}-\d{2}-\d{2}$/.test(t)||states.y!=="overdue"||states.t!=="today"||states.n!=="soon"||states.d7!=="soon"||states.d8!=="future") throw new Error(`ipad due ${JSON.stringify({t,y,n,d7,d8,states})}`); state.followups=[{id:"1",status:"open",due_date:y,title:"次回レッスン",customer_name:"山田",memo:"SECRET"}]; state.followupFilter="all"; if(filteredFollowupRows()[0].id!=="1") throw new Error("sort"); if(buildFollowupMessage(state.followups[0]).includes("SECRET")) throw new Error("leak"); console.log("IPAD_NEXT8_OK");'''
          for name,test,ok in [("owner.html",owner_test,"OWNER_NEXT8_OK"),("owner-ipad.html",ipad_test,"IPAD_NEXT8_OK")]:
              with tempfile.NamedTemporaryFile("w",suffix=".js",encoding="utf-8",delete=False) as tmp: tmp.write(prelude+"\n"+largest(name)+"\n"+test); temp=tmp.name
              try:
                  run=subprocess.run(["node",temp],text=True,capture_output=True)
                  if run.returncode or ok not in run.stdout: print(run.stdout,run.stderr); raise SystemExit(f"{name}ロジックNG")
              finally: Path(temp).unlink(missing_ok=True)
          PY

