              available:true,
              service_code:"personal_60",
              service_name:"パーソナルヨガ 60分",
              request_note:"肩まわりを中心に希望",
              previous_reservation_date:"2026-07-20",
              previous_reservation_time:"10:00",
              next_recommended_date:"2026-07-27"
            }
          };
          let navigated = null;
          goReservationPage = (options={}) => { navigated = options; };
          repeatLastBooking();
          
          const stored = JSON.parse(sessionStorage.getItem(REPEAT_STORAGE_KEY));
          if(stored.service_code !== "personal_60") throw new Error("repeat service");
          if(stored.request_note !== "肩まわりを中心に希望") throw new Error("repeat request note");
          if(stored.next_recommended_date !== "2026-07-27") throw new Error("repeat date");
          if(navigated?.repeat !== true) throw new Error("repeat navigation");
          const source = String(repeatLastBooking) + String(renderLastLesson) + String(renderLessonHistory);
          if(["lesson_content","lesson_attention","lesson_handoff","owner_memo","workflow_note"].some(marker => source.includes(marker))) throw new Error("internal reference");
          console.log("MEMBER_REPEAT_LOGIC_OK");
          '''
          
          with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
              tmp.write(member_prelude + "\n" + member_script + "\n" + member_tests)
              member_temp = tmp.name
          
          try:
              run = subprocess.run(["node", member_temp], text=True, capture_output=True)
              print(run.stdout)
              if run.returncode != 0:
                  print(run.stderr)
                  raise SystemExit("会員ページ再予約ロジック検査NG")
              if "MEMBER_REPEAT_LOGIC_OK" not in run.stdout:
                  raise SystemExit("会員ページ再予約ロジックPASSを確認できません。")
          finally:
              Path(member_temp).unlink(missing_ok=True)
          
          index_script = largest_script("index.html")
          index_prelude = r'''
          globalThis.window = {
            location:{search:"?repeat=1",href:"https://example.com/index.html?repeat=1"},
            addEventListener:()=>{},
            setTimeout:()=>0,
            clearTimeout:()=>{},
            scrollTo:()=>{}
          };
          globalThis.location = window.location;
          globalThis.document = {
            getElementById:()=>null,
            querySelectorAll:()=>[]
          };
          globalThis.sessionStorage = {
            values:{
              "yoga_member_repeat_booking":JSON.stringify({
                service_code:"personal_60",
                service_name:"パーソナルヨガ 60分",
                request_note:"肩まわりを中心に希望",
                previous_reservation_date:"2026-07-20",
                previous_reservation_time:"10:00",
                next_recommended_date:"2026-07-27"
              })
            },
            setItem(key,value){this.values[key]=String(value);},
            getItem(key){return this.values[key] ?? null;},
            removeItem(key){delete this.values[key];}
          };
          globalThis.navigator = {};
          globalThis.fetch = async()=>{throw new Error("fetch disabled");};
          globalThis.alert = ()=>{};
          globalThis.confirm = ()=>false;
          globalThis.prompt = ()=>"";
          globalThis.liff = {};
          '''
          
          index_tests = r'''
          repeatBookingData = loadRepeatBookingData();
          if(!IS_REPEAT_BOOKING) throw new Error("repeat mode");
          if(repeatBookingData.service_code !== "personal_60") throw new Error("load repeat service");
          if(repeatBookingData.previous_reservation_time !== "10:00") throw new Error("load repeat time");
          isChangeMode = false;
          isExisting = true;
          if(lineReceptionType() !== "repeat") throw new Error("repeat reception type");
          isChangeMode = true;
          if(lineReceptionType() !== "change") throw new Error("change precedence");
          console.log("INDEX_REPEAT_LOGIC_OK");
          '''
          
          with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
              tmp.write(index_prelude + "\n" + index_script + "\n" + index_tests)
              index_temp = tmp.name
          
          try:
              run = subprocess.run(["node", index_temp], text=True, capture_output=True)
              print(run.stdout)
              if run.returncode != 0:
                  print(run.stderr)
                  raise SystemExit("予約画面プリセットロジック検査NG")
              if "INDEX_REPEAT_LOGIC_OK" not in run.stdout:
                  raise SystemExit("予約画面プリセットロジックPASSを確認できません。")
          finally:
              Path(index_temp).unlink(missing_ok=True)
          PY

      - name: "10. NEXT-7完成台帳更新"
        shell: bash
        run: |
          set -Eeuo pipefail

          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %z')"
          member_blob="$(git hash-object member.html)"
          index_blob="$(git hash-object index.html)"
          member_bytes="$(wc -c < member.html | tr -d ' ')"
          index_bytes="$(wc -c < index.html | tr -d ' ')"

          cat > "$LEDGER_FILE" <<EOF
          system_name: "DPRO ヨガ LINE"
          standard: "DPRO NEXT"
          step_name: "LINE会員ページ・履歴・前回と同じ予約"
          current_step: "YOGA-NEXT-7-COMPLETE"
          previous_step: "YOGA-NEXT-6-COMPLETE"
          next_step: "YOGA-NEXT-8"
          completed_at_jst: "$completed_at"
          applied_revision: "R3"
          r1_result: "FAILED_BEFORE_COMMIT"
          r1_failure_reason: "reservation_origin_exact_match_count_2"
          r2_result: "FAILED_BEFORE_COMMIT"
          r2_failure_reason: "owner_memo_privacy_guard_false_positive"
          before_sha: "$BEFORE_SHA"
          before_tag: "$BEFORE_TAG"
          before_tag_status: "$BEFORE_TAG_STATUS"
          target_files:
            - "member.html"
            - "index.html"
          worker:
            changed: true
            deployed_before_yml: true
            version: "$EXPECTED_WORKER_VERSION"
            member_contract_version: "$EXPECTED_MEMBER_CONTRACT"
          privacy:
            public_customer_profile_sanitized: true
            active_reservations_sanitized: true
            lesson_history_sanitized: true
            followups_sanitized: true
            line_message_body_excluded: true
            customer_memo_excluded: true
            owner_memo_excluded: true
            owner_memo_privacy_guard_required: true
            internal_field_access_pattern_check: true
            lesson_content_excluded: true
            lesson_attention_excluded: true
            lesson_handoff_excluded: true
            workflow_note_excluded: true
          implementation:
            current_reservation_preserved: true
            last_lesson_card: true
            lesson_history: true
            lesson_history_initial_limit: 3
            lesson_history_max_api_rows: 24
            repeat_same_service: true
            repeat_customer_request_note: true
            repeat_date_time_reselection: true
            repeat_transport: "sessionStorage"
            query_parameter_contains_internal_data: false
            automatic_line_send: false
          checks:
            required_files: "OK"
            previous_step: "OK"
            yml_syntax: "OK"
            worker_member_contract: "OK"
            worker_privacy: "OK"
            html_syntax: "OK"
            javascript_syntax: "OK"
            html_id_duplicates: "OK"
            public_information_separation: "OK"
            member_repeat_logic: "OK"
            index_repeat_logic: "OK"
            page_api_paths_preserved: "OK"
            admin_screen_hash_preservation: "OK"
            overall: "OK"
          change_record:
            worker_changed: true
            supabase_changed: false
            api_changed: true
            api_response_changed: true
            member_html_changed: true
            index_html_changed: true
            owner_html_changed: false
            owner_ipad_html_changed: false
            existing_data_changed: false
          file_result:
            member:
              path: "member.html"
              blob_sha: "$member_blob"
              bytes: $member_bytes
              version: "YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723"
            reservation:
              path: "index.html"
              blob_sha: "$index_blob"
              bytes: $index_bytes
              version: "YOGA-NEXT-7-REPEAT-BOOKING-20260723"
          generated_files:
            - "dpro-next-ledger.yml"
            - "dpro-next-yoga-next-7-result.json"
          known_attention:
            - "前回と同じ予約はメニューとお客様自身の希望だけを引き継ぎ、日付・時間は毎回選び直す"
            - "スタッフ用レッスン記録は会員画面へ公開しない"
            - "次回おすすめ日は表示のみで、自動LINE配信は行わない"
            - "LINE会員本人確認を優先し、電話番号検索はデモ用途に限定する"
          rollback:
            github:
              method: "backup_tag"
              tag: "$BEFORE_TAG"
              command_reference: "git checkout $BEFORE_TAG -- member.html index.html dpro-next-ledger.yml"
            worker:
              method: "redeploy_previous_worker"
              previous_version: "YOGA-NEXT-5-LESSON-RECORD-20260723"
          workflow_self_delete_after_success: true
          failed_workflow_self_delete_after_success: true
          failed_r2_workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "11. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "YOGA-NEXT-7-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-8"' "$LEDGER_FILE"
          grep -q 'applied_revision: "R3"' "$LEDGER_FILE"
          grep -q '"overall": "OK"' "$RESULT_FILE"
          grep -q 'YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723' member.html
          grep -q 'YOGA-NEXT-7-REPEAT-BOOKING-20260723' index.html
          grep -q 'id="last-lesson-card"' member.html
          grep -q 'id="lesson-history-list"' member.html
          grep -q 'function repeatLastBooking()' member.html
          grep -q 'id="repeat-mode-banner"' index.html
          grep -q 'async function applyRepeatBookingPrefill()' index.html

          allowed_regex='^(member\.html|index\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-7-result\.json|\.github/workflows/STEP-YOGA-NEXT-7\.yml|\.github/workflows/STEP-YOGA-NEXT-7-R2\.yml|\.github/workflows/STEP-YOGA-NEXT-7-R3\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed_regex" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "::error::想定外の変更ファイルがあります:"
            echo "$unexpected"
            exit 1
          fi

          {
            echo ""
            echo "### YOGA-NEXT-7-R3 検査結果"
            echo "- 会員用安全データ契約: OK"
            echo "- 前回レッスン表示: OK"
            echo "- 受講履歴: OK"
            echo "- 前回と同じメニュー予約: OK"
            echo "- 内部記録非公開: OK"
            echo "- 自動LINE配信なし: OK"
            echo "- Supabase変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "12. 成功後R1・R2・R3 YMLを削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$FAILED_WORKFLOW_R1_PATH" "$FAILED_WORKFLOW_R2_PATH" "$WORKFLOW_PATH"
          test ! -f "$FAILED_WORKFLOW_R1_PATH"
          test ! -f "$FAILED_WORKFLOW_R2_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "13. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add member.html index.html "$LEDGER_FILE" "$RESULT_FILE"
          git add -A .github/workflows

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "fix(yoga-next): complete YOGA-NEXT-7 R3 privacy validation [skip ci]"
          git push origin HEAD:main

          {
            echo ""
            echo "### 完了"
            echo "- current_step: YOGA-NEXT-7-COMPLETE"
            echo "- next_step: YOGA-NEXT-8"
            echo "- 適用版: R3"
            echo "- Worker変更: あり・稼働確認済み"
            echo "- Supabase変更: なし"
            echo "- R1・R2・R3 YML: 削除済み"
            echo "- 自動Commit・Push: 完了"
          } >> "$GITHUB_STEP_SUMMARY"
