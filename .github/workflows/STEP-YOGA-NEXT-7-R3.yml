name: "STEP YOGA-NEXT-7-R3 | LINE会員ページ・履歴・前回と同じ予約 公開情報検査修正版"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-7-R3.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-7-r3-member-history-repeat
  cancel-in-progress: false

jobs:
  member-history-repeat:
    name: "YOGA-NEXT-7-R3 member history and repeat booking"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      STEP_NAME: "YOGA-NEXT-7-R3"
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-7-R3.yml"
      FAILED_WORKFLOW_R1_PATH: ".github/workflows/STEP-YOGA-NEXT-7.yml"
      FAILED_WORKFLOW_R2_PATH: ".github/workflows/STEP-YOGA-NEXT-7-R2.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-7-result.json"
      BEFORE_TAG: "dpro-yoga-next-7-before-20260723"
      EXPECTED_MEMBER_BLOB_SHA: "caceca635815dcc21699b2bedb88e3f948ceeba4"
      EXPECTED_INDEX_BLOB_SHA: "df33c788e773bd1417d5e75cd9d4a15a90595573"
      EXPECTED_OWNER_BLOB_SHA: "fc0df37d9d782dcab18ef35fa7a808f6f500f354"
      EXPECTED_IPAD_BLOB_SHA: "dc50811237ef63325543da029d97cd90052ef796"
      EXPECTED_LEDGER_BLOB_SHA: "b38072a5ce2992f3d310767eb6897238f5c01fe3"
      EXPECTED_WORKER_VERSION: "YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723"
      EXPECTED_MEMBER_CONTRACT: "YOGA-NEXT-7-SAFE-MEMBER-CONTRACT-20260723"
      WORKER_BASE_URL: "https://yoga-liff-webhook.dpromstk2000.workers.dev"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・R1・R2未反映確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in \
            member.html \
            index.html \
            owner.html \
            owner-ipad.html \
            dpro-next-ledger.yml \
            dpro-next-yoga-next-6-result.json \
            "$WORKFLOW_PATH"
          do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::YOGA-NEXT-7-R3の必須ファイルがありません。"
              exit 1
            fi
          done

          grep -q 'current_step: "YOGA-NEXT-6-COMPLETE"' "$LEDGER_FILE" || {
            echo "::error file=$LEDGER_FILE::前STEP YOGA-NEXT-6-COMPLETEを確認できません。"
            exit 1
          }

          declare -A expected=(
            ["member.html"]="$EXPECTED_MEMBER_BLOB_SHA"
            ["index.html"]="$EXPECTED_INDEX_BLOB_SHA"
            ["owner.html"]="$EXPECTED_OWNER_BLOB_SHA"
            ["owner-ipad.html"]="$EXPECTED_IPAD_BLOB_SHA"
            ["$LEDGER_FILE"]="$EXPECTED_LEDGER_BLOB_SHA"
          )

          for file in "${!expected[@]}"; do
            current="$(git hash-object "$file")"
            if [[ "$current" != "${expected[$file]}" ]]; then
              echo "::error file=$file::R1またはR2実行後に基準ファイルが変更されています。期待=${expected[$file]} / 現在=$current"
              exit 1
            fi
          done

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            before_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            before_reason="existing_r1_backup_tag"
          else
            mapfile -t head_changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
            before_sha="$(git rev-parse HEAD)"
            before_reason="current_head"

            if [[ "${#head_changed[@]}" -eq 1 && "${head_changed[0]}" == "$WORKFLOW_PATH" ]]; then
              before_sha="$(git rev-parse HEAD^)"
              before_reason="workflow_upload_parent"
            fi
          fi

          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "BEFORE_REASON=$before_reason" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-7-R3"
            echo ""
            echo "- R1停止: index.html reservation_origin完全一致2件"
            echo "- R2停止: owner_memo安全ガードの文字列を漏えいと誤判定"
            echo "- R3修正: 内部項目の実参照だけを正規表現で検査"
            echo "- privacy.owner_memo_returned安全ガード: 必須として別検査"
            echo "- R1・R2による公開ファイル変更: なし"
            echo "- Worker会員契約・プライバシー検査: PASS済み"
            echo "- 対象: member.html / index.html"
            echo "- Supabase変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            if [[ "$tag_sha" != "$BEFORE_SHA" ]]; then
              echo "::error::既存タグと変更前SHAが一致しません。タグ=$tag_sha / 変更前=$BEFORE_SHA"
              exit 1
            fi
            tag_status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-7"
            git push origin "$BEFORE_TAG"
            tag_status="created"
          fi

          echo "BEFORE_TAG_STATUS=$tag_status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. Worker会員契約・プライバシー稼働確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          health_file="$(mktemp)"
          check_file="$(mktemp)"
          trap 'rm -f "$health_file" "$check_file"' EXIT

          curl --fail --silent --show-error --retry 3 --retry-delay 2 \
            "$WORKER_BASE_URL/api/health" > "$health_file"

          curl --fail --silent --show-error --retry 3 --retry-delay 2 \
            "$WORKER_BASE_URL/api/public/member/check?shop_code=yoga_demo" > "$check_file"

          python3 - "$health_file" "$check_file" <<'PY'
          import json
          import os
          import sys
          
          with open(sys.argv[1], encoding="utf-8") as f:
              health = json.load(f)
          with open(sys.argv[2], encoding="utf-8") as f:
              check = json.load(f)
          
          expected_worker = os.environ["EXPECTED_WORKER_VERSION"]
          expected_contract = os.environ["EXPECTED_MEMBER_CONTRACT"]
          
          if health.get("worker_version") != expected_worker:
              raise SystemExit(f"Worker版不一致: {health.get('worker_version')} / expected={expected_worker}")
          if check.get("worker_version") != expected_worker:
              raise SystemExit(f"member check Worker版不一致: {check.get('worker_version')}")
          if check.get("member_contract_version") != expected_contract:
              raise SystemExit(f"会員契約版不一致: {check.get('member_contract_version')}")
          if check.get("privacy_ok") is not True:
              raise SystemExit("会員APIプライバシー検査がOKではありません。")
          if check.get("repeat_booking") is not True or check.get("lesson_history") is not True:
              raise SystemExit("履歴または前回と同じ予約機能が有効ではありません。")
          
          excluded = set(check.get("excluded_internal_fields") or [])
          required_excluded = {
              "customer.memo",
              "owner_memo",
              "lesson_content",
              "lesson_attention",
              "lesson_handoff",
              "workflow_note",
              "line message body",
              "audit logs",
          }
          missing = sorted(required_excluded - excluded)
          if missing:
              raise SystemExit(f"内部情報除外契約不足: {missing}")
          
          print(json.dumps({
              "worker_version": expected_worker,
              "member_contract_version": expected_contract,
              "privacy_ok": True,
              "repeat_booking": True,
              "lesson_history": True,
          }, ensure_ascii=False, indent=2))
          PY

      - name: "6. member.html 会員履歴・前回予約導線を追加"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          
          path = Path("member.html")
          text = path.read_text(encoding="utf-8")
          
          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が1件ではありません。count={count}")
              text = text.replace(old, new, 1)
          
          def replace_regex(pattern: str, replacement: str, label: str, flags=0) -> None:
              global text
              updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 正規表現対象が1件ではありません。count={count}")
              text = updated
          
          def insert_before_regex(pattern: str, insertion: str, label: str, flags=0) -> None:
              global text
              matches = list(re.finditer(pattern, text, flags))
              if len(matches) != 1:
                  raise SystemExit(f"{label}: 挿入対象が1件ではありません。count={len(matches)}")
              match = matches[0]
              text = text[:match.start()] + insertion + text[match.start():]
          
          replace_once(
              "<title>DPRO YOGA LINE 会員ページ STEP YOGA-PHONE-3</title>",
              "<title>DPRO YOGA LINE 会員ページ STEP YOGA-NEXT-7</title>",
              "title"
          )
          replace_once(
              '<h1 class="text-2xl font-black text-stone-900 mt-1">ヨガ会員ページ</h1>',
              '<h1 class="text-2xl font-black text-stone-900 mt-1">ヨガ会員・受講履歴</h1>',
              "member title"
          )
          replace_once(
              '<p id="header-subtitle" class="text-sm text-stone-500 mt-2 leading-relaxed">現在の予約・変更・キャンセル・次回案内を確認できます。</p>',
              '<p id="header-subtitle" class="text-sm text-stone-500 mt-2 leading-relaxed">次の予約、前回のレッスン、受講履歴を安全に確認できます。</p>',
              "header subtitle"
          )
          
          replace_once(
              '''        <div class="grid grid-cols-2 gap-3 mt-5">
                    <div class="bg-emerald-50 rounded-2xl p-4 border border-emerald-100">
                      <p class="text-xs font-bold text-emerald-700">現在予約</p>
                      <p id="reservation-count" class="text-2xl font-black text-emerald-900 mt-1">0件</p>
                    </div>
                    <div class="bg-stone-50 rounded-2xl p-4 border border-stone-100">
                      <p class="text-xs font-bold text-stone-600">フォロー案内</p>
                      <p id="followup-count" class="text-2xl font-black text-stone-900 mt-1">0件</p>
                    </div>
                  </div>''',
              '''        <div class="grid grid-cols-3 gap-2 mt-5">
                    <div class="bg-emerald-50 rounded-2xl p-3 border border-emerald-100">
                      <p class="text-[11px] font-bold text-emerald-700">現在予約</p>
                      <p id="reservation-count" class="text-2xl font-black text-emerald-900 mt-1">0件</p>
                    </div>
                    <div class="bg-sky-50 rounded-2xl p-3 border border-sky-100">
                      <p class="text-[11px] font-bold text-sky-700">受講履歴</p>
                      <p id="lesson-history-count" class="text-2xl font-black text-sky-900 mt-1">0件</p>
                    </div>
                    <div class="bg-stone-50 rounded-2xl p-3 border border-stone-100">
                      <p class="text-[11px] font-bold text-stone-600">次回案内</p>
                      <p id="followup-count" class="text-2xl font-black text-stone-900 mt-1">0件</p>
                    </div>
                  </div>''',
              "member KPI"
          )
          
          member_history_sections = '''      <section id="last-lesson-section" class="glass rounded-3xl p-5 border border-emerald-100 space-y-4">
                  <div>
                    <p class="text-xs font-black text-emerald-700 tracking-[0.16em]">LAST LESSON</p>
                    <h2 class="text-lg font-black text-stone-900 mt-1">前回のレッスン</h2>
                    <p class="text-xs text-stone-500 mt-1">前回の予約内容を確認し、同じメニューで次回予約へ進めます。</p>
                  </div>
                  <div id="last-lesson-card"></div>
                </section>
          
                <section id="lesson-history-section" class="glass rounded-3xl p-5 border border-white/70 space-y-4">
                  <button type="button" onclick="toggleLessonHistory()" class="w-full flex items-center justify-between gap-3 text-left">
                    <div>
                      <h2 class="text-lg font-black text-stone-900">受講履歴</h2>
                      <p class="text-xs text-stone-500 mt-1">受講日・メニュー・次回おすすめ日を表示します。</p>
                    </div>
                    <span id="lesson-history-toggle-label" class="text-xs font-bold text-emerald-700">すべて見る</span>
                  </button>
                  <div id="lesson-history-list" class="space-y-3"></div>
                </section>
          
          '''
          insert_before_regex(
              r'''^[ \t]*<section class="glass rounded-3xl p-5 border border-white/70 space-y-4">\s*<div class="flex items-center justify-between gap-3">\s*<div>\s*<h2 class="text-lg font-black text-stone-900">現在の予約</h2>''',
              member_history_sections,
              "member history sections",
              flags=re.M | re.S
          )
          
          replace_once(
              '<h2 class="text-lg font-black text-stone-900">最近の履歴</h2>',
              '<h2 class="text-lg font-black text-stone-900">予約手続き履歴</h2>',
              "history title"
          )
          replace_once(
              '<p class="text-xs text-stone-500 mt-1">予約・キャンセル・カルテ更新など</p>',
              '<p class="text-xs text-stone-500 mt-1">予約・変更・キャンセルの記録です。</p>',
              "history help"
          )
          
          replace_once(
              '''  // STEP YOGA-PHONE-3: 会員ページ 電話番号正規化対応
            const WORKER_URL = "https://yoga-liff-webhook.dpromstk2000.workers.dev";
            const LIFF_ID = "2010377734-4tHMhUx6";
            const SHOP_CODE = "yoga_demo";''',
              '''  // STEP YOGA-NEXT-7: 会員履歴・前回と同じ予約・公開情報分離
            const WORKER_URL = "https://yoga-liff-webhook.dpromstk2000.workers.dev";
            const LIFF_ID = "2010377734-4tHMhUx6";
            const SHOP_CODE = "yoga_demo";
            const STEP_VERSION = "YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723";
            const MEMBER_CONTRACT_VERSION = "YOGA-NEXT-7-SAFE-MEMBER-CONTRACT-20260723";
            const REPEAT_STORAGE_KEY = "yoga_member_repeat_booking";''',
              "member constants"
          )
          
          replace_once(
              '''  let changeAvailableTimes = [];
            let isSubmittingChange = false;''',
              '''  let changeAvailableTimes = [];
            let isSubmittingChange = false;
            let lessonHistoryExpanded = false;''',
              "member state"
          )
          
          replace_once(
              '''      $("header-subtitle").textContent = `${data.shop_name || "DPRO YOGA"} の会員ページです。現在予約・変更・キャンセル・次回案内を確認できます。`;''',
              '''      $("header-subtitle").textContent = `${data.shop_name || "DPRO YOGA"} の会員ページです。次の予約・前回内容・受講履歴を確認できます。`;''',
              "status subtitle"
          )
          
          replace_regex(
              r'''function renderMember\(data\) \{\n.*?\n  \}\n\n  function isHandledFollowup''',
              '''function renderMember(data) {
              if(data.member_contract_version !== MEMBER_CONTRACT_VERSION){
                throw new Error("会員ページ用APIの更新を確認できません。時間をおいて開き直してください。");
              }
              const privacy = data.privacy_guard || {};
              if(privacy.internal_lesson_notes_returned !== false || privacy.owner_memo_returned !== false){
                throw new Error("会員ページの公開情報ガードを確認できません。");
              }
          
              const customer = data.customer || {};
              const reservations = Array.isArray(data.reservations) ? data.reservations : [];
              const followups = Array.isArray(data.followups) ? data.followups : [];
              const lessonHistory = Array.isArray(data.lesson_history) ? data.lesson_history : [];
          
              $("member-name").textContent = customer.name || customer.customer_name || lineDisplayName || "お客様";
              $("member-sub").textContent = customer.phone ? `電話番号：${normalizePhone(customer.phone)}` : "LINE会員";
              $("reservation-count").textContent = `${reservations.length}件`;
              $("lesson-history-count").textContent = `${lessonHistory.length}件`;
              $("followup-count").textContent = `${followups.filter(f => !isHandledFollowup(f)).length}件`;
          
              renderLastLesson(data.last_lesson || null, data.repeat_booking || null);
              renderLessonHistory(lessonHistory);
              renderReservations(reservations);
              renderProfile(customer);
              renderFollowups(followups);
              renderHistory(Array.isArray(data.history) ? data.history : []);
              renderConsultMessage();
            }
          
            function isHandledFollowup''',
              "render member",
              flags=re.S
          )
          
          replace_regex(
              r'''function isHandledFollowup\(row\) \{\n.*?\n  \}\n\n  function renderReservations''',
              '''function isHandledFollowup(row) {
              return ["handled", "done", "closed", "対応済み"].includes(String(row.status || ""));
            }
          
            function renderLastLesson(lastLesson, repeatBooking) {
              const container = $("last-lesson-card");
              if(!lastLesson){
                container.innerHTML = `<div class="bg-stone-50 border border-stone-100 rounded-2xl p-5 text-center">
                  <p class="text-sm font-black text-stone-800">受講履歴はまだありません</p>
                  <p class="text-xs text-stone-500 mt-2">受講後に、前回メニューから再予約できるようになります。</p>
                  <button type="button" onclick="goReservationPage()" class="mt-4 w-full bg-emerald-700 text-white font-black py-3 rounded-xl">新しく予約する</button>
                </div>`;
                return;
              }
          
              const recommended = lastLesson.next_recommended_date
                ? `<p class="mt-2 text-xs font-bold text-emerald-800">次回おすすめ：${escapeHtml(formatDate(lastLesson.next_recommended_date))}</p>`
                : "";
              const request = lastLesson.request_note
                ? `<div class="mt-3 bg-white/80 border border-emerald-100 rounded-xl p-3"><p class="text-[11px] font-bold text-stone-500">前回のお客様のご希望</p><p class="mt-1 text-sm text-stone-700 whitespace-pre-wrap">${escapeHtml(lastLesson.request_note)}</p></div>`
                : "";
              const repeatAvailable = repeatBooking?.available === true && repeatBooking?.service_code;
          
              container.innerHTML = `<div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
                <div class="flex items-start justify-between gap-3">
                  <div>
                    <p class="text-xs font-black text-emerald-700">${escapeHtml(formatDate(lastLesson.reservation_date))}</p>
                    <h3 class="text-lg font-black text-stone-900 mt-1">${escapeHtml(lastLesson.service_name || "ヨガレッスン")}</h3>
                    <p class="text-xs text-stone-600 mt-1">${escapeHtml(normalizeTime(lastLesson.reservation_time || "", ""))} 開始</p>
                  </div>
                  <span class="text-xs font-bold bg-white text-emerald-700 px-3 py-2 rounded-full">受講済み</span>
                </div>
                ${recommended}
                ${request}
                <button type="button" ${repeatAvailable ? "" : "disabled"} onclick="repeatLastBooking()" class="mt-4 w-full ${repeatAvailable ? "bg-emerald-700 text-white" : "bg-stone-200 text-stone-500"} font-black py-3 rounded-xl">
                  前回と同じメニューで予約
                </button>
                <p class="mt-2 text-[11px] text-stone-500 leading-relaxed">日付と時間は次の画面で選びます。スタッフ用の記録・注意事項・引継ぎは会員ページには表示しません。</p>
              </div>`;
            }
          
            function renderLessonHistory(history) {
              const container = $("lesson-history-list");
              if(!history.length){
                container.innerHTML = `<div class="bg-stone-50 border border-stone-100 rounded-2xl p-4 text-sm text-stone-500">受講履歴はまだありません。</div>`;
                $("lesson-history-toggle-label").textContent = "履歴なし";
                return;
              }
          
              const visible = lessonHistoryExpanded ? history : history.slice(0, 3);
              container.innerHTML = visible.map(row => `
                <div class="bg-stone-50 border border-stone-100 rounded-2xl p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div>
                      <p class="text-xs font-black text-emerald-700">${escapeHtml(formatDate(row.reservation_date))}</p>
                      <p class="text-base font-black text-stone-900 mt-1">${escapeHtml(row.service_name || "ヨガレッスン")}</p>
                      <p class="text-xs text-stone-500 mt-1">${escapeHtml(normalizeTime(row.reservation_time || "", ""))} 開始</p>
                    </div>
                    <span class="text-[11px] font-bold bg-white text-stone-600 px-3 py-2 rounded-full">受講済み</span>
                  </div>
                  ${row.next_recommended_date ? `<p class="mt-3 text-xs font-bold text-emerald-800">次回おすすめ：${escapeHtml(formatShortDate(row.next_recommended_date))}</p>` : ""}
                </div>`).join("");
          
              $("lesson-history-toggle-label").textContent = lessonHistoryExpanded ? "3件表示" : history.length > 3 ? `すべて見る（${history.length}件）` : `${history.length}件`;
            }
          
            function toggleLessonHistory(){
              lessonHistoryExpanded = !lessonHistoryExpanded;
              renderLessonHistory(Array.isArray(memberData?.lesson_history) ? memberData.lesson_history : []);
            }
          
            function repeatLastBooking(){
              const repeat = memberData?.repeat_booking;
              if(!repeat?.available || !repeat.service_code){
                alert("前回と同じ予約に使える履歴がありません。");
                return;
              }
          
              const safeRepeat = {
                service_code: clean(repeat.service_code).slice(0, 80),
                service_name: clean(repeat.service_name).slice(0, 160),
                request_note: clean(repeat.request_note).slice(0, 1000),
                previous_reservation_date: isValidDateString(repeat.previous_reservation_date) ? repeat.previous_reservation_date : "",
                previous_reservation_time: normalizeTime(repeat.previous_reservation_time || "", ""),
                next_recommended_date: isValidDateString(repeat.next_recommended_date) ? repeat.next_recommended_date : "",
