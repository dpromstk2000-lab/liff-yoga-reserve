          from html.parser import HTMLParser
          from pathlib import Path
          import collections
          import datetime as dt
          import hashlib
          import json
          import os
          import re
          import subprocess
          import tempfile
          
          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
                  self.scripts = []
                  self.in_script = False
                  self.parts = []
          
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if attrs.get("id"):
                      self.ids.append(attrs["id"])
                  if tag.lower() == "script" and not attrs.get("src"):
                      self.in_script = True
                      self.parts = []
          
              def handle_data(self, data):
                  if self.in_script:
                      self.parts.append(data)
          
              def handle_endtag(self, tag):
                  if tag.lower() == "script" and self.in_script:
                      self.scripts.append("\n".join(self.parts))
                      self.in_script = False
                      self.parts = []
          
          def inspect(file_name):
              path = Path(file_name)
              text = path.read_text(encoding="utf-8")
              parser = Inspector()
              parser.feed(text)
              parser.close()
          
              duplicates = sorted(k for k,v in collections.Counter(parser.ids).items() if v > 1)
              if duplicates:
                  raise SystemExit(f"{file_name} HTML ID重複: {duplicates}")
          
              for i, script in enumerate(parser.scripts, 1):
                  if not script.strip():
                      continue
                  with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
                      tmp.write(script)
                      temp_name = tmp.name
                  try:
                      check = subprocess.run(["node", "--check", temp_name], text=True, capture_output=True)
                      if check.returncode != 0:
                          raise SystemExit(f"{file_name} JavaScript構文NG inline-{i}: {check.stderr}")
                  finally:
                      Path(temp_name).unlink(missing_ok=True)
          
              return text, path.stat().st_size
          
          member, member_size = inspect("member.html")
          index, index_size = inspect("index.html")
          
          member_required = {
              "version": "YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723",
              "contract": "YOGA-NEXT-7-SAFE-MEMBER-CONTRACT-20260723",
              "last_lesson": 'id="last-lesson-card"',
              "lesson_history": 'id="lesson-history-list"',
              "repeat_function": "function repeatLastBooking()",
              "repeat_storage": 'sessionStorage.setItem(REPEAT_STORAGE_KEY',
              "privacy_guard": "internal_lesson_notes_returned",
              "safe_history": "function renderHistory(history)",
              "member_api": '"/api/public/customer"',
          }
          index_required = {
              "version": "YOGA-NEXT-7-REPEAT-BOOKING-20260723",
              "repeat_banner": 'id="repeat-mode-banner"',
              "repeat_load": "function loadRepeatBookingData()",
              "repeat_apply": "async function applyRepeatBookingPrefill()",
              "repeat_origin": '"member_repeat"',
              "repeat_type": 'return "repeat"',
              "create_api": '"/api/reservations/create"',
              "change_api": '"/api/reservations/change"',
              "cancel_api": '"/api/reservations/cancel"',
          }
          
          missing_member = [name for name, marker in member_required.items() if marker not in member]
          missing_index = [name for name, marker in index_required.items() if marker not in index]
          if missing_member:
              raise SystemExit(f"member.html必要機能不足: {missing_member}")
          if missing_index:
              raise SystemExit(f"index.html必要機能不足: {missing_index}")
          
          required_privacy_guards = [
              "privacy.internal_lesson_notes_returned !== false",
              "privacy.owner_memo_returned !== false",
          ]
          missing_privacy_guards = [marker for marker in required_privacy_guards if marker not in member]
          if missing_privacy_guards:
              raise SystemExit(f"会員画面の公開情報安全ガード不足: {missing_privacy_guards}")

          # 安全ガード名の owner_memo_returned は許可し、
          # 実際に内部フィールドを読み取るコードだけを漏えいとして検出する。
          forbidden_member_patterns = {
              "customer.memo": re.compile(r'''\bcustomer\s*(?:\.\s*memo\b|\[\s*["']memo["']\s*\])'''),
              "row.memo": re.compile(r'''\brow\s*(?:\.\s*memo\b|\[\s*["']memo["']\s*\])'''),
              "lesson_content": re.compile(r'''(?:\.\s*lesson_content\b|\[\s*["']lesson_content["']\s*\]|["']lesson_content["']\s*:)'''),
              "lesson_attention": re.compile(r'''(?:\.\s*lesson_attention\b|\[\s*["']lesson_attention["']\s*\]|["']lesson_attention["']\s*:)'''),
              "lesson_handoff": re.compile(r'''(?:\.\s*lesson_handoff\b|\[\s*["']lesson_handoff["']\s*\]|["']lesson_handoff["']\s*:)'''),
              "owner_memo": re.compile(r'''(?:\.\s*owner_memo\b|\[\s*["']owner_memo["']\s*\]|["']owner_memo["']\s*:)'''),
              "workflow_note": re.compile(r'''(?:\.\s*workflow_note\b|\[\s*["']workflow_note["']\s*\]|["']workflow_note["']\s*:)'''),
          }
          leaked = sorted(
              label for label, pattern in forbidden_member_patterns.items()
              if pattern.search(member)
          )
          if leaked:
              raise SystemExit(f"会員画面に内部情報の実参照があります: {leaked}")
          
          if "/api/admin/" in member or "/api/admin/" in index:
              raise SystemExit("お客様画面に管理APIが混入しています。")
          if "管理コード" in member or "管理コード" in index:
              raise SystemExit("お客様画面に管理コード文言が混入しています。")
          
          api_pattern = re.compile(r'''["'](/api/[A-Za-z0-9_./-]+)["']''')
          api_checks = {}
          for file_name in ["member.html", "index.html"]:
              before = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  text=True,
                  capture_output=True,
                  check=True,
              ).stdout
              after = Path(file_name).read_text(encoding="utf-8")
              before_paths = sorted(set(api_pattern.findall(before)))
              after_paths = sorted(set(api_pattern.findall(after)))
              api_checks[file_name] = {
                  "before": before_paths,
                  "after": after_paths,
                  "unchanged": before_paths == after_paths,
              }
              if before_paths != after_paths:
                  raise SystemExit(f"{file_name}のページAPIパスが変化しています。before={before_paths} after={after_paths}")
          
          unchanged = {}
          for file_name in ["owner.html", "owner-ipad.html"]:
              current = Path(file_name).read_bytes()
              baseline = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file_name}"],
                  capture_output=True,
                  check=True,
              ).stdout
              unchanged[file_name] = hashlib.sha256(current).hexdigest() == hashlib.sha256(baseline).hexdigest()
              if not unchanged[file_name]:
                  raise SystemExit(f"{file_name}が変更されています。")
          
          if member_size > 90000:
              raise SystemExit(f"member.html容量超過: {member_size} bytes")
          if index_size > 100000:
              raise SystemExit(f"index.html容量超過: {index_size} bytes")
          
          changed = subprocess.run(
              ["git", "diff", "--name-only", os.environ["BEFORE_SHA"]],
              text=True,
              capture_output=True,
              check=True,
          ).stdout.splitlines()
          
          forbidden_files = [
              path for path in changed
              if re.search(r"(^|/)worker\.js$|\.sql$|supabase|wrangler", path, re.I)
          ]
          if forbidden_files:
              raise SystemExit(f"リポジトリ内のWorkerまたはSupabase変更を検出: {forbidden_files}")
          
          result = {
              "ok": True,
              "overall": "OK",
              "step": "YOGA-NEXT-7-R3",
              "completed_step": "YOGA-NEXT-7",
              "applied_revision": "R3",
              "r1_result": "FAILED_BEFORE_COMMIT",
              "r1_failure_reason": "reservation_origin_exact_match_count_2",
              "r2_result": "FAILED_BEFORE_COMMIT",
              "r2_failure_reason": "owner_memo_privacy_guard_false_positive",
              "checked_at_jst": dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "branch": os.environ.get("GITHUB_REF_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "before_sha": os.environ["BEFORE_SHA"],
              "before_tag": os.environ["BEFORE_TAG"],
              "target_files": ["member.html", "index.html"],
              "html_syntax": "OK",
              "javascript_syntax": "OK",
              "html_id_duplicates": "OK",
              "page_api_paths_preserved": api_checks,
              "public_admin_information": "OK",
              "internal_lesson_note_reference": "NONE",
              "privacy_guard_reference": "REQUIRED_AND_PRESENT",
              "owner_memo_guard_false_positive_fixed": True,
              "last_lesson": "ADDED",
              "lesson_history": "ADDED",
              "repeat_booking": "ADDED",
              "repeat_transport": "SESSION_STORAGE",
              "automatic_line_send": False,
              "unchanged_admin_screens": unchanged,
              "member_bytes": member_size,
              "index_bytes": index_size,
              "worker_changed": True,
              "supabase_changed": False,
              "api_changed": True,
              "worker_version": os.environ["EXPECTED_WORKER_VERSION"],
              "member_contract_version": os.environ["EXPECTED_MEMBER_CONTRACT"],
              "changed_files_before_ledger": changed,
          }
          
          Path(os.environ["RESULT_FILE"]).write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY

