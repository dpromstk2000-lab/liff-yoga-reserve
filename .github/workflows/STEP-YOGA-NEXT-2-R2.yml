name: "STEP YOGA-NEXT-2-R2 | PCオーナー画面・今日やること整理 修正版"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-2-R2.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-2-owner-today
  cancel-in-progress: false

jobs:
  owner-today-optimization:
    name: "YOGA-NEXT-2-R2 owner today optimization"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      STEP_NAME: "YOGA-NEXT-2-R2"
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-2-R2.yml"
      FAILED_WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-2.yml"
      TARGET_FILE: "owner.html"
      LEDGER_FILE: "dpro-next-ledger.yml"
      RESULT_FILE: "dpro-next-yoga-next-2-result.json"
      BEFORE_TAG: "dpro-yoga-next-2-before-20260723"
      EXPECTED_OWNER_BLOB_SHA: "72003e8f641bc489fb13b4da379aaef0f7734157"

    steps:
      - name: "1. Checkout full repository history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 前STEP・対象ファイル・R1未反映確認"
        id: preflight
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in \
            index.html \
            owner.html \
            owner-ipad.html \
            member.html \
            dpro-next-ledger.yml \
            dpro-next-baseline.json \
            dpro-next-check-result.json \
            "$WORKFLOW_PATH"
          do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::YOGA-NEXT-2-R2の必須ファイルがありません。"
              exit 1
            fi
          done

          grep -q 'current_step: "YOGA-NEXT-1-COMPLETE"' "$LEDGER_FILE" || {
            echo "::error file=$LEDGER_FILE::前STEP YOGA-NEXT-1-COMPLETEを確認できません。"
            exit 1
          }

          current_owner_blob="$(git hash-object "$TARGET_FILE")"
          if [[ "$current_owner_blob" != "$EXPECTED_OWNER_BLOB_SHA" ]]; then
            echo "::error file=$TARGET_FILE::owner.htmlが基準版から変更されています。期待=$EXPECTED_OWNER_BLOB_SHA / 現在=$current_owner_blob"
            exit 1
          fi

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            before_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            before_reason="existing_before_tag"
          else
            mapfile -t head_changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
            before_sha="$(git rev-parse HEAD)"
            before_reason="current_head"
            if [[ "${#head_changed[@]}" -eq 1 && "${head_changed[0]}" == "$WORKFLOW_PATH" ]]; then
              before_sha="$(git rev-parse HEAD^)"
              before_reason="workflow_upload_parent"
            fi
          fi

          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "BEFORE_REASON=$before_reason" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-2-R2"
            echo ""
            echo "- R1失敗原因: 管理コードUIの完全一致置換が0件"
            echo "- R2修正: 余白に依存しない正規表現置換"
            echo "- 前STEP: YOGA-NEXT-1-COMPLETE"
            echo "- 対象ファイル: owner.html"
            echo "- 変更前SHA: \`$before_sha\`"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            if [[ "$tag_sha" != "$BEFORE_SHA" ]]; then
              echo "::error::既存タグと変更前SHAが一致しません。タグ=$tag_sha / 変更前=$BEFORE_SHA"
              exit 1
            fi
            tag_status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO ヨガ LINE before YOGA-NEXT-2"
            git push origin "$BEFORE_TAG"
            tag_status="created"
          fi

          echo "BEFORE_TAG_STATUS=$tag_status" >> "$GITHUB_ENV"

      - name: "4. YML構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

      - name: "5. owner.htmlへDPRO NEXT-2変更を適用"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("owner.html")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: 置換対象が1件ではありません。count={count}")
              text = text.replace(old, new, 1)

          def replace_regex(pattern: str, replacement: str, label: str, flags=0) -> None:
              global text
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: 正規表現置換対象が1件ではありません。count={count}")
              text = updated

          replace_once(
              '<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-PHONE-2</title>',
              '<title>DPRO YOGA LINE | Owner Dashboard STEP YOGA-NEXT-2</title>',
              "title"
          )
          replace_once(
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-PHONE-2</p>',
              '<p class="text-xs tracking-[.28em] text-slate-500 font-bold uppercase">STEP YOGA-NEXT-2</p>',
              "step label"
          )
          replace_once(
              '<p class="text-sm text-slate-500 mt-2">未対応タスク・本日のレッスン予定・顧客カルテ・LINEフォローを1画面で管理します。</p>',
              '<p class="text-sm text-slate-500 mt-2">最初に今日やることだけを表示し、顧客・全履歴は必要な時だけ読み込みます。</p>',
              "header help"
          )

          replace_regex(
              r'''(?P<indent>^[ \t]*)<div class="flex items-center gap-2 rounded-full bg-white/80 border border-slate-200 px-3 py-2 shadow-sm">\s*<span class="text-xs font-bold text-slate-500">管理コード</span>\s*<input\b(?=[^>]*\bid="admin-code-input")[^>]*?/?>\s*</div>''',
              '''          <div class="flex items-center gap-2 rounded-full bg-white/80 border border-slate-200 px-3 py-2 shadow-sm">
            <span class="text-xs font-bold text-slate-500">管理コード</span>
            <input id="admin-code-input" type="password" inputmode="numeric" autocomplete="off" aria-label="管理コード" class="w-20 bg-transparent outline-none text-sm font-black text-slate-700" oninput="saveAdminCode()" />
            <button id="admin-code-clear-btn" type="button" onclick="clearAdminCode()" class="rounded-full bg-slate-100 hover:bg-rose-50 text-slate-500 hover:text-rose-700 px-2.5 py-1.5 text-xs font-black transition" aria-label="保存した管理コードを削除">削除</button>
          </div>''',
              "admin code UI",
              flags=re.M | re.S
          )

          replace_regex(
              r'''(?P<indent>^[ \t]*)(?P<status><div id="system-status"[^>]*>読み込み中\.\.\.</div>)[ \t]*\n[ \t]*</header>''',
              '''      <div id="system-status" class="mt-5 rounded-2xl bg-white/70 border border-slate-100 px-4 py-3 text-sm text-slate-600">読み込み中...</div>
                <div id="today-focus-guide" class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
                  <div class="rounded-2xl bg-amber-50 border border-amber-100 px-4 py-3"><span class="font-black text-amber-800">1</span><span class="ml-2 font-bold text-slate-700">今日やることを確認</span></div>
                  <div class="rounded-2xl bg-[var(--sage-50)] border border-[var(--sage-100)] px-4 py-3"><span class="font-black text-[var(--sage-800)]">2</span><span class="ml-2 font-bold text-slate-700">対象のお客様を開く</span></div>
                  <div class="rounded-2xl bg-sky-50 border border-sky-100 px-4 py-3"><span class="font-black text-sky-800">3</span><span class="ml-2 font-bold text-slate-700">文面・詳細・対応済み</span></div>
                </div>
              </header>''',
              "today guide",
              flags=re.M
          )

          replace_once(
              'const STEP_VERSION = "YOGA-PHONE-2-PHONE-NORMALIZED-OWNER-SEARCH-20260709";',
              '''const STEP_VERSION = "YOGA-NEXT-2-OWNER-TODAY-LAZY-LOAD-20260723";
          const OWNER_PAGE_PARAMS = new URLSearchParams(window.location.search);
          const IS_DEMO_OWNER = OWNER_PAGE_PARAMS.get("demo") === "1" || window.location.hostname.endsWith("github.io");''',
              "step version"
          )

          replace_regex(
              r'''(?P<indent>^[ \t]*)customers:\s*\[\],[ \t]*\n(?P=indent)legacyEvents:\s*\[\],[ \t]*\n(?P=indent)currentFilter:\s*"today",''',
              '''  customers: [],
            legacyEvents: [],
            customersLoaded: false,
            customersLoading: false,
            customersLoadPromise: null,
            historyLoaded: false,
            currentFilter: "today",''',
              "deferred state",
              flags=re.M
          )

          replace_regex(
              r'''function adminCode\(\)\{[^\n]*\}\nfunction saveAdminCode\(\)\{[^\n]*\}''',
              '''function defaultAdminCode(){
            if(localStorage.getItem("yogaOwnerAdminCodeCleared") === "1") return "";
            return IS_DEMO_OWNER ? "1234" : "";
          }
          function adminCode(){
            return ($("admin-code-input")?.value || localStorage.getItem("yogaOwnerAdminCode") || defaultAdminCode()).trim();
          }
          function saveAdminCode(){
            const value = ($("admin-code-input")?.value || "").trim();
            if(value){
              localStorage.setItem("yogaOwnerAdminCode", value);
              localStorage.removeItem("yogaOwnerAdminCodeCleared");
            }else{
              localStorage.removeItem("yogaOwnerAdminCode");
            }
          }
          function clearAdminCode(){
            localStorage.removeItem("yogaOwnerAdminCode");
            localStorage.setItem("yogaOwnerAdminCodeCleared", "1");
            if($("admin-code-input")) $("admin-code-input").value = "";
            setStatus("管理コードを削除しました。再入力後に更新してください。", "loading");
            toast("保存した管理コードを削除しました。");
          }''',
              "admin code functions"
          )

          replace_regex(
              r'''async function loadAll\(\)\{\n.*?\n\}\n\nfunction setStatus''',
              '''async function loadAll(){
            setStatus("今日の情報を読み込み中...", "loading");
            try{
              const saved = localStorage.getItem("yogaOwnerAdminCode");
              if(saved && $("admin-code-input")) $("admin-code-input").value = saved;

              await loadSettings();
              await Promise.allSettled([loadServices(), loadSummary(), loadDay()]);

              if(state.customersLoaded){
                await loadCustomers({ includeLegacy: state.historyLoaded });
              }

              renderAll();
              setStatus(`${STEP_VERSION} / ${state.settings?.shop_name || "DPRO YOGA"} / 今日の情報を優先表示`, "ok");
            }catch(err){
              setStatus(`読み込みエラー：${err.message}`, "error");
              console.error(err);
            }
          }

          function setStatus''',
              "loadAll lazy load",
              flags=re.S
          )

          replace_regex(
              r'''async function loadCustomers\(\)\{\n.*?\n\}\n\nfunction normalizeCustomers''',
              '''async function loadLegacyCustomerHistory(){
            const data = await legacyGet("get_customers");
            state.legacyEvents = (data.events || []).map(normalizeEvent);
            const legacyCustomers = normalizeCustomers(data.customers || []);
            const map = new Map(state.customers.map(c => [customerKey(c), c]));
            legacyCustomers.forEach(c => { if(!map.has(customerKey(c))) map.set(customerKey(c), c); });
            state.customers = [...map.values()];
            state.historyLoaded = true;
          }

          async function loadCustomers({ includeLegacy = false } = {}){
            state.customersLoading = true;
            try{
              try{
                const data = await apiGet("/api/admin/customers/search", { q: "" });
                state.customers = normalizeCustomers(data.customers || []);
                state.customersLoaded = true;
              }catch(err){
                console.warn("customer search fallback", err);
                await loadLegacyCustomerHistory();
                state.customersLoaded = true;
                return;
              }

              if(includeLegacy){
                try{
                  await loadLegacyCustomerHistory();
                }catch(err){
                  console.warn("legacy customer history fallback", err);
                }
              }
            }finally{
              state.customersLoading = false;
            }
          }

          async function ensureCustomersLoaded(){
            if(state.customersLoaded || state.customersLoading) return;
            await loadCustomers({ includeLegacy: false });
            renderKpis();
          }

          async function ensureHistoryLoaded(){
            if(state.historyLoaded) return;
            await loadCustomers({ includeLegacy: true });
            renderKpis();
          }

          function normalizeCustomers''',
              "customer lazy functions",
              flags=re.S
          )

          replace_regex(
              r'''function renderTasks\(\)\{\n[ \t]*const tasks = \(state\.day\?\.today_tasks \|\| \[\]\)\.slice\(\);''',
              '''function taskDueValue(task){
            return String(task?.due_date || task?.date || task?.created_at || "9999-12-31");
          }
          function compareTaskPriority(a, b){
            const priority = value => value === "high" ? 0 : value === "medium" ? 1 : 2;
            return priority(a?.priority) - priority(b?.priority) || taskDueValue(a).localeCompare(taskDueValue(b));
          }

          function renderTasks(){
            const tasks = (state.day?.today_tasks || []).slice().sort(compareTaskPriority);''',
              "task priority sort"
          )

          replace_regex(
              r'''function renderTaskCard\(task, i\)\{\n[ \t]*const priorityClass = task\.priority === "high" \? "bg-amber-50 text-amber-800 border-amber-100" : "bg-\[var\(--sage-50\)\] text-\[var\(--sage-800\)\] border-\[var\(--sage-100\)\]";\n[ \t]*const icon = task\.type === "reservation" \? "calendar-check" : task\.type === "followup" \? "heart-handshake" : "message-square-text";''',
              '''function renderTaskCard(task, i){
            const priorityClass = task.priority === "high" ? "bg-amber-50 text-amber-800 border-amber-100" : "bg-[var(--sage-50)] text-[var(--sage-800)] border-[var(--sage-100)]";
            const icon = task.type === "reservation" ? "calendar-check" : task.type === "followup" ? "heart-handshake" : "message-square-text";
            const nextBadge = i === 0 ? `<span class="badge bg-rose-50 text-rose-700">次にやる</span>` : "";''',
              "next task badge variable"
          )

          replace_once(
              '''      <span class="badge ${priorityClass}">${task.priority === "high" ? "重要" : "通常"}</span>''',
              '''      <div class="flex flex-wrap justify-end gap-2">${nextBadge}<span class="badge ${priorityClass}">${task.priority === "high" ? "重要" : "通常"}</span></div>''',
              "next task badge HTML"
          )

          replace_once(
              '    const tasks = state.day?.today_tasks || [];',
              '    const tasks = (state.day?.today_tasks || []).slice().sort(compareTaskPriority);',
              "task list sort"
          )

          replace_regex(
              r'''function setMainFilter\(filter\)\{\n.*?\n\}\n\nfunction applyFilters\(\)\{ renderMainList\(\); \}''',
              '''async function setMainFilter(filter){
            state.currentFilter = filter;
            ["today","next","followups","customers","all"].forEach(name => {
              const btn = $(`tab-${name}`);
              if(btn) btn.className = `rounded-full px-4 py-2 text-sm font-bold ${name === filter ? "tab-active" : "tab-inactive"}`;
            });

            const wrap = $("main-list");
            try{
              if(filter === "customers" && !state.customersLoaded){
                $("main-list-title").textContent = "顧客検索";
                $("main-list-help").textContent = "顧客情報を必要な時だけ読み込んでいます。";
                wrap.innerHTML = emptyCard("顧客情報を読み込み中です...");
                await ensureCustomersLoaded();
              }else if(filter === "all" && !state.historyLoaded){
                $("main-list-title").textContent = "すべての予定・履歴";
                $("main-list-help").textContent = "過去履歴を必要な時だけ読み込んでいます。";
                wrap.innerHTML = emptyCard("予約・変更・キャンセル履歴を読み込み中です...");
                await ensureHistoryLoaded();
              }
            }catch(err){
              wrap.innerHTML = emptyCard(`読み込みに失敗しました：${err.message}`);
              setStatus(`追加データの読み込みエラー：${err.message}`, "error");
              return;
            }

            renderMainList();
          }

          function applyFilters(){ renderMainList(); }''',
              "deferred tab loading",
              flags=re.S
          )

          replace_regex(
              r'''function openManualBookingModal\(\)\{\n.*?\n\}\nfunction closeManualBookingModal''',
              '''async function openManualBookingModal(){
            state.manualSelectedCustomer = null;
            ["manual-search","manual-name","manual-phone","manual-goals","manual-date","manual-note"].forEach(id => { const el=$(id); if(el) el.value=""; });
            $("manual-experience").value = "初めて"; $("manual-pace").value = "月2回"; $("manual-status").value = "電話・店頭予約";
            const today = todayJst(); $("manual-date").min = today; $("manual-date").value = today;
            $("manual-selected").classList.add("hidden");
            $("manual-suggestions").innerHTML = `<div class="rounded-2xl bg-white border border-slate-100 px-4 py-4 text-sm text-slate-500">顧客候補を読み込み中です...</div>`;
            renderManualServices();
            loadManualTimes();
            $("manual-booking-modal").classList.remove("hidden");
            safeIcons();

            try{
              await ensureCustomersLoaded();
              renderManualSuggestions();
            }catch(err){
              $("manual-suggestions").innerHTML = `<div class="rounded-2xl bg-rose-50 border border-rose-100 px-4 py-4 text-sm text-rose-700">顧客候補を読み込めませんでした。新規のお客様として予約登録は続けられます。</div>`;
              console.warn(err);
            }
          }
          function closeManualBookingModal''',
              "manual booking lazy customers",
              flags=re.S
          )

          replace_regex(
              r'''document\.addEventListener\("DOMContentLoaded", \(\) => \{\n[ \t]*\$\("admin-code-input"\)\.value = localStorage\.getItem\("yogaOwnerAdminCode"\) \|\| "1234";\n[ \t]*loadAll\(\);\n\}\);''',
              '''document.addEventListener("DOMContentLoaded", () => {
            $("admin-code-input").value = localStorage.getItem("yogaOwnerAdminCode") || defaultAdminCode();
            loadAll();
          });''',
              "DOMContentLoaded admin code"
          )

          path.write_text(text, encoding="utf-8")
          print("owner.html NEXT-2 patch applied")
          PY

      - name: "6. HTML・JavaScript・ID重複・既存機能検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import collections
          import json
          import re
          import subprocess
          import tempfile
          import os
          import hashlib
          import datetime as dt

          class Inspector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
                  self.scripts = []
                  self._in_script = False
                  self._parts = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if attrs.get("id"):
                      self.ids.append(attrs["id"])
                  if tag.lower() == "script" and not attrs.get("src"):
                      self._in_script = True
                      self._parts = []

              def handle_data(self, data):
                  if self._in_script:
                      self._parts.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "script" and self._in_script:
                      self.scripts.append("\n".join(self._parts))
                      self._in_script = False
                      self._parts = []

          owner_path = Path("owner.html")
          text = owner_path.read_text(encoding="utf-8")
          inspector = Inspector()
          inspector.feed(text)
          inspector.close()

          duplicate_ids = sorted(k for k, v in collections.Counter(inspector.ids).items() if v > 1)
          if duplicate_ids:
              raise SystemExit(f"HTML ID重複: {duplicate_ids}")

          for i, script in enumerate(inspector.scripts, 1):
              if not script.strip():
                  continue
              with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as tmp:
                  tmp.write(script)
                  temp_name = tmp.name
              try:
                  cp = subprocess.run(["node", "--check", temp_name], text=True, capture_output=True)
                  if cp.returncode != 0:
                      raise SystemExit(f"JavaScript構文NG inline-{i}: {cp.stderr}")
              finally:
                  Path(temp_name).unlink(missing_ok=True)

          required_markers = {
              "next_version": 'YOGA-NEXT-2-OWNER-TODAY-LAZY-LOAD-20260723',
              "today_tasks": "今日やること",
              "today_day_api": "/api/admin/day",
              "summary_api": "/api/admin/summary",
              "customer_search_api": "/api/admin/customers/search",
              "manual_booking": "/api/admin/reservations/manual-create",
              "followup": "/api/admin/followups/update-status",
              "reservation_create_existing": "電話・店頭予約",
              "phone_normalize": "normalizePhone",
              "past_guard": "manual-date",
              "settings": "/api/admin/settings/update",
              "services": "/api/admin/services/save",
              "line_copy": "/api/line/log-copy",
              "admin_clear_button": 'id="admin-code-clear-btn"',
              "admin_clear_function": "function clearAdminCode()",
              "customers_loaded_state": "customersLoaded: false",
              "history_loaded_state": "historyLoaded: false",
              "customer_load_promise": "customersLoadPromise: null",
              "ensure_customers": "async function ensureCustomersLoaded()",
              "ensure_history": "async function ensureHistoryLoaded()",
              "manual_lazy": "await ensureCustomersLoaded();",
              "task_sort": "compareTaskPriority",
              "demo_admin_guard": "IS_DEMO_OWNER",
          }

          missing = [name for name, marker in required_markers.items() if marker not in text]
          if missing:
              raise SystemExit(f"必要機能マーカー不足: {missing}")

          load_all_match = re.search(r"async function loadAll\(\)\{(.*?)\n\}\n\nfunction setStatus", text, re.S)
          if not load_all_match:
              raise SystemExit("loadAll関数を確認できません。")
          load_all_body = load_all_match.group(1)

          if "Promise.allSettled([loadServices(), loadSummary(), loadDay()])" not in load_all_body:
              raise SystemExit("初期表示の主要3取得を確認できません。")
          if re.search(r"Promise\.allSettled\(\[[^\]]*loadCustomers", load_all_body, re.S):
              raise SystemExit("初期表示で顧客全件を同時取得しています。")
          if "if(state.customersLoaded)" not in load_all_body:
              raise SystemExit("利用後だけ顧客を更新するガードがありません。")

          unchanged = {}
          for file in ["index.html", "owner-ipad.html", "member.html"]:
              current = Path(file).read_bytes()
              cp = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_TAG']}:{file}"],
                  capture_output=True,
                  check=True,
              )
              unchanged[file] = hashlib.sha256(current).hexdigest() == hashlib.sha256(cp.stdout).hexdigest()
              if not unchanged[file]:
                  raise SystemExit(f"{file}が変更されています。")

          owner_bytes = owner_path.stat().st_size
          if owner_bytes > 130000:
              raise SystemExit(f"owner.htmlが大きすぎます: {owner_bytes} bytes")

          changed = subprocess.run(
              ["git", "diff", "--name-only", os.environ["BEFORE_SHA"]],
              text=True,
              capture_output=True,
              check=True,
          ).stdout.splitlines()

          forbidden_patterns = [
              re.compile(r"(^|/)worker\.js$", re.I),
              re.compile(r"\.sql$", re.I),
              re.compile(r"supabase", re.I),
              re.compile(r"wrangler", re.I),
          ]
          forbidden = [p for p in changed if any(rx.search(p) for rx in forbidden_patterns)]
          if forbidden:
              raise SystemExit(f"Worker/Supabase変更を検出: {forbidden}")

          result = {
              "ok": True,
              "overall": "OK",
              "step": "YOGA-NEXT-2-R2",
              "completed_step": "YOGA-NEXT-2",
              "checked_at_jst": dt.datetime.now(dt.timezone(dt.timedelta(hours=9))).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "branch": os.environ.get("GITHUB_REF_NAME", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "before_sha": os.environ["BEFORE_SHA"],
              "before_tag": os.environ["BEFORE_TAG"],
              "target_file": "owner.html",
              "owner_bytes": owner_bytes,
              "html_syntax": "OK",
              "javascript_syntax": "OK",
              "html_id_duplicates": "OK",
              "existing_function_preservation": "OK",
              "yoga_business_logic": "OK",
              "initial_customer_full_load": "REMOVED",
              "customer_load_timing": "ON_CUSTOMER_OR_MANUAL_BOOKING_OPEN",
              "history_load_timing": "ON_ALL_HISTORY_OPEN",
              "admin_code_clear_button": "ADDED",
              "admin_code_demo_guard": "ADDED",
              "task_priority_sort": "ADDED",
              "unchanged_other_screens": unchanged,
              "worker_changed": False,
              "supabase_changed": False,
              "api_changed": False,
              "new_api_paths": [],
              "changed_files_before_ledger": changed,
              "r1_failure_effect": "NO_OWNER_CHANGE",
          }

          Path(os.environ["RESULT_FILE"]).write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY

      - name: "7. NEXT-2完成台帳更新"
        shell: bash
        run: |
          set -Eeuo pipefail

          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %z')"
          owner_blob="$(git hash-object owner.html)"
          owner_bytes="$(wc -c < owner.html | tr -d ' ')"

          cat > "$LEDGER_FILE" <<EOF
          system_name: "DPRO ヨガ LINE"
          standard: "DPRO NEXT"
          step_name: "PCオーナー画面・今日やること整理"
          current_step: "YOGA-NEXT-2-COMPLETE"
          previous_step: "YOGA-NEXT-1-COMPLETE"
          next_step: "YOGA-NEXT-3"
          completed_at_jst: "$completed_at"
          applied_revision: "R2"
          r1_result: "FAILED_BEFORE_FILE_CHANGE"
          r1_failure_reason: "admin_code_ui_exact_match_count_0"
          before_sha: "$BEFORE_SHA"
          before_tag: "$BEFORE_TAG"
          before_tag_status: "$BEFORE_TAG_STATUS"
          target_files:
            - "owner.html"
          implementation:
            owner_today_first: true
            owner_main_operations_within_three_actions: true
            task_priority_sort: true
            first_task_next_badge: true
            initial_customer_full_load_removed: true
            customer_lazy_load: true
            legacy_history_lazy_load: true
            manual_booking_customer_lazy_load: true
            admin_code_delete_button: true
            admin_code_delete_persistent: true
            demo_admin_code_guard: true
            production_admin_code_blank_start: true
          checks:
            required_files: "OK"
            previous_step: "OK"
            yml_syntax: "OK"
            html_syntax: "OK"
            javascript_syntax: "OK"
            html_id_duplicates: "OK"
            existing_function_preservation: "OK"
            yoga_business_logic: "OK"
            other_screen_hash_preservation: "OK"
            performance_initial_load: "OK"
            overall: "OK"
          change_record:
            worker_changed: false
            supabase_changed: false
            api_changed: false
            screen_function_changed: true
            owner_html_changed: true
            index_html_changed: false
            owner_ipad_html_changed: false
            member_html_changed: false
            existing_data_changed: false
          performance:
            initial_load:
              settings: true
              services: true
              summary: true
              today_data: true
              customers: false
              legacy_history: false
            customer_load_trigger:
              - "顧客検索タブを初めて開いた時"
              - "電話・店頭予約を初めて開いた時"
            history_load_trigger:
              - "すべての予定・履歴を初めて開いた時"
          file_result:
            path: "owner.html"
            blob_sha: "$owner_blob"
            bytes: $owner_bytes
            version: "YOGA-NEXT-2-OWNER-TODAY-LAZY-LOAD-20260723"
          generated_files:
            - "dpro-next-ledger.yml"
            - "dpro-next-yoga-next-2-result.json"
          known_attention:
            - "受付から完了までの正式な進捗ステータスはYOGA-NEXT-4で実装する"
            - "設定画面の左メニュー化は、既存設定保存を守りながら後続STEPで行う"
            - "system-check.htmlとconfig.jsはYOGA-NEXT-9で追加する"
            - "Workerソースは本リポジトリ外のため、このSTEPでは変更していない"
          rollback:
            method: "backup_tag"
            tag: "$BEFORE_TAG"
            command_reference: "git checkout $BEFORE_TAG -- owner.html dpro-next-ledger.yml"
          workflow_self_delete_after_success: true
          failed_workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "8. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "YOGA-NEXT-2-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-3"' "$LEDGER_FILE"
          grep -q 'applied_revision: "R2"' "$LEDGER_FILE"
          grep -q '"overall": "OK"' "$RESULT_FILE"
          grep -q 'YOGA-NEXT-2-OWNER-TODAY-LAZY-LOAD-20260723' owner.html
          grep -q 'id="admin-code-clear-btn"' owner.html
          grep -q 'customersLoaded: false' owner.html
          grep -q 'historyLoaded: false' owner.html

          allowed_regex='^(owner\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-2-result\.json|\.github/workflows/STEP-YOGA-NEXT-2\.yml|\.github/workflows/STEP-YOGA-NEXT-2-R2\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed_regex" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "::error::想定外の変更ファイルがあります:"
            echo "$unexpected"
            exit 1
          fi

          {
            echo ""
            echo "### YOGA-NEXT-2-R2 検査結果"
            echo "- HTML構文: OK"
            echo "- JavaScript構文: OK"
            echo "- HTML ID重複: OK"
            echo "- 既存機能維持: OK"
            echo "- 初期顧客全件読込: 削除"
            echo "- 顧客読込: 必要時のみ"
            echo "- 全履歴読込: 必要時のみ"
            echo "- 管理コード削除ボタン: 追加"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "9. 成功後R1・R2 YMLを削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$FAILED_WORKFLOW_PATH" "$WORKFLOW_PATH"
          test ! -f "$FAILED_WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "10. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add owner.html "$LEDGER_FILE" "$RESULT_FILE"
          git add -A .github/workflows

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "fix(yoga-next): complete YOGA-NEXT-2 R2 owner today optimization [skip ci]"
          git push origin HEAD:main

          {
            echo ""
            echo "### 完了"
            echo "- current_step: \`YOGA-NEXT-2-COMPLETE\`"
            echo "- next_step: \`YOGA-NEXT-3\`"
            echo "- 適用版: \`R2\`"
            echo "- R1・R2 YML: 削除済み"
            echo "- 自動Commit・Push: 完了"
          } >> "$GITHUB_STEP_SUMMARY"
