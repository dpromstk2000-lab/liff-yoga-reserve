name: "STEP YOGA-NEXT-10B | 公開確認・最終COMPLETE判定"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/STEP-YOGA-NEXT-10B.yml"]
permissions:
  contents: write
concurrency:
  group: yoga-next-10b-final-complete
  cancel-in-progress: false
jobs:
  final-complete:
    name: "YOGA-NEXT-10B final COMPLETE"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-10B.yml"
      LEDGER_FILE: "dpro-next-ledger.yml"
      NEXT9_RESULT_FILE: "dpro-next-yoga-next-9-result.json"
      FINAL_RESULT_FILE: "dpro-next-yoga-complete.json"
      BEFORE_TAG: "dpro-yoga-next-10-before-20260724"
      EXPECTED_LEDGER_BLOB_SHA: "073c76c2e7e2378f9f42afdcb98022f6e86e1181"
      EXPECTED_NEXT9_RESULT_BLOB_SHA: "626facbaad8cf0a25ead791fc17447ab367825b8"
      EXPECTED_SYSTEM_CHECK_BLOB_SHA: "2df7d0fae5f40ba58762b41a16a14b9d765af685"
    steps:
      - name: "1. Checkout yoga repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "2. NEXT-9 R4・ブラウザNG0・基準状態確認"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in "$LEDGER_FILE" "$NEXT9_RESULT_FILE" system-check.html index.html member.html owner.html owner-ipad.html "$WORKFLOW_PATH"; do [[ -f "$file" ]] || exit 1; done
          [[ "$(git hash-object "$LEDGER_FILE")" == "$EXPECTED_LEDGER_BLOB_SHA" ]]
          [[ "$(git hash-object "$NEXT9_RESULT_FILE")" == "$EXPECTED_NEXT9_RESULT_BLOB_SHA" ]]
          [[ "$(git hash-object system-check.html)" == "$EXPECTED_SYSTEM_CHECK_BLOB_SHA" ]]
          grep -q 'current_step: "YOGA-NEXT-9-COMPLETE"' "$LEDGER_FILE"; grep -q 'applied_revision: "R4"' "$LEDGER_FILE"
          mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"; if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then before_sha="$(git rev-parse HEAD^)"; fi
          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "- ブラウザsystem-check: OK57 / 注意2 / NG0" >> "$GITHUB_STEP_SUMMARY"
      - name: "3. 変更前バックアップタグ作成"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then [[ "$(git rev-list -n 1 "$BEFORE_TAG")" == "$BEFORE_SHA" ]] || exit 1; else git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "before final COMPLETE"; git push origin "$BEFORE_TAG"; fi
      - name: "4. YML・埋込Python構文検査"
        shell: bash
        run: |
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true)' "$WORKFLOW_PATH"
          python3 - <<'PY'
          import base64
          compile(base64.b64decode("").decode(),"<YOGA-NEXT-10B>","exec")
          PY
      - name: "5. 製品サイト・PDF・PNG・QR結果・公開画面を確認"
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path
          Path('/tmp/yoga_next_10b.py').write_text(base64.b64decode("").decode(),encoding='utf-8')
          PY
          python3 /tmp/yoga_next_10b.py
      - name: "6. COMPLETE台帳・最終結果検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'current_step: "COMPLETE"' "$LEDGER_FILE"; grep -q 'final_version: "YOGA-NEXT-10-COMPLETE-20260724"' "$LEDGER_FILE"; grep -q 'qr_decode_result: "PASS"' "$LEDGER_FILE"; grep -q 'ng: 0' "$LEDGER_FILE"; grep -q 'sellable: true' "$LEDGER_FILE"
          grep -q '"current_step": "COMPLETE"' "$FINAL_RESULT_FILE"; grep -q '"qr_pass": true' "$FINAL_RESULT_FILE"
      - name: "7. 最終変更範囲・本体未変更検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          allowed='^(dpro-next-ledger\.yml|dpro-next-yoga-complete\.json|\.github/workflows/STEP-YOGA-NEXT-10B\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed" || true)"; [[ -z "$unexpected" ]] || exit 1
          forbidden="$(git diff --name-only "$BEFORE_SHA" | grep -Ei 'index\.html|member\.html|owner\.html|owner-ipad\.html|system-check\.html|worker\.js|\.sql$|supabase|wrangler' || true)"; [[ -z "$forbidden" ]] || exit 1
      - name: "8. 最終完成判定サマリー"
        shell: bash
        run: |
          echo "### DPRO YOGA LINE - COMPLETE" >> "$GITHUB_STEP_SUMMARY"
          echo "- 全STEP・公開・製品サイト・A4 PDF・QR: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 販売可能 / 公開デモ可能 / オーナー操作可能" >> "$GITHUB_STEP_SUMMARY"
      - name: "9. 成功後YML自身を削除"
        shell: bash
        run: |
          rm -f "$WORKFLOW_PATH"; test ! -f "$WORKFLOW_PATH"
      - name: "10. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$LEDGER_FILE" "$FINAL_RESULT_FILE"; git add -u "$WORKFLOW_PATH"
          git diff --cached --quiet && exit 1
          git commit -m "feat(yoga-next): COMPLETE YOGA-NEXT-10 [skip ci]"; git push origin HEAD:main
