            reservation_status_separation: "OK"
            public_admin_information: "OK"
            customer_screen_hash_preservation: "OK"
            overall: "OK"
          change_record:
            worker_changed: true
            supabase_changed: true
            api_changed: true
            api_path_changed: true
            screen_function_changed: true
            owner_html_changed: true
            owner_ipad_html_changed: true
            index_html_changed: false
            member_html_changed: false
            existing_reservation_data_deleted: false
          new_api_paths:
            - "GET /api/admin/workflow/check"
            - "POST /api/admin/reservations/update-workflow"
          file_result:
            owner:
              path: "owner.html"
              blob_sha: "$owner_blob"
              bytes: $owner_bytes
              version: "YOGA-NEXT-4-WORKFLOW-VISIBLE-20260723"
            owner_ipad:
              path: "owner-ipad.html"
              blob_sha: "$ipad_blob"
              bytes: $ipad_bytes
              version: "YOGA-NEXT-4-IPAD-WORKFLOW-20260723"
          generated_files:
            - "dpro-next-ledger.yml"
            - "dpro-next-yoga-next-4-result.json"
          known_attention:
            - "レッスン実施メモの構造化はYOGA-NEXT-5で行う"
            - "進捗修正はWorker APIで直前段階への戻しだけ許可し、通常画面には戻すボタンを表示しない"
            - "WorkerソースはCloudflareへDeployし、GitHubリポジトリには配置しない"
          rollback:
            github_tag: "$BEFORE_TAG"
            worker: "添付の旧Worker完全版を再Deploy"
            sql: "YOGA-NEXT-4-ROLLBACK.sql"
          workflow_self_delete_after_success: true
          failed_workflow_self_delete_after_success: true
          auto_commit_push: true
          EOF

      - name: "11. 最終変更範囲・完了状態検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          grep -q 'current_step: "YOGA-NEXT-4-COMPLETE"' "$LEDGER_FILE"
          grep -q 'next_step: "YOGA-NEXT-5"' "$LEDGER_FILE"
          grep -q 'applied_revision: "R2"' "$LEDGER_FILE"
          grep -q '"overall": "OK"' "$RESULT_FILE"
          grep -q 'YOGA-NEXT-4-WORKFLOW-VISIBLE-20260723' owner.html
          grep -q 'YOGA-NEXT-4-IPAD-WORKFLOW-20260723' owner-ipad.html
          grep -q 'id="workflow-summary"' owner.html
          grep -q 'id="workflow-summary"' owner-ipad.html
          grep -q '/api/admin/reservations/update-workflow' owner.html
          grep -q '/api/admin/reservations/update-workflow' owner-ipad.html

          allowed_regex='^(owner\.html|owner-ipad\.html|dpro-next-ledger\.yml|dpro-next-yoga-next-4-result\.json|\.github/workflows/STEP-YOGA-NEXT-4\.yml|\.github/workflows/STEP-YOGA-NEXT-4-R2\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed_regex" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "::error::想定外の変更ファイルがあります:"
            echo "$unexpected"
            exit 1
          fi

          {
            echo ""
            echo "### YOGA-NEXT-4-R2 検査結果"
            echo "- Worker live version: OK"
            echo "- Supabase workflow columns: OK"
            echo "- PC進捗表示・次へ操作: OK"
            echo "- iPad進捗表示・次へ操作: OK"
            echo "- 1段階更新・未来日・確認ガード: OK"
            echo "- 既存予約status分離: OK"
            echo "- お客様画面変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "12. 成功後R1・R2 YMLを削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$FAILED_WORKFLOW_PATH" "$WORKFLOW_PATH"
          test ! -f "$FAILED_WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "13. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add owner.html owner-ipad.html "$LEDGER_FILE" "$RESULT_FILE"
          git add -A .github/workflows

          if git diff --cached --quiet; then
            echo "::error::Commit対象がありません。"
            exit 1
          fi

          git commit -m "fix(yoga-next): complete YOGA-NEXT-4 R2 workflow visibility [skip ci]"
          git push origin HEAD:main

          {
            echo ""
            echo "### 完了"
            echo "- current_step: `YOGA-NEXT-4-COMPLETE`"
            echo "- next_step: `YOGA-NEXT-5`"
            echo "- 適用版: `R2`"
            echo "- Worker / Supabase / API変更: あり・稼働確認済み"
            echo "- R1・R2 YML: 削除済み"
            echo "- 自動Commit・Push: 完了"
          } >> "$GITHUB_STEP_SUMMARY"
