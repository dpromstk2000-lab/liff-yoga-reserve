<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DPRO YOGA LINE | System Check YOGA-NEXT-9</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root{--sage-50:#f4f7f4;--sage-100:#e6eee7;--sage-200:#d3e0d6;--sage-500:#6d887c;--sage-600:#5b7469;--sage-700:#4a6157;--sage-800:#3c5048;--ink:#31413b}
    *{box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{min-height:100vh;color:var(--ink);font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;background:radial-gradient(circle at 8% 8%,rgba(211,224,214,.85),transparent 26%),radial-gradient(circle at 92% 0%,rgba(235,222,203,.7),transparent 28%),linear-gradient(180deg,#fbfaf6 0%,#f3efe7 100%)}
    button,input{font:inherit}.glass{background:rgba(255,255,255,.8);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.64);box-shadow:0 16px 44px rgba(74,97,87,.08)}
    .soft-card{background:rgba(255,255,255,.84);border:1px solid rgba(109,136,124,.14);box-shadow:0 10px 28px rgba(74,97,87,.055)}
    .yoga-gradient{background:linear-gradient(135deg,rgba(109,136,124,.98),rgba(70,96,84,.98))}
    .section-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:900;color:var(--sage-600)}
    .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:999px;font-size:12px;font-weight:900;white-space:nowrap}
    .status-ok{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.status-attention{background:#fffbeb;color:#92400e;border-color:#fde68a}
    .status-ng{background:#fff1f2;color:#be123c;border-color:#fecdd3}.status-running{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .touch{min-height:48px;touch-action:manipulation;transition:.15s ease}.touch:active{transform:scale(.985)}
    .result-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start}
    @media(max-width:640px){.result-row{grid-template-columns:1fr}.result-row .badge{justify-self:start}}
  </style>
</head>
<body>
  <main class="max-w-[1420px] mx-auto px-4 md:px-6 py-5 md:py-7">
    <header class="glass rounded-[30px] p-5 md:p-7">
      <div class="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-5">
        <div class="flex items-start gap-4">
          <div class="w-14 h-14 rounded-2xl yoga-gradient text-white flex items-center justify-center shadow-lg shrink-0"><i data-lucide="shield-check" class="w-7 h-7"></i></div>
          <div>
            <p class="text-xs tracking-[.24em] text-slate-500 font-black uppercase">STEP YOGA-NEXT-9</p>
            <h1 class="text-2xl md:text-[30px] font-black text-slate-800 mt-1">DPRO YOGA LINE system-check</h1>
            <p class="text-sm text-slate-500 mt-2 leading-7">Worker・API・画面・性能・セキュリティ・業務ロジックを一括検査し、OK・注意・NGで表示します。</p>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-[minmax(220px,1fr)_auto] gap-2 w-full xl:w-auto">
          <div class="flex items-center gap-2 rounded-2xl bg-white border border-slate-200 px-3 py-2">
            <span class="text-xs font-black text-slate-500 shrink-0">管理コード</span>
            <input id="admin-code" type="password" inputmode="numeric" autocomplete="off" class="min-w-0 w-full bg-transparent outline-none text-base font-black text-slate-700" oninput="saveAdminCode()" />
            <button id="admin-code-clear" type="button" onclick="clearAdminCode()" class="rounded-xl bg-slate-100 px-3 py-2 text-xs font-black text-slate-600">削除</button>
          </div>
          <button id="run-button" type="button" onclick="runAllChecks()" class="touch rounded-2xl yoga-gradient px-5 py-3 text-sm font-black text-white shadow-lg flex items-center justify-center gap-2"><i data-lucide="play" class="w-4 h-4"></i>一括検査</button>
        </div>
      </div>
      <div class="mt-5 grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3">
        <label class="rounded-2xl bg-amber-50 border border-amber-100 px-4 py-3 flex items-start gap-3 text-sm text-amber-900">
          <input id="run-demo-prepare" type="checkbox" class="mt-1 w-4 h-4" />
          <span><strong>DEMO準備も実行する</strong><br><span class="text-xs leading-6">チェック時だけデモ生成データを本日基準で再作成します。通常の一括検査ではデータを変更しません。</span></span>
        </label>
        <div class="flex flex-wrap gap-2">
          <button type="button" onclick="copyResults()" class="touch rounded-2xl bg-white border border-slate-200 px-4 py-3 text-sm font-black text-slate-700 flex items-center gap-2"><i data-lucide="copy" class="w-4 h-4"></i>結果をコピー</button>
          <button type="button" onclick="location.href='owner.html?demo=1'" class="touch rounded-2xl bg-white border border-slate-200 px-4 py-3 text-sm font-black text-slate-700">PC管理画面</button>
          <button type="button" onclick="location.href='owner-ipad.html?demo=1'" class="touch rounded-2xl bg-white border border-slate-200 px-4 py-3 text-sm font-black text-slate-700">iPad画面</button>
        </div>
      </div>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5">
      <div class="soft-card rounded-[24px] p-4"><p class="section-label">Overall</p><p id="overall-label" class="text-2xl font-black text-slate-800 mt-2">未実行</p></div>
      <div class="soft-card rounded-[24px] p-4"><p class="section-label">OK</p><p id="count-ok" class="text-3xl font-black text-emerald-700 mt-2">0</p></div>
      <div class="soft-card rounded-[24px] p-4"><p class="section-label">Attention</p><p id="count-attention" class="text-3xl font-black text-amber-700 mt-2">0</p></div>
      <div class="soft-card rounded-[24px] p-4"><p class="section-label">NG</p><p id="count-ng" class="text-3xl font-black text-rose-700 mt-2">0</p></div>
    </section>

    <section class="glass rounded-[30px] p-5 md:p-6 mt-5">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div><p class="section-label">System Status</p><h2 class="text-xl md:text-2xl font-black text-slate-800 mt-1">検査状況</h2></div>
        <span id="run-status" class="badge bg-slate-100 text-slate-600">未実行</span>
      </div>
      <div id="results" class="mt-5 space-y-3"><div class="rounded-[22px] bg-white/70 border border-slate-100 p-5 text-sm text-slate-500">「一括検査」を押すと検査を開始します。</div></div>
    </section>
  </main>
  <div id="toast" class="fixed left-1/2 bottom-6 -translate-x-1/2 z-[100] hidden rounded-2xl bg-slate-900 text-white px-4 py-3 text-sm font-black shadow-2xl"></div>

<script>
const WORKER_URL="https://yoga-liff-webhook.dpromstk2000.workers.dev";
const SHOP_CODE="yoga_demo";
const EXPECTED_WORKER_VERSION="YOGA-NEXT-7-MEMBER-HISTORY-REPEAT-20260723";
const EXPECTED_MEMBER_CONTRACT="YOGA-NEXT-7-SAFE-MEMBER-CONTRACT-20260723";
const SYSTEM_CHECK_VERSION="YOGA-NEXT-9-SYSTEM-CHECK-20260724";
const STATIC_REPORT_URL="dpro-next-yoga-next-9-static.json";
const PAGE_PATHS=["index.html","member.html","owner.html","owner-ipad.html"];
const results=[];

function $(id){return document.getElementById(id)}
function escapeHtml(value){return String(value??"").replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[ch]))}
function demoDefaultCode(){return location.hostname.endsWith("github.io")&&localStorage.getItem("yogaSystemCheckCodeCleared")!=="1"?"1234":""}
function adminCode(){return String($("admin-code")?.value||localStorage.getItem("yogaSystemCheckAdminCode")||demoDefaultCode()).trim()}
function saveAdminCode(){const v=String($("admin-code")?.value||"").trim();if(v){localStorage.setItem("yogaSystemCheckAdminCode",v);localStorage.removeItem("yogaSystemCheckCodeCleared")}else localStorage.removeItem("yogaSystemCheckAdminCode")}
function clearAdminCode(){localStorage.removeItem("yogaSystemCheckAdminCode");localStorage.setItem("yogaSystemCheckCodeCleared","1");if($("admin-code"))$("admin-code").value="";toast("保存した管理コードを削除しました。")}
function toast(message){const el=$("toast");el.textContent=message;el.classList.remove("hidden");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.add("hidden"),3000)}
function statusClass(status){return status==="OK"?"status-ok":status==="注意"?"status-attention":status==="NG"?"status-ng":"status-running"}
function addResult(group,label,status,detail="",ms=null){results.push({group,label,status,detail,ms,checked_at:new Date().toISOString()});renderResults()}
function renderResults(){
  const wrap=$("results");
  if(!results.length){wrap.innerHTML='<div class="rounded-[22px] bg-white/70 border border-slate-100 p-5 text-sm text-slate-500">検査結果はまだありません。</div>';updateSummary();return}
  const groups=[...new Set(results.map(row=>row.group))];
  wrap.innerHTML=groups.map(group=>{const rows=results.filter(row=>row.group===group);return `<section class="rounded-[24px] bg-white/65 border border-slate-100 p-4 md:p-5"><h3 class="text-base font-black text-slate-800">${escapeHtml(group)}</h3><div class="mt-3 space-y-2">${rows.map(row=>`<div class="result-row rounded-2xl bg-white border border-slate-100 px-4 py-3"><div><p class="text-sm font-black text-slate-800">${escapeHtml(row.label)}</p><p class="mt-1 text-xs leading-6 text-slate-500 break-words">${escapeHtml(row.detail||"")}${Number.isFinite(row.ms)?` / ${Math.round(row.ms)}ms`:""}</p></div><span class="badge border ${statusClass(row.status)}">${escapeHtml(row.status)}</span></div>`).join("")}</div></section>`}).join("");
  updateSummary()
}
function updateSummary(){const ok=results.filter(r=>r.status==="OK").length,attention=results.filter(r=>r.status==="注意").length,ng=results.filter(r=>r.status==="NG").length;$("count-ok").textContent=ok;$("count-attention").textContent=attention;$("count-ng").textContent=ng;const overall=ng?"NG":attention?"注意":results.length?"OK":"未実行";$("overall-label").textContent=overall;$("overall-label").className=`text-2xl font-black mt-2 ${overall==="OK"?"text-emerald-700":overall==="注意"?"text-amber-700":overall==="NG"?"text-rose-700":"text-slate-800"}`}
function urlWithParams(path,params={}){const url=new URL(path.startsWith("http")?path:`${WORKER_URL}${path}`);Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null&&String(v)!=="")url.searchParams.set(k,String(v))});return url.toString()}
async function timedFetch(url,options={},timeoutMs=9000){const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),timeoutMs),started=performance.now();try{const response=await fetch(url,{cache:"no-store",...options,signal:controller.signal});const text=await response.text();let data={};try{data=text?JSON.parse(text):{}}catch{data={raw:text}}return{response,data,text,ms:performance.now()-started}}finally{clearTimeout(timer)}}
function performanceStatus(ms,ok=2500,attention=5500){return ms<=ok?"OK":ms<=attention?"注意":"NG"}
function normalizePhoneForCheck(value){let v=String(value??"").replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/[＋]/g,"+").replace(/[ー－―‐‑–—]/g,"-").replace(/[\s().-]/g,"");if(v.startsWith("+81"))v=`0${v.slice(3)}`;return v.replace(/\D/g,"")}
function isoTodayJst(){const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date());return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`}
function shiftIso(iso,days){const[y,m,d]=String(iso).split("-").map(Number),date=new Date(Date.UTC(y,m-1,d));date.setUTCDate(date.getUTCDate()+days);return date.toISOString().slice(0,10)}
function publicLeakPatterns(text,page){const f=[];if(/\/api\/admin\//i.test(text))f.push("/api/admin/");if(/\badmin_code\b/i.test(text))f.push("admin_code");if(/管理コード/.test(text))f.push("管理コード");const patterns=[/\bcustomer\s*(?:\.\s*memo\b|\[\s*["']memo["']\s*\])/,/\brow\s*(?:\.\s*memo\b|\[\s*["']memo["']\s*\])/,/(?:\.\s*lesson_content\b|\[\s*["']lesson_content["']\s*\]|["']lesson_content["']\s*:)/,/(?:\.\s*lesson_attention\b|\[\s*["']lesson_attention["']\s*\]|["']lesson_attention["']\s*:)/,/(?:\.\s*lesson_handoff\b|\[\s*["']lesson_handoff["']\s*\]|["']lesson_handoff["']\s*:)/,/(?:\.\s*owner_memo\b|\[\s*["']owner_memo["']\s*\]|["']owner_memo["']\s*:)/,/(?:\.\s*workflow_note\b|\[\s*["']workflow_note["']\s*\]|["']workflow_note["']\s*:)/];patterns.forEach((p,i)=>{if(p.test(text))f.push(`internal-field-${i+1}`)});return[...new Set(f)].map(x=>`${page}:${x}`)}
async function loadStaticReport(){try{const{response,data,ms}=await timedFetch(`${STATIC_REPORT_URL}?v=${Date.now()}`);if(!response.ok||data.ok!==true)throw new Error(data.error||`HTTP ${response.status}`);addResult("静的検査","GitHub Actions静的検査","OK",`${data.version||"NEXT-9"} / ${data.checked_at_jst||""}`,ms);(data.checks||[]).forEach(c=>addResult(c.group||"静的検査",c.label,c.status,c.detail||"",c.ms??null))}catch(e){addResult("静的検査","GitHub Actions静的検査","NG",e.message)}}
async function checkJson(group,label,path,params,validator,options={}){try{const{response,data,ms}=await timedFetch(urlWithParams(path,params),options);const valid=response.ok&&data.ok!==false&&!data.error&&(!validator||validator(data,response));const status=valid?performanceStatus(ms):"NG";addResult(group,label,status,valid?`HTTP ${response.status}`:`HTTP ${response.status} / ${data.error||data.message||"応答内容不一致"}`,ms);return{ok:valid,data,response,ms}}catch(e){addResult(group,label,"NG",e.name==="AbortError"?"タイムアウト":e.message);return{ok:false,error:e}}}
async function checkPages(){const texts={};for(const page of PAGE_PATHS){try{const path=page==="index.html"?`./?v=${Date.now()}`:`${page}?v=${Date.now()}`;const{response,text,ms}=await timedFetch(path);const valid=response.ok&&/<!DOCTYPE html>/i.test(text);addResult("画面・性能",`${page} 公開読込`,valid?performanceStatus(ms,1800,4000):"NG",`HTTP ${response.status} / ${new Blob([text]).size.toLocaleString()} bytes`,ms);texts[page]=text}catch(e){addResult("画面・性能",`${page} 公開読込`,"NG",e.name==="AbortError"?"タイムアウト":e.message)}}const leaks=[...publicLeakPatterns(texts["index.html"]||"","index.html"),...publicLeakPatterns(texts["member.html"]||"","member.html")];addResult("セキュリティ","公開画面への管理情報混入",leaks.length?"NG":"OK",leaks.length?leaks.join("、"):"index.html・member.htmlで管理API・管理コード・内部記録参照なし")}
async function checkAdminCodeRejection(){try{const invalid=`NEXT9_INVALID_${Date.now()}`,{response,data,ms}=await timedFetch(urlWithParams("/api/admin/summary",{shop_code:SHOP_CODE,admin_code:invalid}));const rejected=!response.ok||data.ok===false||Boolean(data.error);addResult("セキュリティ","不正な管理コードの拒否",rejected?"OK":"NG",`HTTP ${response.status}${data.error?` / ${data.error}`:""}`,ms)}catch(e){addResult("セキュリティ","不正な管理コードの拒否","注意",`通信エラー：${e.message}`)}}
function runLocalLogicChecks(){const cases=[["090-1111-2222","09011112222"],["０９０－１１１１－２２２２","09011112222"],["+81 90 1111 2222","09011112222"]];addResult("業務ロジック","電話番号正規化",cases.every(([i,e])=>normalizePhoneForCheck(i)===e)?"OK":"NG","ハイフン・空白・全角・+81");const today=isoTodayJst(),y=shiftIso(today,-1),n=shiftIso(today,1);addResult("業務ロジック","過去日時防止基準",y<today&&!(n<today)?"OK":"NG",`前日=${y} / 当日=${today} / 翌日=${n}`);const key=o=>`${normalizePhoneForCheck(o.phone)}|${o.date}|${String(o.time).slice(0,5)}|${o.service}`;addResult("業務ロジック","重複予約判定基準",key({phone:"090-1111-2222",date:n,time:"10:00:00",service:"trial_60"})===key({phone:"+81 90 1111 2222",date:n,time:"10:00",service:"trial_60"})?"OK":"NG","電話表記ゆれ・日付・時刻・メニュー");const workflow=["reserved","checked_in","in_session","completed","recorded","followup_done"];addResult("業務ロジック","進捗ステータス順序",new Set(workflow).size===6?"OK":"NG",workflow.join(" → "))}
async function runDemoPrepare(){if(!$("run-demo-prepare").checked){addResult("DEMO","DEMOデータ準備","注意","未実行。必要な時だけチェックを入れてください。");return}const code=adminCode();if(!code){addResult("DEMO","DEMOデータ準備","NG","管理コード未入力");return}try{const{response,data,ms}=await timedFetch(`${WORKER_URL}/api/admin/demo/prepare`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({shop_code:SHOP_CODE,admin_code:code})},15000);const ok=response.ok&&data.ok!==false&&!data.error;addResult("DEMO","DEMOデータ準備",ok?"OK":"NG",data.message||data.error||`HTTP ${response.status}`,ms)}catch(e){addResult("DEMO","DEMOデータ準備","NG",e.name==="AbortError"?"タイムアウト":e.message)}}
async function runAllChecks(){const button=$("run-button");button.disabled=true;button.classList.add("opacity-60");results.splice(0);renderResults();$("run-status").textContent="検査中";$("run-status").className="badge border status-running";try{await loadStaticReport();runLocalLogicChecks();await checkJson("接続・API","Worker","/api/health",{},d=>d.worker_version===EXPECTED_WORKER_VERSION);await checkJson("接続・API","Supabase接続・店舗設定","/api/public/status",{shop_code:SHOP_CODE},d=>Boolean(d.settings||d.shop_name||d.shop_code));await checkJson("接続・API","公開メニューAPI","/api/public/services",{shop_code:SHOP_CODE},d=>Array.isArray(d.services)&&d.services.length>0);await checkJson("接続・API","会員安全契約","/api/public/member/check",{shop_code:SHOP_CODE},d=>d.privacy_ok===true&&d.member_contract_version===EXPECTED_MEMBER_CONTRACT);const code=adminCode();if(code){await checkJson("接続・API","管理設定API","/api/admin/settings",{shop_code:SHOP_CODE,admin_code:code},d=>Boolean(d.settings||d.shop_code));await checkJson("接続・API","管理サマリーAPI","/api/admin/summary",{shop_code:SHOP_CODE,admin_code:code},d=>d.ok!==false);await checkJson("接続・API","本日業務API","/api/admin/day",{shop_code:SHOP_CODE,admin_code:code,date:isoTodayJst()},d=>Array.isArray(d.today_reservations||[]));await checkJson("接続・API","顧客検索API","/api/admin/customers/search",{shop_code:SHOP_CODE,admin_code:code,q:""},d=>Array.isArray(d.customers||[]))}else["管理設定API","管理サマリーAPI","本日業務API","顧客検索API"].forEach(label=>addResult("接続・API",label,"注意","管理コード未入力のため未実行"));await checkAdminCodeRejection();await checkPages();await runDemoPrepare()}finally{button.disabled=false;button.classList.remove("opacity-60");const ng=results.some(r=>r.status==="NG"),attention=results.some(r=>r.status==="注意"),overall=ng?"NG":attention?"注意":"OK";$("run-status").textContent=`${overall} / ${new Date().toLocaleString("ja-JP")}`;$("run-status").className=`badge border ${statusClass(overall)}`;renderResults();lucide?.createIcons?.()}}
async function copyResults(){if(!results.length)return toast("先に一括検査を実行してください。");const ng=results.filter(r=>r.status==="NG").length,attention=results.filter(r=>r.status==="注意").length,overall=ng?"NG":attention?"注意":"OK";const text=["DPRO YOGA LINE system-check",`version: ${SYSTEM_CHECK_VERSION}`,`checked_at: ${new Date().toLocaleString("ja-JP")}`,`overall: ${overall}`,"",...results.map(r=>`[${r.status}] ${r.group} / ${r.label}${r.ms!=null?` / ${Math.round(r.ms)}ms`:""}\n${r.detail||""}`)].join("\n");try{await navigator.clipboard.writeText(text)}catch{const area=document.createElement("textarea");area.value=text;document.body.appendChild(area);area.select();document.execCommand("copy");area.remove()}toast("検査結果をコピーしました。")}
document.addEventListener("DOMContentLoaded",()=>{$("admin-code").value=localStorage.getItem("yogaSystemCheckAdminCode")||demoDefaultCode();lucide?.createIcons?.();renderResults()});
</script>
</body>
</html>
