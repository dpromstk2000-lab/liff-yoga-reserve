<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーナー専用 ダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e4e4e7; border-radius: 2px; }
    </style>
</head>

<body class="bg-stone-100 text-stone-800 font-sans antialiased min-h-screen flex flex-col">

<header class="bg-emerald-800 text-white shadow-md px-4 py-3 sm:px-6 sm:py-4 flex justify-between items-center sticky top-0 z-40">
    <div class="flex items-center space-x-3">
        <div class="bg-white/10 p-2 rounded-lg text-emerald-300">
            <i data-lucide="layout-dashboard" class="w-5 h-5 sm:w-6 sm:h-6"></i>
        </div>
        <div>
            <h1 class="text-base sm:text-xl font-bold tracking-wide">Private Yoga Studio</h1>
            <p class="text-[10px] sm:text-xs text-emerald-200/80">予約イベント別 管理ダッシュボード</p>
        </div>
    </div>

    <button onclick="openSettingsModal()" class="p-2 bg-emerald-700 hover:bg-emerald-600 rounded-full transition cursor-pointer">
        <i data-lucide="settings" class="w-5 h-5 text-white"></i>
    </button>
</header>

<main class="flex-1 p-4 sm:p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">

<section class="lg:col-span-2 space-y-4">

    <div class="grid grid-cols-3 gap-2 sm:gap-4">
        <div onclick="filterByDay('all')" class="bg-white p-4 rounded-xl border border-stone-200 cursor-pointer">
            <p class="text-xs text-stone-500 font-bold">有効予約</p>
            <p class="text-xl font-black" id="kpi-total">- 件</p>
        </div>

        <div class="bg-white p-4 rounded-xl border border-stone-200">
            <div class="flex items-center justify-between">
                <button onclick="shiftDayFilter(-1)" class="p-1"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <p class="text-xs text-stone-500 font-bold" id="day-filter-title">本日予約</p>
                <button onclick="shiftDayFilter(1)" class="p-1"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
            <p class="text-xl font-black text-center mt-2" id="kpi-day-count">- 件</p>
        </div>

        <div onclick="filterPending()" class="bg-white p-4 rounded-xl border border-stone-200 cursor-pointer">
            <p class="text-xs text-stone-500 font-bold">メモ未記入</p>
            <p class="text-xl font-black" id="kpi-pending">- 件</p>
        </div>
    </div>

    <div class="bg-stone-900 text-white rounded-xl p-4">
        <p class="text-xs text-stone-400 font-bold mb-3">経営KPI</p>
        <div class="grid grid-cols-4 gap-2 text-center">
            <div><p class="text-[10px] text-stone-400">予約</p><p class="font-black" id="kpi-funnel-reserve">-</p></div>
            <div><p class="text-[10px] text-stone-400">来店</p><p class="font-black text-amber-300" id="kpi-funnel-visit">-</p></div>
            <div><p class="text-[10px] text-stone-400">入会</p><p class="font-black text-emerald-300" id="kpi-funnel-join">-</p></div>
            <div><p class="text-[10px] text-stone-400">入会率</p><p class="font-black text-emerald-300" id="kpi-funnel-rate">-%</p></div>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-stone-200 overflow-visible">
        <div class="p-4 border-b border-stone-100 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold" id="list-title">本日のスケジュール一覧</h2>
                <button onclick="fetchCustomers()" class="text-xs border px-3 py-1.5 rounded-lg">更新</button>
            </div>

            <div class="relative" id="search-box">
                <input
                    type="text"
                    id="search-input"
                    oninput="handleSearch()"
                    onfocus="renderSearchSuggestions()"
                    onkeydown="handleSearchKeydown(event)"
                    placeholder="苗字・名前・電話番号・予約日で検索..."
                    class="w-full px-3 py-2 text-sm border rounded-lg"
                    autocomplete="off"
                >
                <button onclick="clearSearch()" id="search-clear-btn" class="hidden absolute right-3 top-2 text-stone-400">×</button>
                <div id="search-suggestions" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border rounded-xl shadow-lg z-50 max-h-64 overflow-y-auto"></div>
            </div>

            <div class="flex flex-wrap gap-1.5">
                <button onclick="filterByStatus('all')" id="btn-status-all" class="status-btn active">すべて</button>
                <button onclick="filterByStatus('新規予約')" id="btn-status-new" class="status-btn">新規予約</button>
                <button onclick="filterByStatus('次回予約')" id="btn-status-repeat" class="status-btn">次回予約</button>
                <button onclick="filterByStatus('予約変更')" id="btn-status-change" class="status-btn">予約変更</button>
                <button onclick="filterByStatus('来店済')" id="btn-status-visited" class="status-btn">来店済</button>
                <button onclick="filterByStatus('入会')" id="btn-status-joined" class="status-btn">入会</button>
                <button onclick="filterByStatus('継続中')" id="btn-status-active" class="status-btn">継続中</button>
                <button onclick="filterByStatus('キャンセル')" id="btn-status-cancel" class="status-btn">キャンセル</button>
            </div>
        </div>

        <div id="reservation-list" class="divide-y divide-stone-200 max-h-[55vh] overflow-y-auto custom-scroll">
            <div class="p-8 text-center text-stone-400">データを取得中...</div>
        </div>
    </div>

</section>

<aside id="carte-panel" class="hidden lg:block fixed inset-0 z-50 lg:z-0 lg:static bg-stone-100 lg:bg-transparent p-4 lg:p-0">
    <div class="bg-white rounded-xl border border-stone-200 p-5 h-full max-h-[95vh] overflow-y-auto custom-scroll">
        <div class="flex lg:hidden justify-between mb-4">
            <button onclick="closeCarte()" class="text-sm font-bold text-emerald-700">← 一覧に戻る</button>
        </div>

        <div id="carte-empty" class="text-center text-stone-400 py-20">
            <p class="font-bold text-stone-600">予約未選択</p>
            <p class="text-xs mt-2">予約を選ぶとカルテが表示されます。</p>
        </div>

        <div id="carte-content" class="hidden space-y-4">
            <div class="border-b pb-3">
                <h3 class="text-lg font-black" id="carte-name">-</h3>
                <p class="text-xs text-stone-500" id="carte-phone">-</p>
            </div>

            <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-3">
                <p class="text-xs font-bold text-emerald-700">この予約</p>
                <p class="font-black text-emerald-900" id="carte-date">-</p>
                <p class="text-xs text-emerald-800 font-bold" id="carte-reservation-status">-</p>
            </div>

            <div>
                <p class="text-xs font-bold text-stone-400 mb-1">目的</p>
                <div id="carte-goals" class="flex flex-wrap gap-1"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-stone-50 p-3 rounded-lg">
                    <p class="text-xs text-stone-500">ヨガ経験</p>
                    <p class="text-sm font-bold" id="carte-experience">-</p>
                </div>
                <div class="bg-stone-50 p-3 rounded-lg">
                    <p class="text-xs text-stone-500">希望ペース</p>
                    <p class="text-sm font-bold" id="carte-pace">-</p>
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-stone-500">顧客ステータス</label>
                <select id="carte-status" class="w-full p-2 border rounded-lg text-sm">
                    <option value="新規予約">新規予約</option>
                    <option value="次回予約">次回予約</option>
                    <option value="予約変更">予約変更</option>
                    <option value="来店済">来店済</option>
                    <option value="入会">入会</option>
                    <option value="継続中">継続中</option>
                    <option value="キャンセル">キャンセル</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-stone-500">次回フォロー予定日</label>
                <input type="date" id="carte-next-date" class="w-full p-2 border rounded-lg text-sm">
            </div>

            <div>
                <label class="text-xs font-bold text-stone-500">カルテメモ</label>
                <textarea id="carte-memo" rows="3" class="w-full p-2 border rounded-lg text-sm" placeholder="レッスンメモを入力"></textarea>
            </div>

            <button onclick="saveOwnerMemo()" id="save-memo-btn" class="w-full bg-emerald-700 text-white py-3 rounded-xl font-bold">
                カルテ内容を保存する
            </button>

            <div>
                <p class="text-xs font-bold text-stone-400 mb-2">履歴</p>
                <div id="carte-history" class="bg-stone-50 rounded-xl p-3 max-h-52 overflow-y-auto text-xs space-y-2"></div>
            </div>
        </div>
    </div>
</aside>

</main>

<div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
        <h2 class="text-lg font-bold border-b pb-3 mb-4">店舗の設定</h2>

        <div id="settings-current-summary" class="bg-emerald-50 text-emerald-900 rounded-lg p-3 text-xs mb-4">
            現在の設定を読み込み中...
        </div>

        <label class="block text-sm font-bold mb-2">営業時間</label>
        <div class="flex items-center gap-2 mb-4">
            <select id="open-time" class="p-2 border rounded-lg flex-1"></select>
            <span>〜</span>
            <select id="close-time" class="p-2 border rounded-lg flex-1"></select>
        </div>

        <label class="block text-sm font-bold mb-2">定休日</label>
        <div class="grid grid-cols-4 gap-2 text-sm mb-4" id="holiday-checkboxes">
            <label><input type="checkbox" value="1"> 月</label>
            <label><input type="checkbox" value="2"> 火</label>
            <label><input type="checkbox" value="3"> 水</label>
            <label><input type="checkbox" value="4"> 木</label>
            <label><input type="checkbox" value="5"> 金</label>
            <label><input type="checkbox" value="6"> 土</label>
            <label><input type="checkbox" value="0"> 日</label>
        </div>

        <div class="flex justify-end gap-3">
            <button onclick="closeSettingsModal()" class="px-4 py-2 rounded-lg text-stone-500">キャンセル</button>
            <button onclick="saveSettings()" id="save-settings-btn" class="px-4 py-2 bg-emerald-700 text-white rounded-lg font-bold">保存する</button>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = 'https://yoga-liff-webhook.dpromstk2000.workers.dev';

    let rawCustomers = [];
    let rawEvents = [];
    let allReservations = [];
    let filteredReservations = [];
    let customerSummaries = [];

    let selectedReservationKey = null;
    let selectedSearchReservationKey = null;
    let currentDayFilter = 'today';
    let currentStatusFilter = 'all';

    let shopSettings = {
        open_time: "10:00",
        close_time: "19:00",
        holidays: []
    };

    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    const inactiveStatuses = ["変更前", "変更済", "キャンセル"];

    document.addEventListener("DOMContentLoaded", () => {
        addStyle();
        lucide.createIcons();
        generateTimeOptions();
        fetchCustomers();

        document.addEventListener("click", event => {
            const searchBox = document.getElementById("search-box");
            if (searchBox && !searchBox.contains(event.target)) hideSearchSuggestions();
        });
    });

    function addStyle() {
        const style = document.createElement("style");
        style.innerHTML = `
            .status-btn {
                font-size: 11px;
                padding: 4px 10px;
                border-radius: 9999px;
                border: 1px solid #e7e5e4;
                background: white;
                color: #57534e;
                font-weight: 700;
            }
            .status-btn.active {
                background: #047857;
                color: white;
                border-color: #047857;
            }
        `;
        document.head.appendChild(style);
    }

    function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[char]));
    }

    function normalizeSearchText(value) {
        return String(value || "")
            .normalize("NFKC")
            .toLowerCase()
            .replace(/[ぁ-ん]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
            .replace(/[\s　\-ー−―()（）]/g, "");
    }

    function normalizeTime(value, fallback = "") {
        if (typeof value !== "string") return fallback;
        const compact = value.substring(0, 5);
        if (!/^([01]\d|2[0-3]):([0-5]\d)$/.test(compact)) return fallback;
        return compact;
    }

    function timeToMinutes(time) {
        const normalized = normalizeTime(time, null);
        if (!normalized) return null;
        const [h, m] = normalized.split(":").map(Number);
        return h * 60 + m;
    }

    function normalizeHolidays(value) {
        if (!Array.isArray(value)) return [];
        return [...new Set(value.map(Number).filter(day => Number.isInteger(day) && day >= 0 && day <= 6))].sort((a, b) => a - b);
    }

    function normalizeShopSettings(data = {}) {
        const openTime = normalizeTime(data.open_time, "10:00");
        const closeTime = normalizeTime(data.close_time, "19:00");
        const valid = timeToMinutes(openTime) < timeToMinutes(closeTime);

        return {
            open_time: valid ? openTime : "10:00",
            close_time: valid ? closeTime : "19:00",
            holidays: normalizeHolidays(data.holidays)
        };
    }

    function formatHolidayNames(holidays) {
        const normalized = normalizeHolidays(holidays);
        return normalized.length ? normalized.map(day => `${weekdays[day]}曜`).join("・") : "なし";
    }

    function formatDateLabel(dateStr) {
        if (!dateStr) return "日時未定";
        const d = new Date(`${dateStr}T00:00:00`);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getMonth() + 1}月${d.getDate()}日(${weekdays[d.getDay()]})`;
    }

    function formatDateTimeLabel(dateStr, timeStr) {
        if (!dateStr) return "日時データなし";
        return `${formatDateLabel(dateStr)} ${normalizeTime(timeStr, timeStr || "").substring(0, 5)}`;
    }

    function getLocalDateString(offset) {
        const d = new Date();
        d.setDate(d.getDate() + offset);

        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');

        return `${year}-${month}-${day}`;
    }

    function getReservationKey(event, index = 0) {
        return String(
            event.id ||
            `${event.line_user_id || ""}__${event.reservation_date || ""}__${normalizeTime(event.reservation_time || "", "")}__${event.created_at || index}`
        );
    }

    function findReservationByKey(key) {
        return allReservations.find(r => String(r.reservation_key) === String(key));
    }

    function getCustomerByLineId(lineId) {
        return rawCustomers.find(c => String(c.line_id) === String(lineId)) || {};
    }

    function getEventsByLineId(lineId) {
        return rawEvents.filter(e => String(e.line_user_id) === String(lineId));
    }

    function getLatestMemoEvent(lineId) {
        return getEventsByLineId(lineId)
            .filter(e => e.memo && String(e.memo).trim())
            .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))[0] || null;
    }

    function getLatestStatusEvent(lineId) {
        return getEventsByLineId(lineId)
            .filter(e => e.status)
            .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))[0] || null;
    }

    function getLatestNextDateEvent(lineId) {
        return getEventsByLineId(lineId)
            .filter(e => e.next_guidance_date)
            .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))[0] || null;
    }

    function getSupersededReservationKeys() {
        const sorted = [...allReservations].sort((a, b) => new Date(a.event_created_at || 0) - new Date(b.event_created_at || 0));
        const supersededKeys = new Set();
        const latestActiveByLineId = new Map();

        sorted.forEach(reservation => {
            const lineId = reservation.line_id;
            const status = reservation.reservation_status;

            if (!lineId) return;

            if (inactiveStatuses.includes(status)) {
                supersededKeys.add(reservation.reservation_key);
                return;
            }

            if (status === "予約変更") {
                const hasExplicitPrevious = sorted.some(prev =>
                    prev.line_id === lineId &&
                    prev !== reservation &&
                    inactiveStatuses.includes(prev.reservation_status) &&
                    new Date(prev.event_created_at || 0) <= new Date(reservation.event_created_at || 0)
                );

                if (!hasExplicitPrevious) {
                    const previous = latestActiveByLineId.get(lineId);
                    if (previous && previous.reservation_key !== reservation.reservation_key) {
                        supersededKeys.add(previous.reservation_key);
                    }
                }
            }

            latestActiveByLineId.set(lineId, reservation);
        });

        return supersededKeys;
    }

    function getActiveReservations() {
        const supersededKeys = getSupersededReservationKeys();

        return allReservations.filter(reservation => {
            if (inactiveStatuses.includes(reservation.reservation_status)) return false;
            if (supersededKeys.has(reservation.reservation_key)) return false;
            return true;
        });
    }

    async function fetchCustomers() {
        const list = document.getElementById("reservation-list");
        list.innerHTML = `<div class="p-8 text-center text-stone-400">データを取得中...</div>`;

        try {
            const response = await fetch(`${WORKER_URL}?action=get_customers`, { cache: "no-store" });
            if (!response.ok) throw new Error(await response.text());

            const result = await response.json();
            rawCustomers = result.customers || [];
            rawEvents = result.events || [];

            buildReservationRows();
            buildCustomerSummaries();
            calculateKPIs();
            updateDayFilterUI();
            applyCurrentFilters();
        } catch (error) {
            console.error(error);
            list.innerHTML = `<div class="p-8 text-center text-red-500 text-sm">データ取得に失敗しました。</div>`;
        }
    }

    function buildReservationRows() {
        const reservationEvents = rawEvents
            .filter(e => e.reservation_date)
            .sort((a, b) => {
                const aKey = `${a.reservation_date || ""} ${normalizeTime(a.reservation_time || "", "")}`;
                const bKey = `${b.reservation_date || ""} ${normalizeTime(b.reservation_time || "", "")}`;
                if (aKey !== bKey) return aKey.localeCompare(bKey);
                return new Date(a.created_at || 0) - new Date(b.created_at || 0);
            });

        allReservations = reservationEvents.map((event, index) => {
            const customer = getCustomerByLineId(event.line_user_id);
            const latestMemo = getLatestMemoEvent(event.line_user_id);
            const latestStatus = getLatestStatusEvent(event.line_user_id);
            const latestNextDate = getLatestNextDateEvent(event.line_user_id);
            const reservationTime = normalizeTime(event.reservation_time || "", "");

            return {
                ...customer,
                reservation_key: getReservationKey(event, index),
                event_created_at: event.created_at || "",
                event_raw: event,
                line_id: event.line_user_id,

                name: customer.name || event.customer_name || "匿名ユーザー",
                phone: customer.phone || "",

                yoga_experience: customer.yoga_experience || "",
                primary_goal: customer.primary_goal || "",
                target_pace: customer.target_pace || "",

                reservation_date: event.reservation_date || "",
                reservation_time: reservationTime,
                visit_date: event.reservation_date ? `${event.reservation_date} ${reservationTime}` : null,

                reservation_status: event.status || "新規予約",
                customer_latest_status: latestStatus?.status || event.status || "新規予約",

                owner_memo: latestMemo?.memo || "",
                next_guidance_date: latestNextDate?.next_guidance_date || null
            };
        });
    }

    function buildCustomerSummaries() {
        customerSummaries = rawCustomers.map(customer => {
            const lineId = customer.line_id;
            const latestMemo = getLatestMemoEvent(lineId);
            const latestStatus = getLatestStatusEvent(lineId);
            const latestNextDate = getLatestNextDateEvent(lineId);

            return {
                ...customer,
                line_id: lineId,
                latest_status: latestStatus?.status || "新規予約",
                owner_memo: latestMemo?.memo || "",
                next_guidance_date: latestNextDate?.next_guidance_date || null
            };
        });
    }

    function getStatusBadge(status) {
        const map = {
            "新規予約": "bg-amber-100 text-amber-800",
            "次回予約": "bg-indigo-100 text-indigo-800",
            "予約変更": "bg-cyan-100 text-cyan-800",
            "来店済": "bg-blue-100 text-blue-800",
            "入会": "bg-emerald-100 text-emerald-800",
            "継続中": "bg-purple-100 text-purple-800",
            "キャンセル": "bg-rose-100 text-rose-800",
            "変更前": "bg-stone-200 text-stone-500"
        };

        return `<span class="text-[10px] ${map[status] || 'bg-stone-100 text-stone-600'} px-2 py-0.5 rounded-full font-bold whitespace-nowrap">${escapeHtml(status || '新規予約')}</span>`;
    }

    function renderList(reservations) {
        const container = document.getElementById("reservation-list");

        if (reservations.length === 0) {
            container.innerHTML = `<div class="p-8 text-center text-stone-400 text-sm">該当する予約はありません。</div>`;
            return;
        }

        reservations.sort((a, b) => {
            const aKey = `${a.reservation_date || "9999-99-99"} ${a.reservation_time || "99:99"}`;
            const bKey = `${b.reservation_date || "9999-99-99"} ${b.reservation_time || "99:99"}`;
            if (aKey !== bKey) return aKey.localeCompare(bKey);
            return new Date(a.event_created_at || 0) - new Date(b.event_created_at || 0);
        });

        let currentDate = null;
        let html = "";

        reservations.forEach(r => {
            const isSelected = selectedReservationKey === r.reservation_key;

            if (r.reservation_date !== currentDate) {
                currentDate = r.reservation_date;

                html += `
                    <div class="bg-stone-200/70 px-4 py-1.5 text-xs font-bold text-stone-600 sticky top-0 z-10 flex justify-between">
                        <span>📅 ${escapeHtml(formatDateLabel(currentDate))}</span>
                        <span>${reservations.filter(x => x.reservation_date === currentDate).length} 件</span>
                    </div>
                `;
            }

            html += `
                <div data-reservation-key="${escapeHtml(r.reservation_key)}" onclick="selectReservation(this.dataset.reservationKey)" class="p-4 flex items-center justify-between cursor-pointer hover:bg-stone-50 border-l-4 ${isSelected ? 'border-emerald-700 bg-emerald-50' : 'border-transparent'}">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="text-xs font-bold bg-stone-100 px-2 py-1 rounded">${escapeHtml(r.reservation_time || '-')}</div>
                        <div class="min-w-0">
                            <p class="font-black truncate">${escapeHtml(r.name || '匿名ユーザー')}</p>
                            <p class="text-xs text-stone-400 truncate">${escapeHtml(r.phone || '')}</p>
                        </div>
                    </div>
                    ${getStatusBadge(r.reservation_status)}
                </div>
            `;
        });

        container.innerHTML = html;
    }

    function calculateKPIs() {
        const activeReservations = getActiveReservations();

        document.getElementById("kpi-total").innerText = `${activeReservations.length} 件`;

        const todayStr = getLocalDateString(0);
        const tomorrowStr = getLocalDateString(1);

        const todayCount = activeReservations.filter(r => r.reservation_date === todayStr).length;
        const tomorrowCount = activeReservations.filter(r => r.reservation_date === tomorrowStr).length;

        if (currentDayFilter === "today") {
            document.getElementById("kpi-day-count").innerText = `${todayCount} 件`;
        } else if (currentDayFilter === "tomorrow") {
            document.getElementById("kpi-day-count").innerText = `${tomorrowCount} 件`;
        } else {
            document.getElementById("kpi-day-count").innerText = `全 ${activeReservations.length} 件`;
        }

        document.getElementById("kpi-pending").innerText =
            `${activeReservations.filter(r => !r.owner_memo || !r.owner_memo.trim()).length} 件`;

        const visitTotal = customerSummaries.filter(c => ["来店済", "入会", "継続中"].includes(c.latest_status)).length;
        const joinTotal = customerSummaries.filter(c => ["入会", "継続中"].includes(c.latest_status)).length;
        const joinRate = visitTotal > 0 ? Math.round((joinTotal / visitTotal) * 100) : 0;

        document.getElementById("kpi-funnel-reserve").innerText = `${activeReservations.length} 件`;
        document.getElementById("kpi-funnel-visit").innerText = `${visitTotal} 名`;
        document.getElementById("kpi-funnel-join").innerText = `${joinTotal} 名`;
        document.getElementById("kpi-funnel-rate").innerText = `${joinRate}%`;
    }

    function shiftDayFilter(direction) {
        selectedSearchReservationKey = null;
        clearSearchFieldOnly();

        const filters = ["today", "tomorrow", "all"];
        let index = filters.indexOf(currentDayFilter);
        index = (index + direction + filters.length) % filters.length;

        currentDayFilter = filters[index];
        updateDayFilterUI();
        applyCurrentFilters();
    }

    function updateDayFilterUI() {
        const title = document.getElementById("day-filter-title");

        if (currentDayFilter === "today") title.innerText = "本日予約";
        else if (currentDayFilter === "tomorrow") title.innerText = "明日予約";
        else title.innerText = "全日程表示";

        calculateKPIs();
    }

    function updateStatusButtonUI(status) {
        document.querySelectorAll(".status-btn").forEach(btn => btn.classList.remove("active"));

        const map = {
            "all": "btn-status-all",
            "新規予約": "btn-status-new",
            "次回予約": "btn-status-repeat",
            "予約変更": "btn-status-change",
            "来店済": "btn-status-visited",
            "入会": "btn-status-joined",
            "継続中": "btn-status-active",
            "キャンセル": "btn-status-cancel"
        };

        const target = document.getElementById(map[status]);
        if (target) target.classList.add("active");
    }

    function getReservationSearchText(reservation) {
        const goals = Array.isArray(reservation.primary_goal)
            ? reservation.primary_goal.join(" ")
            : reservation.primary_goal || "";

        return normalizeSearchText([
            reservation.name,
            reservation.phone,
            reservation.line_id,
            reservation.reservation_date,
            reservation.reservation_time,
            reservation.reservation_status,
            reservation.customer_latest_status,
            goals
        ].join(" "));
    }

    function getSearchMatches(limit = 8) {
        const keyword = normalizeSearchText(document.getElementById("search-input").value.trim());
        if (!keyword) return [];

        return getActiveReservations()
            .map(reservation => {
                const nameText = normalizeSearchText(reservation.name);
                const phoneText = normalizeSearchText(reservation.phone);
                const dateText = normalizeSearchText(reservation.reservation_date);
                const allText = getReservationSearchText(reservation);

                let score = 999;
                if (nameText.startsWith(keyword)) score = 1;
                else if (nameText.includes(keyword)) score = 2;
                else if (phoneText.includes(keyword)) score = 3;
                else if (dateText.includes(keyword)) score = 4;
                else if (allText.includes(keyword)) score = 5;

                return { reservation, score };
            })
            .filter(item => item.score < 999)
            .sort((a, b) => a.score - b.score)
            .slice(0, limit)
            .map(item => item.reservation);
    }

    function renderSearchSuggestions() {
        const input = document.getElementById("search-input");
        const box = document.getElementById("search-suggestions");

        if (!input.value.trim()) {
            box.classList.add("hidden");
            box.innerHTML = "";
            return;
        }

        const matches = getSearchMatches();

        if (matches.length === 0) {
            box.innerHTML = `<div class="px-4 py-3 text-xs text-stone-400">該当する予約が見つかりません。</div>`;
            box.classList.remove("hidden");
            return;
        }

        box.innerHTML = matches.map(r => `
            <button type="button" data-reservation-key="${escapeHtml(r.reservation_key)}" onclick="chooseSearchCandidate(this.dataset.reservationKey)" class="w-full text-left px-4 py-3 hover:bg-emerald-50 border-b">
                <p class="text-sm font-bold">${escapeHtml(r.name || "匿名ユーザー")}</p>
                <p class="text-xs text-stone-500">${escapeHtml(formatDateTimeLabel(r.reservation_date, r.reservation_time))}</p>
            </button>
        `).join("");

        box.classList.remove("hidden");
    }

    function hideSearchSuggestions() {
        document.getElementById("search-suggestions").classList.add("hidden");
    }

    function chooseSearchCandidate(key) {
        const reservation = findReservationByKey(key);
        if (!reservation) return;

        selectedSearchReservationKey = reservation.reservation_key;

        document.getElementById("search-input").value = `${reservation.name || ""} ${reservation.reservation_date || ""}`.trim();
        document.getElementById("search-clear-btn").classList.remove("hidden");

        currentDayFilter = "all";
        currentStatusFilter = "all";

        updateStatusButtonUI("all");
        applyCurrentFilters();
        selectReservation(key);
        hideSearchSuggestions();
    }

    function handleSearchKeydown(event) {
        if (event.key !== "Enter") return;

        const matches = getSearchMatches(1);
        if (matches.length > 0) {
            event.preventDefault();
            chooseSearchCandidate(matches[0].reservation_key);
        }
    }

    function filterByStatus(status) {
        selectedSearchReservationKey = null;
        currentStatusFilter = status;
        updateStatusButtonUI(status);
        applyCurrentFilters();
    }

    function applyCurrentFilters() {
        const searchInput = document.getElementById("search-input").value.trim();
        const todayStr = getLocalDateString(0);
        const tomorrowStr = getLocalDateString(1);
        const activeReservations = getActiveReservations();

        if (selectedSearchReservationKey) {
            document.getElementById("list-title").innerText = "選択中の予約";
            filteredReservations = activeReservations.filter(r => r.reservation_key === selectedSearchReservationKey);
            renderList(filteredReservations);
            return;
        }

        if (searchInput !== "") {
            const keyword = normalizeSearchText(searchInput);
            document.getElementById("list-title").innerText = `検索結果「${searchInput}」`;

            filteredReservations = activeReservations.filter(r => getReservationSearchText(r).includes(keyword));

            if (currentStatusFilter !== "all") {
                filteredReservations = filteredReservations.filter(r =>
                    r.reservation_status === currentStatusFilter ||
                    r.customer_latest_status === currentStatusFilter
                );
            }

            renderList(filteredReservations);
            renderSearchSuggestions();
            return;
        }

        if (currentDayFilter === "today") {
            document.getElementById("list-title").innerText = "本日のスケジュール一覧";
            filteredReservations = activeReservations.filter(r => r.reservation_date === todayStr);
        } else if (currentDayFilter === "tomorrow") {
            document.getElementById("list-title").innerText = "明日のスケジュール一覧";
            filteredReservations = activeReservations.filter(r => r.reservation_date === tomorrowStr);
        } else {
            document.getElementById("list-title").innerText = "スケジュール一覧（有効予約のみ）";
            filteredReservations = [...activeReservations];
        }

        if (currentStatusFilter !== "all") {
            filteredReservations = filteredReservations.filter(r =>
                r.reservation_status === currentStatusFilter ||
                r.customer_latest_status === currentStatusFilter
            );
        }

        renderList(filteredReservations);
    }

    function filterByDay(type) {
        selectedSearchReservationKey = null;
        currentDayFilter = type;
        clearSearchFieldOnly();
        updateDayFilterUI();
        applyCurrentFilters();
    }

    function filterPending() {
        selectedSearchReservationKey = null;
        clearSearchFieldOnly();

        document.getElementById("list-title").innerText = "メモ未記入の予約一覧";
        filteredReservations = getActiveReservations().filter(r => !r.owner_memo || !r.owner_memo.trim());
        renderList(filteredReservations);
    }

    function handleSearch() {
        selectedSearchReservationKey = null;

        const query = document.getElementById("search-input").value.trim();
        const clearBtn = document.getElementById("search-clear-btn");

        if (query.length > 0) {
            clearBtn.classList.remove("hidden");
            currentDayFilter = "all";
            currentStatusFilter = "all";
            updateStatusButtonUI("all");
        } else {
            clearBtn.classList.add("hidden");
            hideSearchSuggestions();
        }

        applyCurrentFilters();
    }

    function clearSearchFieldOnly() {
        const input = document.getElementById("search-input");
        const clearBtn = document.getElementById("search-clear-btn");

        input.value = "";
        clearBtn.classList.add("hidden");
        hideSearchSuggestions();
    }

    function clearSearch() {
        selectedSearchReservationKey = null;
        clearSearchFieldOnly();
        applyCurrentFilters();
    }

    function selectReservation(key) {
        const reservation = findReservationByKey(key);

        if (!reservation) {
            alert("予約データが見つかりません。更新してください。");
            return;
        }

        selectedReservationKey = reservation.reservation_key;

        document.getElementById("carte-panel").classList.remove("hidden");
        document.getElementById("carte-empty").classList.add("hidden");
        document.getElementById("carte-content").classList.remove("hidden");

        document.getElementById("carte-name").innerText = `${reservation.name || "未入力"} 様`;
        document.getElementById("carte-phone").innerText = reservation.phone || "未入力";
        document.getElementById("carte-date").innerText = formatDateTimeLabel(reservation.reservation_date, reservation.reservation_time);
        document.getElementById("carte-reservation-status").innerText = `予約種別：${reservation.reservation_status || "-"}`;

        document.getElementById("carte-experience").innerText = reservation.yoga_experience || "未回答";
        document.getElementById("carte-pace").innerText = reservation.target_pace || "未回答";
        document.getElementById("carte-memo").value = "";
        document.getElementById("carte-status").value = reservation.customer_latest_status || reservation.reservation_status || "新規予約";
        document.getElementById("carte-next-date").value = reservation.next_guidance_date || "";

        const goals = Array.isArray(reservation.primary_goal)
            ? reservation.primary_goal
            : [reservation.primary_goal || "未回答"];

        document.getElementById("carte-goals").innerHTML = goals.map(g =>
            `<span class="bg-white border text-xs px-2 py-1 rounded-full">${escapeHtml(g)}</span>`
        ).join("");

        renderHistoryTimeline(reservation.line_id);
        renderList(filteredReservations);
    }

    function renderHistoryTimeline(lineId) {
        const history = document.getElementById("carte-history");
        const events = getEventsByLineId(lineId).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

        if (events.length === 0) {
            history.innerHTML = `<p class="text-stone-400">履歴はありません。</p>`;
            return;
        }

        history.innerHTML = events.map(e => {
            const d = new Date(e.created_at || Date.now());
            const created = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;

            if (e.memo) {
                return `
                    <div class="border-b pb-2">
                        <p class="text-stone-400">${created}</p>
                        <p class="font-bold">📝 ${escapeHtml(e.status || "")}</p>
                        <p class="whitespace-pre-wrap">${escapeHtml(e.memo)}</p>
                    </div>
                `;
            }

            if (e.reservation_date) {
                return `
                    <div class="border-b pb-2">
                        <p class="text-stone-400">${created}</p>
                        <p class="font-bold">📅 ${escapeHtml(e.status || "")}</p>
                        <p>${escapeHtml(formatDateTimeLabel(e.reservation_date, e.reservation_time))}</p>
                    </div>
                `;
            }

            return `
                <div class="border-b pb-2">
                    <p class="text-stone-400">${created}</p>
                    <p>${escapeHtml(e.status || "")}</p>
                </div>
            `;
        }).join("");
    }

    function closeCarte() {
        document.getElementById("carte-panel").classList.add("hidden");
        selectedReservationKey = null;
        renderList(filteredReservations);
    }

    async function saveOwnerMemo() {
        if (!selectedReservationKey) return;

        const reservation = findReservationByKey(selectedReservationKey);
        if (!reservation) return;

        const btn = document.getElementById("save-memo-btn");
        btn.disabled = true;
        btn.innerText = "保存中...";

        try {
            const response = await fetch(`${WORKER_URL}?action=update_memo`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    lineUserId: reservation.line_id,
                    customerName: reservation.name || "",
                    memoContent: document.getElementById("carte-memo").value,
                    status: document.getElementById("carte-status").value,
                    nextGuidanceDate: document.getElementById("carte-next-date").value || null
                })
            });

            if (!response.ok) throw new Error(await response.text());

            alert("カルテを保存しました。");
            await fetchCustomers();

            const updated = findReservationByKey(selectedReservationKey);
            if (updated) selectReservation(updated.reservation_key);
        } catch (error) {
            alert("保存エラー: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "カルテ内容を保存する";
        }
    }

    function generateTimeOptions() {
        const selects = [document.getElementById("open-time"), document.getElementById("close-time")];
        let options = "";

        for (let h = 0; h < 24; h++) {
            const hour = String(h).padStart(2, "0");
            options += `<option value="${hour}:00">${hour}:00</option>`;
            options += `<option value="${hour}:30">${hour}:30</option>`;
        }

        selects.forEach(select => {
            if (select) select.innerHTML = options;
        });
    }

    async function openSettingsModal() {
        document.getElementById("settings-modal").classList.remove("hidden");
        generateTimeOptions();
        await loadShopSettings(true);
    }

    function closeSettingsModal() {
        document.getElementById("settings-modal").classList.add("hidden");
    }

    function renderSettingsSummary() {
        document.getElementById("settings-current-summary").innerHTML =
            `<b>現在の設定：</b> 営業時間 ${escapeHtml(shopSettings.open_time)}〜${escapeHtml(shopSettings.close_time)} / 定休日 ${escapeHtml(formatHolidayNames(shopSettings.holidays))}`;
    }

    async function loadShopSettings(applyToModal = true) {
        try {
            const res = await fetch(`${WORKER_URL}?action=get_settings`, { cache: "no-store" });
            if (!res.ok) throw new Error(await res.text());

            const data = await res.json();
            shopSettings = normalizeShopSettings(data);

            if (applyToModal) {
                document.getElementById("open-time").value = shopSettings.open_time;
                document.getElementById("close-time").value = shopSettings.close_time;

                document.querySelectorAll('#holiday-checkboxes input[type="checkbox"]').forEach(cb => {
                    cb.checked = shopSettings.holidays.includes(Number(cb.value));
                });
            }
        } catch (error) {
            console.error(error);
        }

        renderSettingsSummary();
    }

    async function saveSettings() {
        const openTime = document.getElementById("open-time").value;
        const closeTime = document.getElementById("close-time").value;

        if (timeToMinutes(openTime) >= timeToMinutes(closeTime)) {
            alert("営業時間の開始は終了より前にしてください。");
            return;
        }

        const holidays = Array.from(document.querySelectorAll('#holiday-checkboxes input[type="checkbox"]:checked'))
            .map(cb => Number(cb.value));

        const btn = document.getElementById("save-settings-btn");
        btn.disabled = true;
        btn.innerText = "保存中...";

        try {
            const res = await fetch(`${WORKER_URL}?action=save_settings`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    open_time: openTime,
                    close_time: closeTime,
                    holidays
                })
            });

            const result = await res.json().catch(() => ({}));

            if (!res.ok) {
                throw new Error(result.error || "保存に失敗しました。");
            }

            shopSettings = normalizeShopSettings(result.settings || {
                open_time: openTime,
                close_time: closeTime,
                holidays
            });

            alert(`店舗設定を保存しました。\n営業時間：${shopSettings.open_time}〜${shopSettings.close_time}\n定休日：${formatHolidayNames(shopSettings.holidays)}`);
            closeSettingsModal();
        } catch (error) {
            alert("保存失敗: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "保存する";
        }
    }

    function openLineChat() {
        window.open("https://manager.line.biz/", "_blank");
    }
</script>
