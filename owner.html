<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーナー専用 ダッシュボード＆動的カルテ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e4e4e7; border-radius: 2px; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-emerald-800 text-white shadow-md px-4 py-3 sm:px-6 sm:py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <div class="bg-white/10 p-2 rounded-lg text-emerald-300">
                <i data-lucide="layout-dashboard" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </div>
            <div>
                <h1 class="text-base sm:text-xl font-bold tracking-wide">Private Yoga Studio</h1>
                <p class="text-[10px] sm:text-xs text-emerald-200/80">オーナー専用管理ダッシュボード</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-1.5 bg-emerald-700/50 px-3 py-1.5 rounded-full border border-emerald-600 hidden sm:flex">
                <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                <span class="text-xs font-medium whitespace-nowrap">同期中</span>
            </div>
            <button onclick="openSettingsModal()" class="p-2 bg-emerald-700 hover:bg-emerald-600 rounded-full transition" title="店舗設定">
                <i data-lucide="settings" class="w-5 h-5 text-white"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 p-4 sm:p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 relative">
        
        <div id="left-panel" class="lg:col-span-2 space-y-4 sm:space-y-6 block">
            <div class="bg-white rounded-xl shadow-xs border border-stone-200/60 overflow-hidden">
                <div class="px-4 py-3 sm:px-6 sm:py-4 border-b border-stone-100 flex justify-between items-center bg-stone-50/50">
                    <h2 class="font-bold text-sm sm:text-base text-stone-800 flex items-center gap-2">
                        <i data-lucide="list-todo" class="w-4 h-4 text-emerald-700"></i>
                        顧客リスト
                    </h2>
                    <button onclick="fetchCustomers()" class="text-xs bg-white border border-stone-300 hover:bg-stone-50 text-stone-600 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1 transition">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> 更新
                    </button>
                </div>
                <div class="divide-y divide-stone-100 max-h-[70vh] overflow-y-auto custom-scroll" id="customer-list">
                    <div class="p-8 text-center text-stone-400 flex flex-col items-center gap-2">
                        <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-emerald-600"></i>
                        <span class="text-sm">データを取得中...</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="carte-panel" class="hidden lg:block lg:col-span-1 fixed inset-0 z-50 lg:z-0 lg:static bg-stone-100 lg:bg-transparent p-4 lg:p-0">
            <div class="bg-white rounded-xl shadow-md lg:shadow-xs border border-stone-200/60 p-4 sm:p-6 h-full flex flex-col justify-between">
                <div class="flex lg:hidden items-center justify-between border-b border-stone-100 pb-3 mb-4">
                    <button onclick="closeCarte()" class="text-sm font-bold text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-lg">
                        <i data-lucide="arrow-left" class="w-4 h-4 inline"></i> 一覧に戻る
                    </button>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center text-center text-stone-400 space-y-3" id="carte-empty">
                    <i data-lucide="user-search" class="w-10 h-10"></i>
                    <p class="font-semibold text-stone-600">顧客カルテ未選択</p>
                </div>

                <div class="hidden flex-1 flex flex-col justify-between h-full space-y-4" id="carte-content">
                    <div>
                        <div class="flex items-center space-x-4 border-b border-stone-100 pb-4 mb-4">
                            <div class="min-w-0">
                                <h3 class="text-lg font-bold text-stone-900 truncate" id="carte-name">-</h3>
                                <p class="text-xs text-stone-400 mt-1" id="carte-phone">-</p>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <label class="block text-xs font-bold uppercase tracking-wider text-stone-400">当日指導・レッスンメモ</label>
                            <textarea id="carte-memo" rows="6" class="w-full p-3 text-sm border border-stone-300 rounded-xl focus:ring-1 focus:ring-emerald-600 bg-stone-50/30"></textarea>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-stone-100">
                        <button id="save-memo-btn" onclick="saveOwnerMemo()" class="w-full bg-emerald-700 text-white p-3 rounded-xl font-bold shadow-md hover:bg-emerald-800 transition">
                            <i data-lucide="check-square" class="w-4 h-4 inline"></i> カルテメモを保存する
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h2 class="text-lg font-bold text-stone-800 border-b pb-3 mb-4 flex items-center gap-2">
                <i data-lucide="store" class="text-emerald-700"></i> 店舗の設定
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-2">営業時間</label>
                    <div class="flex items-center gap-2">
                        <select id="open-time" class="p-2 border rounded-lg flex-1 focus:ring-emerald-500"></select>
                        <span class="text-stone-400">〜</span>
                        <select id="close-time" class="p-2 border rounded-lg flex-1 focus:ring-emerald-500"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-2">定休日</label>
                    <div class="grid grid-cols-4 gap-2 text-sm" id="holiday-checkboxes">
                        <label class="flex items-center gap-1"><input type="checkbox" value="1" class="w-4 h-4 text-emerald-600"> 月</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="2" class="w-4 h-4 text-emerald-600"> 火</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="3" class="w-4 h-4 text-emerald-600"> 水</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="4" class="w-4 h-4 text-emerald-600"> 木</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="5" class="w-4 h-4 text-emerald-600"> 金</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="6" class="w-4 h-4 text-emerald-600"> 土</label>
                        <label class="flex items-center gap-1"><input type="checkbox" value="0" class="w-4 h-4 text-red-500"> 日</label>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <button onclick="closeSettingsModal()" class="px-4 py-2 rounded-lg text-stone-500 hover:bg-stone-100 font-medium">キャンセル</button>
                <button onclick="saveSettings()" id="save-settings-btn" class="px-4 py-2 bg-emerald-700 text-white rounded-lg font-bold hover:bg-emerald-800">保存する</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://yoga-liff-webhook.dpromstk2000.workers.dev';
        let allCustomers = [];
        let selectedCustomerId = null;

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchCustomers();
            generateTimeOptions();
        });

        // =====================================
        // カルテリスト・メモ関連 (修正版)
        // =====================================
        async function fetchCustomers() {
            try {
                const response = await fetch(`${WORKER_URL}?action=get_all`);
                if (!response.ok) throw new Error("取得失敗");
                allCustomers = await response.json();
                renderList(allCustomers);
            } catch (error) {
                console.error(error);
            }
        }

        function renderList(customers) {
            const container = document.getElementById("customer-list");
            if (customers.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-stone-400">データなし</div>';
                return;
            }
            container.innerHTML = customers.map(c => `
                <div onclick="selectCustomer('${c.id}')" class="p-4 flex items-center justify-between hover:bg-stone-50 cursor-pointer border-b ${selectedCustomerId === c.id ? 'bg-emerald-50' : ''}">
                    <div>
                        <p class="font-bold text-stone-900">${c.name || '匿名'} 様</p>
                        <p class="text-xs text-stone-500">${c.visit_date || '日時未定'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-stone-300"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectCustomer(id) {
            selectedCustomerId = id;
            const customer = allCustomers.find(c => c.id === id);
            if (!customer) return;

            document.getElementById("carte-empty").classList.add("hidden");
            document.getElementById("carte-content").classList.remove("hidden");
            document.getElementById("carte-panel").classList.remove("hidden");

            document.getElementById("carte-name").innerText = `${customer.name || '未入力'} 様`;
            document.getElementById("carte-phone").innerText = customer.phone || '未入力';
            document.getElementById("carte-memo").value = customer.owner_memo || '';
            renderList(allCustomers);
        }

        function closeCarte() {
            document.getElementById("carte-panel").classList.add("hidden");
            selectedCustomerId = null;
            renderList(allCustomers);
        }

        async function saveOwnerMemo() {
            if (!selectedCustomerId) return;
            const btn = document.getElementById("save-memo-btn");
            const memoValue = document.getElementById("carte-memo").value;
            // 名前の「 様」を消して元の名前だけ取得
            const customerName = document.getElementById("carte-name").innerText.replace(' 様', '');

            btn.disabled = true;
            btn.innerText = "保存中...";

            try {
                // PUTではなく、エラーの起きにくい POST(?action=update) に変更
                const response = await fetch(`${WORKER_URL}?action=update`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        id: selectedCustomerId,
                        customer_name: customerName,
                        owner_memo: memoValue
                    })
                });

                if (response.ok) {
                    alert("カルテメモを保存しました！");
                    fetchCustomers();
                } else {
                    alert("保存エラー: " + await response.text());
                }
            } catch (error) {
                alert("通信エラー");
            } finally {
                btn.disabled = false;
                btn.innerText = "カルテメモを保存する";
            }
        }

        // =====================================
        // 店舗設定関連 (新規追加)
        // =====================================
        function generateTimeOptions() {
            const selects = [document.getElementById("open-time"), document.getElementById("close-time")];
            let options = "";
            for (let h = 0; h < 24; h++) {
                const hour = String(h).padStart(2, '0');
                options += `<option value="${hour}:00">${hour}:00</option>`;
                options += `<option value="${hour}:30">${hour}:30</option>`;
            }
            selects.forEach(s => s.innerHTML = options);
        }

        async function openSettingsModal() {
            document.getElementById("settings-modal").classList.remove("hidden");
            // 現在の設定を読み込む
            try {
                const res = await fetch(`${WORKER_URL}?action=get_settings`);
                const data = await res.json();
                
                if (data.open_time) document.getElementById("open-time").value = data.open_time;
                if (data.close_time) document.getElementById("close-time").value = data.close_time;
                
                // 定休日のチェックボックス復元
                const checkboxes = document.querySelectorAll('#holiday-checkboxes input[type="checkbox"]');
                checkboxes.forEach(cb => cb.checked = false); // 一旦リセット
                if (Array.isArray(data.holidays)) {
                    data.holidays.forEach(day => {
                        const cb = document.querySelector(`#holiday-checkboxes input[value="${day}"]`);
                        if (cb) cb.checked = true;
                    });
                }
            } catch (e) {
                console.error("設定読み込みエラー", e);
            }
        }

        function closeSettingsModal() {
            document.getElementById("settings-modal").classList.add("hidden");
        }

        async function saveSettings() {
            const btn = document.getElementById("save-settings-btn");
            const openTime = document.getElementById("open-time").value;
            const closeTime = document.getElementById("close-time").value;
            
            // チェックされた曜日を取得して数値の配列にする
            const holidayCheckboxes = document.querySelectorAll('#holiday-checkboxes input[type="checkbox"]:checked');
            const holidays = Array.from(holidayCheckboxes).map(cb => parseInt(cb.value));

            btn.disabled = true;
            btn.innerText = "保存中...";

            try {
                const res = await fetch(`${WORKER_URL}?action=save_settings`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ open_time: openTime, close_time: closeTime, holidays: holidays })
                });

                if (res.ok) {
                    alert("店舗設定を保存しました！\n※予約フォームへ反映させる機能は次のステップで実装します。");
                    closeSettingsModal();
                } else {
                    alert("保存失敗: " + await res.text());
                }
            } catch (e) {
                alert("通信エラー");
            } finally {
                btn.disabled = false;
                btn.innerText = "保存する";
            }
        }
    </script>
</body>
</html>
